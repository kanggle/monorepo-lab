# E2E profile — docker-compose.e2e.yml driven overrides.
# Flyway loads BOTH migration and migration-dev so dev SUPER_ADMIN seed
# (V0014) is applied for smoke/scenario tests.
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:admin_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:admin_user}
    password: ${DB_PASSWORD:admin_pass}
    # TASK-BE-045: see auth-service/application-e2e.yml for rationale.
    hikari:
      connection-timeout: 60000
      initialization-fail-timeout: 60000
      maximum-pool-size: 5
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/migration-dev
    baseline-on-migrate: false
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

logging:
  level:
    root: INFO
    com.example.admin: INFO
  file:
    name: ""
