spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: auth_user
    password: auth_pass

  data:
    redis:
      host: localhost
      port: 6379
      password:

  jpa:
    properties:
      hibernate:
        format_sql: true
    show-sql: true

jwt:
  secret: ${JWT_SECRET}
  issuer: auth-service
  audience: api

logging:
  level:
    com.example.auth: DEBUG
    org.hibernate.SQL: DEBUG
