name: _platform-e2e (reusable)

# Reusable live-container e2e lane for wms / fan / scm platforms
# (TASK-MONO-326 Phase 3). Collapses the near-identical e2e jobs that appear
# both in ci.yml (@Tag("smoke") via :e2eSmokeTest) and nightly-e2e.yml
# (@Tag("full") via :e2eFullTest) — same shape, differing only in the gradle
# target, the per-service image set, and the report paths.
#
# The job:
#   checkout -> setup-java-gradle -> download boot-jars artifact -> docker info
#   -> (per service, driven by the `services` JSON) restore jar to its canonical
#      apps/<svc>/build/libs path + `docker build` its :e2e image, while
#      assembling the `-x …:bootJar` excludes and `-D<prop>=<image>` args
#   -> ./gradlew <gradle-target> <excludes> <-D image props>
#   -> upload reports on failure.
#
# Pre-building images via the Docker CLI (not Testcontainers ImageFromDockerfile)
# dodges the Docker 28 + Testcontainers 1.21.3 BuildKit gRPC hang — see the
# original wms e2e-tests job history (ADR-MONO-041 D2 base image built inline).
# jq is preinstalled on ubuntu-latest runners.
#
# Caller keeps its own name / needs / if gating; check surfaces as
# `<caller name> / e2e`. main is unprotected (verified 2026-07-04) so the
# rename breaks no required status check.

on:
  workflow_call:
    inputs:
      project-dir:
        description: 'Project root, e.g. projects/wms-platform.'
        required: true
        type: string
      boot-jars-artifact:
        description: 'Name of the boot-jars artifact to download.'
        required: true
        type: string
      download-path:
        description: 'Directory the artifact is downloaded into (upload-artifact@v4 strips the common prefix, so it holds <svc>/build/libs/<svc>.jar).'
        required: false
        type: string
        default: artifact-staging
      services:
        description: 'JSON array of {name,image,prop}: service dir under apps/, the :e2e image tag to build, and the <proj>.e2e.*Image sysprop key.'
        required: true
        type: string
      gradle-target:
        description: 'Fully-qualified Gradle e2e task, e.g. :projects:wms-platform:apps:gateway-service:e2eSmokeTest.'
        required: true
        type: string
      report-artifact:
        description: 'Name of the test-report artifact uploaded on failure.'
        required: true
        type: string
      report-paths:
        description: 'Newline-separated upload-artifact path globs.'
        required: true
        type: string
      timeout-minutes:
        description: 'Job timeout in minutes.'
        required: false
        type: number
        default: 20

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 + Gradle
        uses: ./.github/actions/setup-java-gradle

      - name: Download boot jars
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.boot-jars-artifact }}
          path: ${{ inputs.download-path }}

      - name: Verify Docker (Testcontainers prerequisite)
        run: docker info

      - name: Restore jars, build service images, run e2e suite
        # ADR-MONO-041 D2: service images `FROM monorepo/java-service-base:v1`;
        # no registry, so build the shared base locally first. Then, per service
        # in the `services` JSON: move the downloaded jar back to its canonical
        # apps/<svc>/build/libs path (upload-artifact stripped the prefix), build
        # its :e2e image, and accumulate the Gradle `-x …:bootJar` excludes +
        # `-D<prop>=<image>` args so E2EBase/…E2ETestBase use GenericContainer
        # directly instead of ImageFromDockerfile.
        env:
          SERVICES: ${{ inputs.services }}
          PROJECT_DIR: ${{ inputs.project-dir }}
          DOWNLOAD_PATH: ${{ inputs.download-path }}
          GRADLE_TARGET: ${{ inputs.gradle-target }}
        run: |
          set -euo pipefail
          docker build -t monorepo/java-service-base:v1 docker/java-service-base
          GRADLE_PATH=":$(echo "$PROJECT_DIR" | tr '/' ':')"
          XARGS=""
          DARGS=""
          while read -r svc; do
            [ -z "$svc" ] && continue
            name=$(jq -r '.name' <<<"$svc")
            image=$(jq -r '.image' <<<"$svc")
            prop=$(jq -r '.prop' <<<"$svc")
            mkdir -p "$PROJECT_DIR/apps/$name/build/libs/"
            mv "$DOWNLOAD_PATH/$name/build/libs/$name.jar" \
               "$PROJECT_DIR/apps/$name/build/libs/$name.jar"
            docker build -t "$image" \
              -f "$PROJECT_DIR/apps/$name/Dockerfile" \
              "$PROJECT_DIR/apps/$name/"
            XARGS="$XARGS -x ${GRADLE_PATH}:apps:${name}:bootJar"
            DARGS="$DARGS -D${prop}=${image}"
          done < <(jq -c '.[]' <<<"$SERVICES")
          echo "[e2e] gradle: $GRADLE_TARGET$XARGS $DARGS"
          ./gradlew "$GRADLE_TARGET" $XARGS $DARGS --no-daemon --stacktrace

      - name: Upload e2e test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.report-artifact }}
          path: ${{ inputs.report-paths }}
          retention-days: 7
