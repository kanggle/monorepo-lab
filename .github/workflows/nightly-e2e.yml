name: Nightly E2E (full-stack web-store + 5 backend full suites + cross-project fulfillment)

# Runs against main HEAD every night:
#
#   1. ecommerce frontend-e2e-fullstack (TASK-MONO-014) — Playwright 4 specs
#      against docker-compose 12 backends + Postgres ×10 + Kafka + Redis +
#      Elasticsearch + MinIO + web-store Next.js.
#   2. wms-platform-e2e-full        — wms gateway-master @Tag("full") method-
#                                      level subset (2 method: RateLimit 800-
#                                      burst + MasterOutage container-pause).
#   3. fan-platform-e2e-full        — fan @Tag("full") class subset
#                                      (1 class: VisibilityTier).
#   4. scm-platform-e2e-full        — scm @Tag("full") class subset
#                                      (4 class: AsnReceive + SupplierAck +
#                                      SupplierCircuitBreaker + WmsInventory).
#   5. iam-e2e-full                 — iam @Tag("full") class subset
#                                      (3 class: RefreshReuse + DlqHandling +
#                                      CrossServiceBulkLock).
#   6. ecommerce-fulfillment-e2e-full — cross-project storefront→warehouse loop
#                                      @Tag("full") (TASK-MONO-195, ADR-MONO-022
#                                      §D7): boots ecommerce order + shipping,
#                                      synthesises the wms boundary event.
#
# Total 11 backend full unit + ecommerce frontend-e2e-fullstack. All jobs
# run in parallel — backend jobs do NOT depend on ecommerce-boot-jars-nightly.
#
# Plus one non-e2e guard job:
#
#   7. demo-image-liveness (TASK-MONO-359) — every image referenced by a demo
#      compose file still resolves in its registry. It lives here, rather than in
#      ci.yml, because it needs a TIME trigger: an upstream image deletion arrives
#      with no diff at all, so no paths-filtered job can ever reach it. Cheap
#      (renders + manifest lookups; nothing boots).
#
# Backend full jobs were introduced by ADR-MONO-011 (PROPOSED 2026-05-13,
# PR #434 → ACCEPTED via TASK-MONO-079 impl PR) — Phase 3 of the e2e 3단계
# 전략 (skip / light / full). Phase 1 = path-filter (TASK-MONO-074/075).
# Phase 2 = @Tag("smoke")/("full") taxonomy + Gradle task family + PR-time
# CI smoke (ADR-MONO-010, TASK-MONO-076~078). Phase 3 wires the nightly +
# push-to-main cadence for the full subset.
#
# ecommerce frontend-e2e-fullstack moved here from ci.yml by TASK-MONO-045
# to remove the ~15-min bottleneck from regular PR CI. Same rationale
# applied to backend full subsets in Phase 3.
#
# Trigger policy (unchanged from TASK-MONO-014):
#   schedule  — 0 18 * * * (UTC 18:00 = KST 03:00, low-traffic window)
#   push      — only main branch (post-merge verification)
#   dispatch  — workflow_dispatch for manual one-shot runs
#               Usage: gh workflow run nightly-e2e.yml --ref main
#
# Failure handling (v1 scope — portfolio):
#   - Failure turns the main branch badge red; visible in GitHub Actions UI.
#   - v2 would add issue auto-create or Slack webhook (out of scope; ADR-
#     MONO-011 § 6.1 outstanding).

on:
  schedule:
    - cron: '0 18 * * *'  # UTC 18:00 = KST 03:00
  push:
    branches: [main]
  workflow_dispatch:

# Only monorepo-lab has the backend stack; extracted portfolio repos skip.
# Enforced at the job level via `if: github.repository == 'kanggle/monorepo-lab'`.

# `schedule` and `push` both report `github.ref` as `refs/heads/main`, so a
# ref-keyed group put the nightly cron run and every merge to main into the SAME
# group: a merge landing while the nightly was in flight killed it. A cancelled
# run reports neither success nor failure, so the nightly would simply not have
# happened, and nothing would say so (TASK-MONO-374). Per-commit grouping for
# pushes; the cron run keeps the ref group to itself.
concurrency:
  group: nightly-e2e-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ---------------------------------------------------------------------------
  # TASK-MONO-359 — time trigger for the compose image-liveness guard.
  #
  # TASK-MONO-353 added guard (h) to infra/demo/verify-demo-wrapper.sh: every
  # registry image a compose file references must still resolve. Its own rationale
  # states the defect's nature precisely:
  #
  #   "이 결함의 성질이 중요하다: 우리 커밋과 무관하게 외부에서 깨진다. 따라서
  #    어떤 diff-기반 검사로도 잡히지 않는다."   (verify-demo-wrapper.sh:189-190)
  #
  # But the only job that ran it — ci.yml `demo-wrapper-smoke` — is gated on a
  # paths-filter (infra/demo/**, infra/traefik/**, projects/*/docker-compose.yml)
  # AND-ed with `code-changed`. It fires only when OUR diff touches a compose file.
  # An upstream deletion produces no diff at all, so the guard could never fire for
  # the very defect it was built for: bitnami/kafka:3.7 would rot a second time,
  # with CI green, exactly as it did the first time.
  #
  # A guard against a diff-less defect needs a TIME trigger, not a path trigger.
  # This job is that trigger. It is cheap — `docker compose config` renders plus one
  # `docker manifest inspect` per distinct image. Nothing boots (no --live; the live
  # coexistence proof stays in ci.yml where a compose diff justifies paying for it).
  #
  # Why nightly's existing jobs do NOT already cover this: they are Testcontainers-
  # based and never execute projects/*/docker-compose.yml at all. That is the root
  # reason MONO-353 sat undetected for so long.
  # ---------------------------------------------------------------------------
  demo-image-liveness:
    name: Demo compose image liveness (registry images still resolve)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.repository == 'kanggle/monorepo-lab'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Static mode (no --live): guards (a)-(e), (g) and (h). Guard (h) is the one
      # that needs the clock.
      #
      # --require-coverage matters here and NOWHERE else. A rate-limited manifest
      # lookup is counted as a skip and never failed — that tolerance is right, and
      # deliberately kept, because a guard that flakes on Docker Hub's anonymous
      # limit is a guard someone eventually switches off. But the tolerance has a
      # sharp edge: if EVERY lookup is skipped, guard (h) verifies nothing and still
      # exits 0. On a PR that is the correct trade (an external rate limit must not
      # block a merge). On a scheduled run it is the opposite of correct — it would
      # report "all clear" every night while looking at nothing, which is precisely
      # the false assurance this job exists to abolish. So the clocked caller, and
      # only the clocked caller, demands that the run actually verified something.
      - name: Guard — every compose-referenced image still exists in its registry
        run: bash infra/demo/verify-demo-wrapper.sh --require-coverage

  # Build all ecommerce backend boot jars needed for docker compose.
  # Separated from the e2e job so the jar-build step appears clearly in the
  # Actions UI and the artifact is available for re-use / debugging.
  ecommerce-boot-jars-nightly:
    name: Package ecommerce boot jars (nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.repository == 'kanggle/monorepo-lab'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 + Gradle
        uses: ./.github/actions/setup-java-gradle

      # ⚠️ ADDING AN ECOMMERCE SERVICE? Update ALL of the following in lockstep,
      # or the nightly goes RED (ci.yml passing is NOT sufficient — these are
      # nightly-only and fail sequentially):
      #   (1) this `Build ecommerce boot jars` gradle bootJar list
      #   (2) the `Upload ecommerce boot jars` artifact `path:` list (below)
      #   (3) the jar-restore step in the `frontend-e2e-fullstack` job
      #   (4) the new service's DB password / env in the docker-compose `.env`
      # (Drift history: settlement-service, TASK-MONO-250/251.)
      - name: Build ecommerce boot jars
        # auth-service excluded by TASK-BE-132 — decommissioned, not in settings.gradle.
        run: >-
          ./gradlew
          :projects:ecommerce-microservices-platform:apps:batch-worker:bootJar
          :projects:ecommerce-microservices-platform:apps:gateway-service:bootJar
          :projects:ecommerce-microservices-platform:apps:notification-service:bootJar
          :projects:ecommerce-microservices-platform:apps:order-service:bootJar
          :projects:ecommerce-microservices-platform:apps:payment-service:bootJar
          :projects:ecommerce-microservices-platform:apps:product-service:bootJar
          :projects:ecommerce-microservices-platform:apps:promotion-service:bootJar
          :projects:ecommerce-microservices-platform:apps:review-service:bootJar
          :projects:ecommerce-microservices-platform:apps:search-service:bootJar
          :projects:ecommerce-microservices-platform:apps:settlement-service:bootJar
          :projects:ecommerce-microservices-platform:apps:shipping-service:bootJar
          :projects:ecommerce-microservices-platform:apps:user-service:bootJar
          --no-daemon --stacktrace

      - name: Upload ecommerce boot jars
        uses: actions/upload-artifact@v4
        with:
          name: ecommerce-boot-jars-nightly
          # upload-artifact@v4 strips the longest common prefix from multi-path
          # uploads — artifact root becomes `<service>/build/libs/<service>.jar`.
          # The frontend-e2e-fullstack job below restores canonical paths.
          # auth-service excluded by TASK-BE-132 — decommissioned.
          path: |
            projects/ecommerce-microservices-platform/apps/batch-worker/build/libs/batch-worker.jar
            projects/ecommerce-microservices-platform/apps/gateway-service/build/libs/gateway-service.jar
            projects/ecommerce-microservices-platform/apps/notification-service/build/libs/notification-service.jar
            projects/ecommerce-microservices-platform/apps/order-service/build/libs/order-service.jar
            projects/ecommerce-microservices-platform/apps/payment-service/build/libs/payment-service.jar
            projects/ecommerce-microservices-platform/apps/product-service/build/libs/product-service.jar
            projects/ecommerce-microservices-platform/apps/promotion-service/build/libs/promotion-service.jar
            projects/ecommerce-microservices-platform/apps/review-service/build/libs/review-service.jar
            projects/ecommerce-microservices-platform/apps/search-service/build/libs/search-service.jar
            projects/ecommerce-microservices-platform/apps/settlement-service/build/libs/settlement-service.jar
            projects/ecommerce-microservices-platform/apps/shipping-service/build/libs/shipping-service.jar
            projects/ecommerce-microservices-platform/apps/user-service/build/libs/user-service.jar
          retention-days: 1

  frontend-e2e-fullstack:
    name: Frontend E2E full-stack (web-store, Playwright + docker compose)
    runs-on: ubuntu-latest
    needs: ecommerce-boot-jars-nightly
    timeout-minutes: 60
    # Full-stack Playwright suite: docker compose starts 12 Spring Boot backends
    # + Postgres ×10 + Kafka + Redis + Elasticsearch (Nori) + MinIO; Playwright
    # webServer starts web-store via `pnpm start` pointing at the gateway on
    # localhost:18080 via the docker-compose.ci.yml overlay (TASK-MONO-024).
    # Observability services (Jaeger, Prometheus, AlertManager, Grafana, Loki,
    # Promtail) are excluded to fit within the runner's 7 GB RAM. OTEL
    # exporters in the backend services will log connection errors against the
    # absent Jaeger endpoint; these are non-blocking and do not affect test
    # correctness.
    #
    # CI does NOT start the shared Traefik stack — spinning up Traefik plus
    # all 12 backends + infra exceeds the runner's memory budget. Instead the
    # CI overlay (docker-compose.ci.yml) re-publishes only gateway-service on
    # host port 18080 so the existing webServer/health-probe wiring works
    # without architectural change. Local developers should not use the
    # overlay — `pnpm traefik:up` + http://ecommerce.local/ is the dev path.
    #
    # Scoped to kanggle/monorepo-lab: extracted portfolio repos have no backend
    # stack and the smoke job (frontend-e2e-smoke in ci.yml) covers them instead.
    # TASK-MONO-014, TASK-MONO-024, TASK-MONO-045.
    if: github.repository == 'kanggle/monorepo-lab'
    defaults:
      run:
        working-directory: projects/ecommerce-microservices-platform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20 + pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          cache-dependency-path: |
            projects/ecommerce-microservices-platform/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download ecommerce boot jars
        uses: actions/download-artifact@v4
        with:
          name: ecommerce-boot-jars-nightly
          path: projects/ecommerce-microservices-platform/artifact-staging

      - name: Restore ecommerce boot jar paths
        # upload-artifact@v4 strips the common prefix so the artifact contains
        # `<service>/build/libs/<service>.jar`. Restore to the canonical
        # `apps/<service>/build/libs/<service>.jar` layout that each Dockerfile
        # expects (COPY apps/<service>/build/libs/*.jar app.jar).
        working-directory: ${{ github.workspace }}
        run: |
          # auth-service excluded by TASK-BE-132 — decommissioned.
          services=(batch-worker gateway-service notification-service \
            order-service payment-service product-service promotion-service \
            review-service search-service settlement-service shipping-service \
            user-service)
          for svc in "${services[@]}"; do
            mkdir -p "projects/ecommerce-microservices-platform/apps/${svc}/build/libs/"
            mv "projects/ecommerce-microservices-platform/artifact-staging/${svc}/build/libs/${svc}.jar" \
               "projects/ecommerce-microservices-platform/apps/${svc}/build/libs/${svc}.jar"
          done

      - name: Create .env for docker compose
        # Synthetic test values — no real secrets needed.
        # Toss and OAuth keys are placeholders (tests stop before payment/OAuth).
        run: |
          # JWT_SECRET and AUTH_DB_PASSWORD removed by TASK-BE-132 — auth-service decommissioned.
          cat << 'EOF' > .env
          PRODUCT_DB_PASSWORD=ci_product_pass
          ORDER_DB_PASSWORD=ci_order_pass
          PAYMENT_DB_PASSWORD=ci_payment_pass
          USER_DB_PASSWORD=ci_user_pass
          BATCH_DB_PASSWORD=ci_batch_pass
          SHIPPING_DB_PASSWORD=ci_shipping_pass
          REVIEW_DB_PASSWORD=ci_review_pass
          PROMOTION_DB_PASSWORD=ci_promotion_pass
          NOTIFICATION_DB_PASSWORD=ci_notification_pass
          SETTLEMENT_DB_PASSWORD=ci_settlement_pass
          TOSS_PAYMENTS_SECRET_KEY=test_sk_ci_placeholder
          NEXT_PUBLIC_TOSS_CLIENT_KEY=test_ck_ci_placeholder
          MINIO_ROOT_USER=minioadmin
          MINIO_ROOT_PASSWORD=minioadmin
          PRODUCT_IMAGES_BUCKET=firstproject-local-product-images
          GRAFANA_ADMIN_PASSWORD=admin
          CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001
          OAUTH_CALLBACK_ALLOWLIST=http://localhost:3000/oauth/callback
          EOF

      - name: Build web-store (Next.js prod build)
        # NEXT_PUBLIC_* vars are baked into the bundle at build time, not runtime.
        # Set the gateway URL here so browser-side API calls reach port 18080.
        env:
          NEXT_PUBLIC_API_URL: http://localhost:18080
        run: pnpm --filter web-store build

      - name: Ensure traefik-net exists (CI mitigation for TASK-MONO-024)
        # ecommerce docker-compose.yml declares traefik-net as `external: true`
        # so it can join the shared Traefik stack in dev (`pnpm traefik:up`).
        # CI does not run the Traefik stack (RAM budget), so the network must
        # be created here before `docker compose up` — otherwise compose aborts
        # with "network traefik-net declared as external, but could not be found".
        # Idempotent (`|| true`) so a leaked network from a prior run is OK.
        # See knowledge/incidents/2026-05-05-ci-regression.md § Root Cause #2.
        run: docker network create traefik-net || true

      # ADR-MONO-041 D2: ecommerce service images `FROM monorepo/java-service-base:v1`.
      # No image registry → build the shared base before `compose up --build`.
      # Override the job's ecommerce working-directory to reach docker/ at repo root.
      - name: Build shared java-service-base image (ADR-MONO-041 D2)
        working-directory: ${{ github.workspace }}
        run: docker build -t monorepo/java-service-base:v1 docker/java-service-base

      - name: Start docker compose stack (backends + infra, no observability)
        # Apply the CI overlay so gateway-service is published on host
        # port 18080 (the shared Traefik stack is not started in CI).
        run: |
          # auth-postgres and auth-service excluded by TASK-BE-132 — decommissioned.
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d \
            kafka redis elasticsearch minio minio-init \
            product-postgres order-postgres payment-postgres \
            user-postgres batch-postgres shipping-postgres review-postgres \
            promotion-postgres notification-postgres \
            product-service search-service user-service \
            order-service payment-service batch-worker shipping-service \
            review-service promotion-service notification-service \
            gateway-service

      - name: Wait for gateway health
        # docker-compose.ci.yml publishes gateway-service on host port 18080.
        # Backends have start_period=360s in compose healthchecks; allow 7 min.
        run: |
          echo "Waiting for gateway-service to be healthy (up to 7 min)..."
          for i in $(seq 1 42); do
            if curl -sf http://localhost:18080/actuator/health > /dev/null 2>&1; then
              echo "Gateway healthy after $((i * 10))s"
              exit 0
            fi
            echo "  attempt $i/42 (${i}0s elapsed), retrying in 10s..."
            sleep 10
          done
          echo "Gateway did not become healthy within 7 minutes"
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --tail=50 gateway-service
          exit 1

      - name: Install Playwright browsers (chromium, with system deps)
        run: pnpm --filter web-store exec playwright install --with-deps chromium

      - name: Run full-stack E2E
        # SKIP_GAP_E2E gates the 4 IAM-dependent specs (account-type-guard,
        # cart-management, golden-flow, wishlist) at the Playwright runner
        # level via `test.skip(shouldSkipGap, ...)` in each spec file. The
        # docker-compose stack does NOT yet boot a IAM container (deferred per
        # TASK-MONO-014 § Out of Scope), so these specs would otherwise drive
        # NextAuth `/api/auth/signin/gap` → OIDC discovery against
        # OIDC_ISSUER_URL=http://127.0.0.1:1 (closed loopback per
        # playwright.config.ts webServer.env) and emit `fetch failed`.
        # The webServer env already carries SKIP_GAP_E2E=1 to gate NextAuth
        # boot — but the runner process needs it too to honor the
        # spec-level `test.skip()` gate. Setting it once at the job level
        # keeps both processes in sync.
        env:
          SKIP_GAP_E2E: '1'
        run: pnpm --filter web-store run e2e

      - name: Stop docker compose stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-fullstack-nightly
          path: |
            projects/ecommerce-microservices-platform/apps/web-store/playwright-report/
            projects/ecommerce-microservices-platform/apps/web-store/test-results/
          retention-days: 7

  # ===========================================================================
  # web-store GAP RP-initiated logout e2e (TASK-INT-023 spec → TASK-MONO-318 lane).
  #
  # Additive sibling of frontend-e2e-fullstack. Boots the LEAN GAP stack
  # (docker-compose.iam-e2e.yml = auth-service + mysql only, no ecommerce backend)
  # and runs rp-initiated-logout.spec.ts with SKIP_GAP_E2E=0. Independent of the
  # ecommerce-boot-jars-nightly artifact (builds its own auth-service bootJar), so
  # no `needs:`. The lean stack has no account-service — login works off
  # auth_db.credentials alone (the GAP token pipeline emits no account_type claim,
  # which web-store's signIn accepts).
  # ===========================================================================
  web-store-iam-logout-e2e:
    name: Web-store GAP logout e2e (RP-initiated end_session, real GAP)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Extracted portfolio repos have no GAP/iam stack; smoke covers them in ci.yml.
    if: github.repository == 'kanggle/monorepo-lab'
    defaults:
      run:
        working-directory: projects/ecommerce-microservices-platform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # TASK-MONO-330: this was the one JVM block that set up the JDK but NOT
      # gradle/actions/setup-gradle — although the very next step runs ./gradlew.
      # Adopting the composite therefore ADDS setup-gradle here (Gradle dependency
      # + build cache). That is a deliberate superset, not a byte-equivalent swap:
      # it is the shape every other JVM job in this repo already has.
      - name: Set up JDK 21 + Gradle
        uses: ./.github/actions/setup-java-gradle

      # Build the GAP auth-service bootJar (the iam-e2e Dockerfile COPYs it).
      # The monorepo has a single root gradlew (no projects/iam-platform/gradlew),
      # so run from the workspace root with the fully-qualified path.
      - name: Build auth-service bootJar
        working-directory: ${{ github.workspace }}
        run: ./gradlew :projects:iam-platform:apps:auth-service:bootJar --no-daemon

      - name: Issuer hostname resolves on the host (browser + Next.js server)
        # PC-FE-028: both the browser AND the Next.js server must resolve the
        # `auth-service` OIDC issuer host.
        working-directory: ${{ github.workspace }}
        run: echo "127.0.0.1 auth-service" | sudo tee -a /etc/hosts

      - name: Set up Node 20 + pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          cache-dependency-path: |
            projects/ecommerce-microservices-platform/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ADR-MONO-041 D2: the iam-e2e auth-service image `FROM monorepo/java-service-base:v1`.
      # No image registry → build the shared base locally before `compose up --build`.
      - name: Build shared java-service-base image (ADR-MONO-041 D2)
        working-directory: ${{ github.workspace }}
        run: docker build -t monorepo/java-service-base:v1 docker/java-service-base

      - name: Boot lean GAP stack
        run: docker compose -f docker-compose.iam-e2e.yml up -d --build

      - name: Wait for auth-service healthy
        run: |
          for i in $(seq 1 40); do
            s=$(docker inspect -f '{{.State.Health.Status}}' \
                 "$(docker compose -f docker-compose.iam-e2e.yml ps -q auth-service)")
            [ "$s" = "healthy" ] && exit 0
            sleep 5
          done
          docker compose -f docker-compose.iam-e2e.yml logs auth-service
          exit 1

      - name: Seed CONSUMER credential
        run: |
          docker compose -f docker-compose.iam-e2e.yml exec -T mysql \
            mysql -uroot -prootpass \
            < apps/web-store/e2e/fixtures/iam-consumer-seed.sql

      - name: Install Playwright browsers (chromium, with system deps)
        run: pnpm --filter web-store exec playwright install --with-deps chromium

      # The Playwright webServer runs `pnpm start`, which needs a prod build.
      # NextAuth/OIDC values are read at runtime by the server (set on the run
      # step below); the build only needs AUTH_TRUST_HOST baked harmlessly.
      - name: Build web-store (Next.js prod build)
        env:
          AUTH_TRUST_HOST: 'true'
        run: pnpm --filter web-store build

      - name: Run RP-initiated logout spec
        working-directory: projects/ecommerce-microservices-platform/apps/web-store
        env:
          CI: '1'                                  # makes playwright.config start the webServer
          SKIP_GAP_E2E: '0'                        # un-skip the GAP spec
          OIDC_ISSUER_URL: http://auth-service:8081
          ECOMMERCE_WEB_STORE_CLIENT_ID: ecommerce-web-store-client
          ECOMMERCE_WEB_STORE_CLIENT_SECRET: ecommerce-dev
          NEXTAUTH_SECRET: ci-iam-e2e-secret
          NEXTAUTH_URL: http://localhost:3000
          AUTH_TRUST_HOST: 'true'
        run: pnpm --filter web-store exec playwright test rp-initiated-logout.spec.ts

      - name: Tear down lean GAP stack
        if: always()
        run: docker compose -f docker-compose.iam-e2e.yml down -v

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-iam-logout-nightly
          path: |
            projects/ecommerce-microservices-platform/apps/web-store/playwright-report/
            projects/ecommerce-microservices-platform/apps/web-store/test-results/
          retention-days: 7

  # ===========================================================================
  # Backend full e2e jobs (ADR-MONO-011 / TASK-MONO-079, Phase 3).
  #
  # The 4 jobs below run @Tag("full") subsets of the 4 backend e2e suites
  # against main HEAD nightly + on every push to main. They mirror the
  # corresponding PR-time smoke jobs in ci.yml (e2e-tests / fan-platform-e2e
  # / scm-platform-e2e / iam-integration-tests) with these diffs:
  #
  #   - Task target: :e2eSmokeTest → :e2eFullTest.
  #   - Timeout: shorter PR-time budgets (10/12/20 min) → 60 min (generous
  #     for cold-start + flake-prone categories: 800-request burst,
  #     container-pause, supplier circuit-breaker).
  #   - Boot-jars built in-job (no cross-workflow artifact reuse; GitHub
  #     Actions does not support that without workflow chaining).
  #   - No path-filter `if:` — cron + push-to-main triggers are
  #     unconditional. The repo-gate `if: github.repository == 'kanggle/
  #     monorepo-lab'` keeps extracted standalone repos out.
  #   - iam-e2e-full builds boot jars in-job too (TASK-MONO-081 cycle 2 fix;
  #     the ADR-MONO-011 § D5 claim that ComposeFixture self-builds was
  #     wrong — `docker compose up --build` still needs the boot jars on
  #     disk because the Dockerfile COPYs `apps/<svc>/build/libs/`). The
  #     job omits the Docker CLI image build step — that piece is still
  #     covered by ComposeFixture's `--build` invocation.
  #
  # All 4 jobs run in parallel with `frontend-e2e-fullstack` and
  # `ecommerce-boot-jars-nightly`. No `needs:` between them.
  # ===========================================================================

  wms-platform-e2e-full:
    name: E2E full (wms gateway-master, Testcontainers)
    # Mirrors the PR-time e2e-tests smoke job (ci.yml) via the SAME reusable,
    # with boot-jars-mode: build (nightly has no cross-workflow artifact reuse)
    # and gradle-target :e2eFullTest. No path-filter `if:` — cron + push-to-main
    # are unconditional; the repo-guard keeps extracted standalone repos out.
    if: github.repository == 'kanggle/monorepo-lab'
    uses: ./.github/workflows/_platform-e2e.yml
    with:
      project-dir: projects/wms-platform
      boot-jars-mode: build
      bootjar-tasks: >-
        :projects:wms-platform:apps:master-service:bootJar
        :projects:wms-platform:apps:gateway-service:bootJar
      timeout-minutes: 60
      gradle-target: ':projects:wms-platform:apps:gateway-service:e2eFullTest'
      services: >-
        [
          {"name":"master-service","image":"wms-master-service:e2e","prop":"wms.e2e.masterImage"},
          {"name":"gateway-service","image":"wms-gateway-service:e2e","prop":"wms.e2e.gatewayImage"}
        ]
      report-artifact: wms-e2e-full-test-reports-nightly
      report-paths: |
        projects/wms-platform/apps/gateway-service/build/reports/tests/e2eFullTest/
        projects/wms-platform/apps/gateway-service/build/test-results/e2eFullTest/

  fan-platform-e2e-full:
    name: E2E full (fan-platform v1 live-trio, Testcontainers)
    # Mirrors ci.yml fan-platform-e2e smoke via the SAME reusable
    # (boot-jars-mode: build, gradle-target :e2eFullTest).
    if: github.repository == 'kanggle/monorepo-lab'
    uses: ./.github/workflows/_platform-e2e.yml
    with:
      project-dir: projects/fan-platform
      boot-jars-mode: build
      bootjar-tasks: >-
        :projects:fan-platform:apps:gateway-service:bootJar
        :projects:fan-platform:apps:community-service:bootJar
        :projects:fan-platform:apps:artist-service:bootJar
      timeout-minutes: 60
      gradle-target: ':projects:fan-platform:tests:e2e:e2eFullTest'
      services: >-
        [
          {"name":"gateway-service","image":"fan-platform-gateway-service:e2e","prop":"fan.e2e.gatewayImage"},
          {"name":"community-service","image":"fan-platform-community-service:e2e","prop":"fan.e2e.communityImage"},
          {"name":"artist-service","image":"fan-platform-artist-service:e2e","prop":"fan.e2e.artistImage"}
        ]
      report-artifact: fan-platform-e2e-full-test-reports-nightly
      report-paths: |
        projects/fan-platform/tests/e2e/build/reports/tests/e2eFullTest/
        projects/fan-platform/tests/e2e/build/test-results/e2eFullTest/

  scm-platform-e2e-full:
    name: E2E full (scm-platform v1 cross-service, Testcontainers)
    # Mirrors ci.yml scm-platform-e2e smoke via the SAME reusable
    # (boot-jars-mode: build, gradle-target :e2eFullTest).
    if: github.repository == 'kanggle/monorepo-lab'
    uses: ./.github/workflows/_platform-e2e.yml
    with:
      project-dir: projects/scm-platform
      boot-jars-mode: build
      bootjar-tasks: >-
        :projects:scm-platform:apps:gateway-service:bootJar
        :projects:scm-platform:apps:procurement-service:bootJar
        :projects:scm-platform:apps:inventory-visibility-service:bootJar
        :projects:scm-platform:apps:demand-planning-service:bootJar
      timeout-minutes: 60
      gradle-target: ':projects:scm-platform:tests:e2e:e2eFullTest'
      services: >-
        [
          {"name":"gateway-service","image":"scm-platform-gateway-service:e2e","prop":"scm.e2e.gatewayImage"},
          {"name":"procurement-service","image":"scm-platform-procurement-service:e2e","prop":"scm.e2e.procurementImage"},
          {"name":"inventory-visibility-service","image":"scm-platform-inventory-visibility-service:e2e","prop":"scm.e2e.inventoryVisibilityImage"},
          {"name":"demand-planning-service","image":"scm-platform-demand-planning-service:e2e","prop":"scm.e2e.demandPlanningImage"}
        ]
      report-artifact: scm-platform-e2e-full-test-reports-nightly
      report-paths: |
        projects/scm-platform/tests/e2e/build/reports/tests/e2eFullTest/
        projects/scm-platform/tests/e2e/build/test-results/e2eFullTest/

  iam-e2e-full:
    name: E2E full (iam docker-compose)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.repository == 'kanggle/monorepo-lab'

    # iam uses docker-compose directly via ComposeFixture (not Testcontainers
    # Network). ComposeFixture calls `docker compose up -d --build` in
    # @BeforeAll, but each service Dockerfile uses
    # `COPY apps/<service>/build/libs/ ./libs/` — so the boot jars must exist
    # on disk before ComposeFixture runs. TASK-MONO-081 added the boot-jars
    # build step below; the ADR-MONO-011 § D5 statement ("omits boot-jars
    # step") was incorrect (cycle 2 of TASK-MONO-080 audit; option C-1
    # audit-only correction — see TASK-MONO-081 Implementation Notes).
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 + Gradle
        uses: ./.github/actions/setup-java-gradle

      - name: Build iam boot jars
        # 5 services = docker-compose.e2e.yml `build:` directive service set
        # (auth / account / security / admin / gateway). community/membership
        # are not booted in the e2e environment. TASK-MONO-081 +
        # ADR-MONO-011 § D5 audit (option C-1).
        run: >-
          ./gradlew
          :projects:iam-platform:apps:auth-service:bootJar
          :projects:iam-platform:apps:account-service:bootJar
          :projects:iam-platform:apps:security-service:bootJar
          :projects:iam-platform:apps:admin-service:bootJar
          :projects:iam-platform:apps:gateway-service:bootJar
          --no-daemon --stacktrace

      - name: Verify Docker (ComposeFixture prerequisite)
        run: docker info

      # ADR-MONO-041 D2: iam service images `FROM monorepo/java-service-base:v1`.
      # No image registry → build the shared base locally before the
      # ComposeFixture's `docker compose up -d --build` resolves it.
      - name: Build shared java-service-base image (ADR-MONO-041 D2)
        run: docker build -t monorepo/java-service-base:v1 docker/java-service-base

      - name: Run iam docker-compose e2e full suite
        run: >-
          ./gradlew
          :projects:iam-platform:tests:e2e:e2eFullTest
          --no-daemon --stacktrace

      - name: Upload iam e2e full test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: iam-e2e-full-test-reports-nightly
          path: |
            projects/iam-platform/tests/e2e/build/reports/tests/e2eFullTest/
            projects/iam-platform/tests/e2e/build/test-results/e2eFullTest/
          retention-days: 7

  ecommerce-fulfillment-e2e-full:
    name: E2E full (ecommerce×wms fulfillment loop, Testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.repository == 'kanggle/monorepo-lab'

    # TASK-MONO-195 (ADR-MONO-022 §D7 ④). Cross-project fulfillment loop: boots
    # ecommerce order-service + shipping-service on a shared Kafka + Postgres
    # (Testcontainers Network) and drives storefront purchase → CONFIRMED →
    # ecommerce.fulfillment.requested.v1 (asserted) → synthetic wms
    # shipping.confirmed → order SHIPPED. The wms boundary event is synthesised
    # (the wms internal saga is gated by FulfillmentRequestedConsumerIT) per the
    # scm WmsInventoryAdjustedConsumedE2ETest cross-project idiom.
    #
    # Images are built via Docker CLI into minimal jar-only images (Docker 28 +
    # Testcontainers ImageFromDockerfile hang workaround — same rationale as the
    # wms/fan/scm jobs above) and passed via -Decommerce.e2e.{order,shipping}Image.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 + Gradle
        uses: ./.github/actions/setup-java-gradle

      - name: Build ecommerce order + shipping boot jars
        run: >-
          ./gradlew
          :projects:ecommerce-microservices-platform:apps:order-service:bootJar
          :projects:ecommerce-microservices-platform:apps:shipping-service:bootJar
          --no-daemon --stacktrace

      - name: Verify Docker (Testcontainers prerequisite)
        run: docker info

      - name: Build minimal e2e service images (order + shipping)
        run: |
          set -e
          build_img() {
            local svc=$1 tag=$2 port=$3
            local dir
            dir=$(mktemp -d)
            cp "$(ls projects/ecommerce-microservices-platform/apps/$svc/build/libs/*.jar | grep -v -- -plain.jar)" "$dir/app.jar"
            cat > "$dir/Dockerfile" <<EOF
          FROM eclipse-temurin:21-jre-alpine
          COPY app.jar /app/app.jar
          EXPOSE $port
          ENTRYPOINT ["java","-XX:MaxRAMPercentage=75.0","-jar","/app/app.jar"]
          EOF
            docker build -t "$tag" "$dir"
          }
          build_img order-service ecommerce-order-service:e2e 8086
          build_img shipping-service ecommerce-shipping-service:e2e 8090

      - name: Run fulfillment loop e2e full suite
        run: >-
          ./gradlew
          :projects:ecommerce-microservices-platform:tests:e2e:e2eFullTest
          -x :projects:ecommerce-microservices-platform:apps:order-service:bootJar
          -x :projects:ecommerce-microservices-platform:apps:shipping-service:bootJar
          -Decommerce.e2e.orderImage=ecommerce-order-service:e2e
          -Decommerce.e2e.shippingImage=ecommerce-shipping-service:e2e
          --no-daemon --stacktrace

      - name: Upload ecommerce fulfillment e2e reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ecommerce-fulfillment-e2e-full-test-reports-nightly
          path: |
            projects/ecommerce-microservices-platform/tests/e2e/build/reports/tests/e2eFullTest/
            projects/ecommerce-microservices-platform/tests/e2e/build/test-results/e2eFullTest/
          retention-days: 7

  # ===========================================================================
  # platform-console-e2e-fullstack (TASK-PC-FE-019, ADR-MONO-017 Phase 7).
  #
  # Activates the 2 deferred Playwright specs (operators-profile +
  # operators-admin-profile) for the platform-console operator-overview
  # finance-card vertical slice. Standalone boot-jar artifact job +
  # docker-compose.e2e.yml orchestration mirroring the ecommerce
  # frontend-e2e-fullstack pattern (TASK-MONO-014 / TASK-MONO-024 /
  # TASK-MONO-045 reference).
  #
  # Service set (within the 7 GB runner budget):
  #   IAM auth-service + account-service + admin-service
  #   finance-platform account-service
  #   console-bff + console-web
  #   MySQL 8.0 + Redis 7
  #
  # No Kafka, no Traefik, no observability stack — the 2 specs do not
  # exercise an event-publishing code path and the dev Traefik hostname-
  # routing path remains intact (host-port publish substitutes for CI).
  # ===========================================================================
  platform-console-boot-jars-nightly:
    name: Package platform-console e2e boot jars (nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.repository == 'kanggle/monorepo-lab'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 + Gradle
        uses: ./.github/actions/setup-java-gradle

      - name: Build platform-console e2e boot jars
        # 5 boot jars — IAM auth/account/admin + finance account + console-bff.
        # console-web is a Next.js standalone build (handled in the e2e job).
        run: >-
          ./gradlew
          :projects:iam-platform:apps:auth-service:bootJar
          :projects:iam-platform:apps:account-service:bootJar
          :projects:iam-platform:apps:admin-service:bootJar
          :projects:finance-platform:apps:account-service:bootJar
          :projects:platform-console:apps:console-bff:bootJar
          --no-daemon --stacktrace

      - name: Upload platform-console e2e boot jars
        uses: actions/upload-artifact@v4
        with:
          name: platform-console-e2e-boot-jars-nightly
          # upload-artifact@v4 strips the longest common prefix; the
          # download step restores canonical paths.
          path: |
            projects/iam-platform/apps/auth-service/build/libs/auth-service.jar
            projects/iam-platform/apps/account-service/build/libs/account-service.jar
            projects/iam-platform/apps/admin-service/build/libs/admin-service.jar
            projects/finance-platform/apps/account-service/build/libs/account-service.jar
            projects/platform-console/apps/console-bff/build/libs/console-bff.jar
          retention-days: 1

  platform-console-e2e-fullstack:
    name: Platform Console E2E full-stack (Playwright + docker compose)
    runs-on: ubuntu-latest
    needs: platform-console-boot-jars-nightly
    timeout-minutes: 45
    if: github.repository == 'kanggle/monorepo-lab'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # TASK-MONO-330: this block had no pnpm cache at all. That was an oversight,
      # not a deliberate variant — federation-hardening-e2e.yml runs the identical
      # console-web `pnpm install --frozen-lockfile` and DOES cache it, keyed on
      # exactly this lockfile. Adopting the composite adds the cache; the frozen
      # lockfile guarantees the resolved dependency set is byte-identical.
      - name: Set up Node 20 + pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          cache-dependency-path: |
            projects/platform-console/apps/console-web/pnpm-lock.yaml

      - name: Install console-web dependencies
        working-directory: projects/platform-console/apps/console-web
        run: pnpm install --frozen-lockfile

      - name: Download platform-console e2e boot jars
        uses: actions/download-artifact@v4
        with:
          name: platform-console-e2e-boot-jars-nightly
          path: projects/platform-console/artifact-staging

      - name: Restore boot jar paths
        # upload-artifact@v4 strips the common prefix (`projects/`) so the
        # artifact contains <project>/apps/<service>/build/libs/<jar>. Move
        # each file to the canonical path Dockerfiles expect.
        #
        # The IAM project dir is `iam-platform` (the upload paths keep the full
        # name). The gap→iam-platform rename (#1149) fixed the equivalent
        # restore block in federation-hardening-e2e.yml but missed this one —
        # the stale `iam/` source made every `mv` fail (exit 1) and broke the
        # platform-console nightly job from 2026-06-06. Use the full dir name.
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p projects/iam-platform/apps/auth-service/build/libs/
          mkdir -p projects/iam-platform/apps/account-service/build/libs/
          mkdir -p projects/iam-platform/apps/admin-service/build/libs/
          mkdir -p projects/finance-platform/apps/account-service/build/libs/
          mkdir -p projects/platform-console/apps/console-bff/build/libs/
          mv projects/platform-console/artifact-staging/iam-platform/apps/auth-service/build/libs/auth-service.jar \
             projects/iam-platform/apps/auth-service/build/libs/auth-service.jar
          mv projects/platform-console/artifact-staging/iam-platform/apps/account-service/build/libs/account-service.jar \
             projects/iam-platform/apps/account-service/build/libs/account-service.jar
          mv projects/platform-console/artifact-staging/iam-platform/apps/admin-service/build/libs/admin-service.jar \
             projects/iam-platform/apps/admin-service/build/libs/admin-service.jar
          mv projects/platform-console/artifact-staging/finance-platform/apps/account-service/build/libs/account-service.jar \
             projects/finance-platform/apps/account-service/build/libs/account-service.jar
          mv projects/platform-console/artifact-staging/platform-console/apps/console-bff/build/libs/console-bff.jar \
             projects/platform-console/apps/console-bff/build/libs/console-bff.jar

      - name: Build console-web (Next.js standalone production)
        working-directory: projects/platform-console/apps/console-web
        run: pnpm build

      # ADR-MONO-041 D2: iam (auth/account/admin), finance-account, and console-bff
      # images `FROM monorepo/java-service-base:v1`. No image registry → build the
      # shared base before `compose up --build` (both phases) tries to resolve it.
      - name: Build shared java-service-base image (ADR-MONO-041 D2)
        run: docker build -t monorepo/java-service-base:v1 docker/java-service-base

      - name: Start docker compose stack (5 services + MySQL + Redis)
        working-directory: projects/platform-console
        run: |
          docker compose -f docker-compose.e2e.yml up -d --build \
            mysql redis auth-service account-service admin-service

      - name: Wait for admin-service health (gates seed.sql application)
        # admin-service has Flyway dependencies on the rest of the IAM DBs
        # being initialised. start_period=60s + healthcheck retries=12 ≈ 5 min.
        working-directory: projects/platform-console
        run: |
          echo "Waiting for admin-service health (up to ~5 min)..."
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.e2e.yml ps admin-service \
                | grep -q "healthy"; then
              echo "admin-service healthy after $((i * 10))s"
              exit 0
            fi
            sleep 10
          done
          echo "admin-service did not become healthy in time"
          docker compose -f docker-compose.e2e.yml logs --tail=50 admin-service
          exit 1

      - name: Apply seed.sql (IAM operators + OIDC tweaks + finance_db preamble)
        # Phase 1.5 — runs AFTER admin-service healthy (IAM Flyway done) and
        # BEFORE finance-account-service is started. Contents: finance_db
        # database + service user CREATE (section 1) + auth_db.credentials +
        # admin_db.admin_operators / operator_roles / admin_roles (sections
        # 2-5). The finance schema data (accounts + balances) is split into
        # seed-finance.sql per TASK-MONO-132 and applied at phase 2.5.
        working-directory: projects/platform-console
        run: |
          docker compose -f docker-compose.e2e.yml exec -T mysql \
            mysql -uroot -prootpass < apps/console-web/tests/e2e/fixtures/seed.sql

      - name: Start remaining containers (finance + console-bff + console-web)
        working-directory: projects/platform-console
        run: |
          docker compose -f docker-compose.e2e.yml up -d --build \
            finance-account-service console-bff console-web

      - name: Wait for finance-account-service health (gates seed-finance.sql application)
        # Phase 2.5 gate (TASK-MONO-132) — finance-account-service Flyway
        # V1__init.sql creates finance_db.accounts + balances tables on first
        # boot. The compose healthcheck returns UP only after Flyway has
        # applied all pending migrations. start_period=60s +
        # healthcheck retries=12 * interval=15s ≈ 4 min compose budget,
        # workflow gives 30 * 10s = 5 min grace.
        working-directory: projects/platform-console
        run: |
          echo "Waiting for finance-account-service health (up to ~5 min)..."
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.e2e.yml ps finance-account-service \
                | grep -q "healthy"; then
              echo "finance-account-service healthy after $((i * 10))s"
              exit 0
            fi
            sleep 10
          done
          echo "finance-account-service did not become healthy in time"
          docker compose -f docker-compose.e2e.yml logs --tail=50 finance-account-service
          exit 1

      - name: Apply seed-finance.sql (finance accounts + balances, post-Flyway)
        # Phase 2.5 (TASK-MONO-132) — the finance schema data moved out of
        # seed.sql so it can be INSERTed AFTER the finance Flyway runs. Mirror
        # shape of `Apply seed.sql` above; only the fixture path differs.
        working-directory: projects/platform-console
        run: |
          docker compose -f docker-compose.e2e.yml exec -T mysql \
            mysql -uroot -prootpass < apps/console-web/tests/e2e/fixtures/seed-finance.sql

      - name: Wait for console-web health
        working-directory: projects/platform-console
        run: |
          echo "Waiting for console-web health (up to ~3 min)..."
          for i in $(seq 1 18); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "console-web healthy after $((i * 10))s"
              exit 0
            fi
            sleep 10
          done
          echo "console-web did not become healthy in time"
          docker compose -f docker-compose.e2e.yml logs --tail=80 console-web console-bff
          exit 1

      - name: Install Playwright chromium
        working-directory: projects/platform-console/apps/console-web
        run: pnpm exec playwright install --with-deps chromium

      # TASK-PC-FE-028 iter 7 — runner /etc/hosts entry for the docker-internal
      # OIDC issuer hostname. Iter 1-6 attempted Chromium
      # `--host-resolver-rules` launch flag variants (port-specific, port-
      # agnostic, comma-separated with explicit localhost MAP) across 6
      # dispatch runs; the flag empirically blocked localhost resolution on
      # this runner image even with explicit `MAP localhost 127.0.0.1` rule.
      # /etc/hosts entry sidesteps the broken flag interaction: Chromium uses
      # default OS DNS path which reads /etc/hosts. Paired with docker-compose
      # `auth-service.ports: ["8081:8081"]` (iter 4 change) so the resolved
      # IP:port lands on the host-published auth-service container.
      - name: Add auth-service to /etc/hosts (PC-FE-028)
        run: echo "127.0.0.1 auth-service" | sudo tee -a /etc/hosts

      - name: Run Playwright e2e (2 specs)
        working-directory: projects/platform-console/apps/console-web
        env:
          CONSOLE_BASE_URL: http://localhost:3000
          E2E_AUTH_BASE_URL: http://localhost:8081
          E2E_ADMIN_BASE_URL: http://localhost:18085
          E2E_CONSOLE_ORIGIN: http://localhost:3000
        run: pnpm exec playwright test --project=chromium

      - name: Dump docker compose logs on failure
        # TASK-MONO-133 — 7 containers (5 IAM + finance + console-bff +
        # console-web + mysql/redis/kafka placeholder) ⇒ --tail=500 gives
        # ~70 lines per container which covers boot sequence + first request
        # access log. Prior --tail=200 truncated the post-boot access path.
        if: failure()
        working-directory: projects/platform-console
        run: docker compose -f docker-compose.e2e.yml logs --tail=500

      - name: Stop docker compose stack
        if: always()
        working-directory: projects/platform-console
        run: docker compose -f docker-compose.e2e.yml down -v

      - name: Upload Playwright report + trace
        # TASK-MONO-133 — `if: always()` (was `if: failure()`) so a successful
        # run also uploads an artifact (small baseline). Combined with
        # `trace: 'on'` in CI, every run now produces inspectable evidence.
        # `if-no-files-found: warn` is the default but stated explicitly so
        # future maintainers see the choice (vs silent skip in the prior
        # `if: failure()` shape, which masked the empty-report case).
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-console-playwright-report-nightly
          path: |
            projects/platform-console/apps/console-web/playwright-report/
            projects/platform-console/apps/console-web/test-results/
          retention-days: 7
          if-no-files-found: warn
