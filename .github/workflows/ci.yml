  iam-platform-e2e-smoke:
    name: E2E smoke (iam docker-compose)
    runs-on: ubuntu-latest
    needs: [changes, build-and-test]
    timeout-minutes: 20
    # IAM PR-time smoke job — ADR-MONO-011 § 6.2 (inherited ADR-MONO-010 § 6.2)
    # outstanding closure (TASK-MONO-088). Phase 3 nightly iam-e2e-full 의
    # 7-cycle archaeological inspection (TASK-MONO-080/081/082 + BE-278/279)
    # root cause prevention — ComposeFixture self-managed mode 의 PR-time
    # first-call validation 의무화. iam tests/e2e 모듈이 settings.gradle
    # 미등록이었기에 PR-time CI 의 어떤 job 도 ComposeFixture 호출 안 했고,
    # 7 layer 의 historical 누락이 dev/local-only 가정으로 누적되어 nightly
    # 첫 호출 시 노출되었음. 본 job 이 PR 마다 한 번씩 ComposeFixture 작동
    # 검증.
    #
    # Structure: nightly iam-e2e-full (nightly-e2e.yml L525-599) verbatim +
    # target = :e2eSmokeTest + path-filter gate = fan-platform-e2e pattern.
    # No Docker CLI image build step (ComposeFixture handles via
    # `docker compose up -d --build` in @BeforeAll). No -Pobservability=on
    # (ADR-MONO-007 § D3 CI exclusion 답습).
    if: >-
      github.repository == 'kanggle/monorepo-lab' &&
      (
        (github.event_name == 'push' && needs.changes.outputs.code-changed != 'false') ||
        needs.changes.outputs.libs == 'true' ||
        needs.changes.outputs.workflows == 'true' ||
        needs.changes.outputs.iam == 'true' ||
        needs.changes.outputs.contracts == 'true'
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 + Gradle
        uses: ./.github/actions/setup-java-gradle

      - name: Build iam boot jars
        # 5 services = docker-compose.e2e.yml `build:` directive service set
        # (auth / account / security / admin / gateway). community/membership
        # are not booted in the e2e environment. Mirrors nightly iam-e2e-full
        # (TASK-MONO-081 + ADR-MONO-011 § D5 audit, option C-1).
        run: >-
          ./gradlew
          :projects:iam-platform:apps:auth-service:bootJar
          :projects:iam-platform:apps:account-service:bootJar
          :projects:iam-platform:apps:security-service:bootJar
          :projects:iam-platform:apps:admin-service:bootJar
          :projects:iam-platform:apps:gateway-service:bootJar
          --no-daemon --stacktrace

      - name: Verify Docker (ComposeFixture prerequisite)
        run: docker info

      # ADR-MONO-041 D2: iam service images `FROM monorepo/java-service-base:v1`.
      # No image registry → build the shared base locally before the
      # ComposeFixture's `docker compose up -d --build` (invoked by the gradle
      # e2e smoke suite below) tries to resolve it.
      - name: Build shared java-service-base image (ADR-MONO-041 D2)
        run: docker build -t monorepo/java-service-base:v1 docker/java-service-base

      - name: Run iam docker-compose e2e smoke suite
        # ADR-MONO-010 D3 — PR-time runs the @Tag("smoke") subset only via
        # `:e2eSmokeTest`. Full suite (@Tag("full")) runs nightly + push to
        # main via the separate `iam-e2e-full` job in nightly-e2e.yml
        # (ADR-MONO-011 Phase 3).
        run: >-
          ./gradlew
          :projects:iam-platform:tests:e2e:e2eSmokeTest
          --no-daemon --stacktrace

      - name: Upload iam e2e smoke test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: iam-platform-e2e-smoke-test-reports
          path: |
            projects/iam-platform/tests/e2e/build/reports/tests/e2eSmokeTest/
            projects/iam-platform/tests/e2e/build/test-results/e2eSmokeTest/
          retention-days: 7

