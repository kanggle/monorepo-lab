# CI Pipeline — Global Account Platform
#
# Badge syntax (add to README.md):
#   ![CI](https://github.com/<owner>/global-account-platform/actions/workflows/ci.yml/badge.svg)
#
# Triggers: push to main/master, PR to main/master

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Backend — Gradle build + unit tests
  # ---------------------------------------------------------------------------
  build-backend:
    name: Build & Test (Backend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build --no-daemon
        env:
          GRADLE_OPTS: "-Xmx2g"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            apps/*/build/reports/tests/
            libs/*/build/reports/tests/
            apps/*/build/test-results/
            libs/*/build/test-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2: Frontend — Next.js build
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Build (Frontend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build admin-web
        working-directory: apps/admin-web
        run: pnpm run build

  # ---------------------------------------------------------------------------
  # Job 3: Docker — verify all service images build correctly (no push)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build (Verify)
    runs-on: ubuntu-latest
    needs: build-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build bootJar for all services
        run: |
          ./gradlew \
            :apps:auth-service:bootJar \
            :apps:account-service:bootJar \
            :apps:admin-service:bootJar \
            :apps:security-service:bootJar \
            :apps:gateway-service:bootJar \
            :apps:community-service:bootJar \
            :apps:membership-service:bootJar \
            --no-daemon
        env:
          GRADLE_OPTS: "-Xmx2g"

      - name: Verify Docker images build
        run: docker compose -f docker-compose.e2e.yml build --no-cache

  # ---------------------------------------------------------------------------
  # Job 4: E2E — full integration test (main branch push only)
  # ---------------------------------------------------------------------------
  e2e-test:
    name: E2E Integration Test
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build bootJar for all services
        run: |
          ./gradlew \
            :apps:auth-service:bootJar \
            :apps:account-service:bootJar \
            :apps:admin-service:bootJar \
            :apps:security-service:bootJar \
            :apps:gateway-service:bootJar \
            :apps:community-service:bootJar \
            :apps:membership-service:bootJar \
            --no-daemon
        env:
          GRADLE_OPTS: "-Xmx2g"

      - name: Start E2E stack
        run: docker compose -f docker-compose.e2e.yml -p gap-e2e up -d --build

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for MySQL..."
          until docker compose -f docker-compose.e2e.yml -p gap-e2e exec -T mysql \
            mysqladmin ping -h localhost -u root -prootpass --silent; do
            sleep 5
          done

          echo "Waiting for Kafka..."
          until docker compose -f docker-compose.e2e.yml -p gap-e2e exec -T kafka \
            /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1; do
            sleep 5
          done

          echo "Waiting for application services (120s max)..."
          sleep 120

      - name: Run E2E tests
        run: ./gradlew :tests:e2e:test --no-daemon
        env:
          GRADLE_OPTS: "-Xmx1g"

      - name: Upload E2E test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports
          path: tests/e2e/build/reports/tests/
          retention-days: 14

      - name: Dump service logs on failure
        if: failure()
        run: docker compose -f docker-compose.e2e.yml -p gap-e2e logs --tail=200

      - name: Tear down E2E stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml -p gap-e2e down -v
