name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ---------------------------------------------------------------------------
  # changes — single source of truth for path-based job filtering.
  #
  # dorny/paths-filter@v3 computes which project areas were touched in this
  # PR / push. Every downstream job reads these outputs via `needs.changes`
  # and applies:
  #
  #   if: needs.changes.outputs.libs == 'true'
  #       || needs.changes.outputs.workflows == 'true'
  #       || needs.changes.outputs.<project> == 'true'
  #
  # Filter rules (path → flag):
  #   libs       libs/ platform/ rules/ .claude/ build.gradle settings.gradle
  #              package.json tsconfig.base.json tasks/templates/
  #              → activates ALL downstream jobs (cross-project impact)
  #   workflows  .github/workflows/
  #              → activates ALL downstream jobs (CI self-change safety)
  #   wms        projects/wms-platform/**
  #   ecommerce  projects/ecommerce-microservices-platform/**
  #   iam        projects/iam-platform/**
  #   fan        projects/fan-platform/**
  #   scm        projects/scm-platform/**
  #   contracts  projects/*/specs/contracts/**
  #              → force-full e2e: cross-service consumer breakage gate
  #              (single project's contract change → 5 project + frontend smoke
  #              e2e all activate, even if only one project's flag matched).
  #   code-changed  pure-positive enumeration of code-bearing file extensions
  #                 (.java, .ts, .tsx, .gradle, .yaml, .json, .sql, ...).
  #                 markdown-only / docs-only / lifecycle-only PRs do not
  #                 match → false. AND-combined with libs/5-project flags in
  #                 the outputs section so those flags become `false` for
  #                 non-code PRs even when the underlying `paths-filter`
  #                 negation quirk would otherwise mark them true.
  #
  # IMPORTANT — `paths-filter@v3` negation quirk (TASK-MONO-075):
  #   Under the default `predicate-quantifier: 'some'`, a negation pattern
  #   (`!...`) is treated as "file matches iff it does NOT match the inner
  #   glob". For a markdown-only PR, file `tasks/INDEX.md` therefore satisfies
  #   `!projects/wms-platform/**/*.md` (file is NOT under wms-platform) → the
  #   pattern counts as matched → `wms` filter = true even though no positive
  #   matched. This is documented behavior (README: "filters below will match
  #   markdown files despite the exclusion syntax UNLESS you specify 'every'").
  #   Step-level `predicate-quantifier: 'every'` would force all positives in a
  #   filter to AND, breaking the multi-positive `libs` filter — so we instead
  #   AND a pure-positive `code-changed` gate at the outputs layer. The legacy
  #   negation patterns in the 5 project flags are kept as documentation; they
  #   have no operative effect (the outputs-level AND is the real gate).
  #
  # Edge case — workflow self-change PR (.github/workflows/** modified):
  #   The `workflows` flag catches it → all jobs activate (regression safety).
  #
  # Push-to-main fallback (TASK-MONO-343):
  #   The `if:` conditions below use
  #     (github.event_name == 'push' && needs.changes.outputs.code-changed != 'false')
  #   so a main push runs the heavy lanes UNLESS the filter positively said there
  #   is no code change.  Two properties depend on this exact spelling:
  #
  #   * `!= 'false'` — NOT `== 'true'`.  If dorny/paths-filter fails or is skipped,
  #     every output is the empty string.  `'' != 'false'` is TRUE, so main still
  #     runs everything and branch protection survives a filter failure.  Written
  #     as `== 'true'` that fallback silently disappears and a regression could
  #     land on main with zero verification.  This is the trap of this file.
  #
  #   * The fallback used to be an unconditional `github.event_name == 'push' ||`,
  #     which overrode the filter verdict on every main push.  Doc-only commits
  #     therefore ran all 8+ Testcontainers lanes — zero lines of code to regress,
  #     so zero signal, while main appeared flake-RED and eroded the "is main
  #     GREEN" check that the merge discipline (CLAUDE.md 3-dim) rests on.
  #     On 2026-07-10, three of three doc-only main commits went RED this way.
  #
  # Edge case — root tasks/** or markdown-only change:
  #   No project flag is true; libs/workflows are also false; contracts is false;
  #   code-changed is false.  All heavy jobs skip, on PRs *and* on main pushes.
  #   TASK-MONO-045 baseline → TASK-MONO-058 (project tasks/) →
  #   TASK-MONO-074 (markdown-only, contracts force-full) → TASK-MONO-343.
  #   `build-and-test` skips too: with no code change there is nothing to compile,
  #   and no workflow consumes its artifacts across runs (nightly-e2e.yml builds
  #   its own boot jars in-run; there is no `workflow_run` / `run-id` consumer).
  #
  # Edge case — contracts-only change (markdown under specs/contracts/**):
  #   `code-changed` is false, but the `contracts` flag is pure-positive and is
  #   NOT AND-ed with code-changed, so it still force-fulls e2e as its own OR term.
  #   Do not AND `contracts` with `code-changed` — that kills the cross-service
  #   consumer-breakage gate (TASK-MONO-074).
  #
  # Edge case — contracts-only PR (single project's specs/contracts/** change):
  #   `contracts` flag activates → all 4 e2e jobs (wms e2e-tests +
  #   fan-platform-e2e + scm-platform-e2e + frontend-e2e-smoke) trigger
  #   regardless of which project the contract belongs to.  Catches
  #   cross-service consumer breakage that single-project flag would miss.
  #
  # E2E smoke vs full split (ADR-MONO-010 / TASK-MONO-076, Phase 2 +
  # ADR-MONO-011 / TASK-MONO-079, Phase 3 wired):
  #   PR-time e2e jobs (`e2e-tests`, `fan-platform-e2e`, `scm-platform-e2e`,
  #   `iam-platform-e2e-smoke`) invoke `:e2eSmokeTest` Gradle task → only
  #   `@Tag("smoke")` classes/methods run (the cross-service happy-path /
  #   cheap-edge subset). `@Tag("full")` classes/methods (edge / resilience /
  #   long flow / cross-project / DLQ / circuit breaker / multi-step lifecycle)
  #   run nightly + push-to-main only via separate `e2eFullTest` jobs in
  #   nightly-e2e.yml. Timeout per PR-time smoke job is shortened accordingly
  #   (60 → 20 wms, 20 → 10 fan, 25 → 12 scm, iam 20). Per-test smoke budget
  #   = ≤ 30 s wall-clock excluding container cold-start (ADR § D1).
  #   iam-platform-e2e-smoke (TASK-MONO-088) is the PR-time first-call
  #   validation for ComposeFixture self-managed mode — ADR-MONO-011 § 6.2
  #   (inherited ADR-MONO-010 § 6.2) outstanding closure / Phase 3 의
  #   7-cycle archaeological inspection root cause prevention.
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      # TASK-MONO-075: dorny/paths-filter@v3 default `predicate-quantifier: 'some'`
      # treats negation patterns (`!...`) as "file is matched if it satisfies the
      # negation" — i.e. a markdown-only PR with no positive match still produces
      # `wms = true` because the `!projects/wms-platform/**/*.md` negation is
      # satisfied (file is NOT under that glob). See ADR-MONO-... or the README
      # quote: "The filters below will match markdown files despite the exclusion
      # syntax UNLESS you specify 'every' as the predicate-quantifier parameter."
      # Step-level `predicate-quantifier: 'every'` is incompatible with our
      # multi-positive `libs` filter (would force all positives to AND).
      #
      # Fix: compose each code-area flag with the `code-changed` positive flag at
      # the outputs layer. `code-changed` is a pure-positive enumeration of code
      # file extensions, so its `'some'` evaluation is intuitive (markdown-only
      # PR → no positive match → flag false). AND-ing the two gates ensures that
      # markdown-only PRs land on `false` for every code-area flag downstream.
      # `workflows` / `contracts` / `observability` already have pure-positive
      # filters and need no compose.
      libs: ${{ steps.filter.outputs.libs == 'true' && steps.filter.outputs.code-changed == 'true' }}
      workflows: ${{ steps.filter.outputs.workflows }}
      wms: ${{ steps.filter.outputs.wms == 'true' && steps.filter.outputs.code-changed == 'true' }}
      ecommerce: ${{ steps.filter.outputs.ecommerce == 'true' && steps.filter.outputs.code-changed == 'true' }}
      iam: ${{ steps.filter.outputs.iam == 'true' && steps.filter.outputs.code-changed == 'true' }}
      fan: ${{ steps.filter.outputs.fan == 'true' && steps.filter.outputs.code-changed == 'true' }}
      scm: ${{ steps.filter.outputs.scm == 'true' && steps.filter.outputs.code-changed == 'true' }}
      finance: ${{ steps.filter.outputs.finance == 'true' && steps.filter.outputs.code-changed == 'true' }}
      erp: ${{ steps.filter.outputs.erp == 'true' && steps.filter.outputs.code-changed == 'true' }}
      platform-console: ${{ steps.filter.outputs.platform-console == 'true' && steps.filter.outputs.code-changed == 'true' }}
      contracts: ${{ steps.filter.outputs.contracts }}
      observability: ${{ steps.filter.outputs.observability }}
      # TASK-MONO-341: integrated demo wrapper (infra/demo). Pure-positive filter,
      # AND-composed with `code-changed` so a README-only edit under infra/demo
      # skips the smoke while the .sh / docker-compose.yml surfaces still trigger it.
      demo-wrapper: ${{ steps.filter.outputs.demo-wrapper == 'true' && steps.filter.outputs.code-changed == 'true' }}
      # TASK-MONO-345: raw filter — deliberately NOT AND-combined with
      # `code-changed`. The guard's whole purpose is to catch a markdown edit to
      # docs/project-overview.md that drifts from settings.gradle; a doc-only
      # change has code-changed == 'false', so AND-combining would disable the
      # guard exactly on the change it exists to police.
      service-map: ${{ steps.filter.outputs.service-map }}
      # Same reasoning as service-map above: deleting a row from error-handling.md is a
      # docs-only diff, and that is precisely the change the guard must catch.
      error-registry: ${{ steps.filter.outputs.error-registry }}
      # TASK-MONO-360: same reasoning again, and this one is the reason the rule
      # exists. TASK-MONO-347's drift ARRIVES as a one-line markdown edit — a
      # PROJECT.md that promises a `gateway-service` the build never builds.
      # AND-combining with `code-changed` would switch the guard off on exactly
      # the diff it is here to police.
      gateway-policy: ${{ steps.filter.outputs.gateway-policy }}
      # TASK-MONO-363: same rule a fourth time, and here it is unavoidable. This
      # drift arrives as `git add docs/adr/ADR-MONO-050-*.md` — a markdown-only
      # diff, by construction. AND-combining with `code-changed` would skip the
      # guard on literally every change it exists to catch, and a skipped job
      # reports green.
      adr-index: ${{ steps.filter.outputs.adr-index }}
      code-changed: ${{ steps.filter.outputs.code-changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            libs:
              - 'libs/**'
              - 'platform/**'
              - 'rules/**'
              - '.claude/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'package.json'
              - 'tsconfig.base.json'
              - 'tasks/templates/**'
              - '!**/*.md'
            workflows:
              - '.github/workflows/**'
            wms:
              - 'projects/wms-platform/**'
              - '!projects/wms-platform/tasks/**'
              - '!projects/wms-platform/**/*.md'
            ecommerce:
              - 'projects/ecommerce-microservices-platform/**'
              - '!projects/ecommerce-microservices-platform/tasks/**'
              - '!projects/ecommerce-microservices-platform/**/*.md'
            iam:
              - 'projects/iam-platform/**'
              - '!projects/iam-platform/tasks/**'
              - '!projects/iam-platform/**/*.md'
            fan:
              - 'projects/fan-platform/**'
              - '!projects/fan-platform/tasks/**'
              - '!projects/fan-platform/**/*.md'
            scm:
              - 'projects/scm-platform/**'
              - '!projects/scm-platform/tasks/**'
              - '!projects/scm-platform/**/*.md'
            finance:
              - 'projects/finance-platform/**'
              - '!projects/finance-platform/tasks/**'
              - '!projects/finance-platform/**/*.md'
            erp:
              - 'projects/erp-platform/**'
              - '!projects/erp-platform/tasks/**'
              - '!projects/erp-platform/**/*.md'
            # TASK-PC-BE-001: pure-positive filter for platform-console backend
            # (console-bff). No negation patterns (MONO-074/075 quirk rule).
            # TASK-PC-FE-021: also covers console-web so the new
            # `frontend-e2e-smoke` platform-console-web stage activates when the
            # FE app or its docker-compose surface changes. Pure-positive +
            # AND-combined with `code-changed` upstream so markdown-only PRs
            # under console-web still skip (TS/JSON/YAML changes do trigger).
            platform-console:
              - 'projects/platform-console/apps/console-bff/**'
              - 'projects/platform-console/apps/console-web/**'
              - 'projects/platform-console/docker-compose.yml'
              - 'projects/platform-console/docker-compose.e2e.yml'
            contracts:
              - 'projects/*/specs/contracts/**'
            observability:
              - 'infra/observability/**'
              - 'scripts/observability/**'
            # TASK-MONO-341: the integrated demo wrapper depends on (1) every
            # project compose rendering standalone, (2) globally-unique
            # container_name, (3) no host-port collision, (4) every project
            # compose being registered in infra/demo/projects.sh. Any of these
            # breaking makes the demo boot silently incomplete.
            # Pure-positive (no negation — MONO-074/075 quirk rule).
            demo-wrapper:
              - 'infra/demo/**'
              - 'infra/traefik/**'
              - 'projects/*/docker-compose.yml'
            # TASK-MONO-345: docs/project-overview.md carries a hand-maintained
            # service map per project. settings.gradle is the only inventory the
            # build reads. When they diverge, the doc is silently wrong and no
            # procedure fails — the same failure class as MONO-339 (fed-e2e
            # bring-up list) and MONO-341 (demo wrapper map).
            # Pure-positive (no negation — MONO-074/075 quirk rule).
            service-map:
              - 'settings.gradle'
              - 'docs/project-overview.md'
              - 'scripts/check-service-map-drift.sh'
            # TASK-MONO-352: platform/error-handling.md declares itself "the single
            # authoritative registry" and mandates that every new error code be added
            # to it — but nothing enforced that, and 37 live codes had drifted out.
            # Any Java change can introduce a new emitted code, so this filter is
            # deliberately wide on the source tree.
            # Pure-positive (no negation — MONO-074/075 quirk rule).
            error-registry:
              - '**/*.java'
              - 'platform/error-handling.md'
              - 'scripts/check-error-code-registry.sh'
            # TASK-MONO-360 (carries TASK-MONO-347 AC-3): three hand-maintained
            # declarations about gateways — api-gateway-policy.md prose,
            # PROJECT.md, and the compose Traefik labels — against one build
            # truth, settings.gradle. Nothing compared them, and for months
            # finance/erp had no gateway while their PROJECT.md said v1-IN and
            # Traefik routed finance.local straight at account-service.
            # Pure-positive (no negation — MONO-074/075 quirk rule).
            gateway-policy:
              - 'settings.gradle'
              - 'projects/*/PROJECT.md'
              - 'projects/*/docker-compose.yml'
              - 'platform/api-gateway-policy.md'
              - 'scripts/check-gateway-drift.sh'
              # TASK-MONO-365: the guard's I3 reads the gateways' own application.yml
              # (the `iss` allowlist). Without this path the check could never fire on
              # the change it polices — MONO-359's lesson: a guard must not only be able
              # to bite, it must get the chance to, and a job that never runs reports
              # GREEN.
              - 'projects/*/apps/gateway-service/src/main/resources/application.yml'
              # TASK-MONO-368: I4 reads the gateways' rate-limit keying source. The
              # regression it guards (dropping the account segment, so every authenticated
              # caller shares one bucket) arrives as a .java edit under this path and
              # nowhere else.
              - 'projects/*/apps/gateway-service/src/main/java/**/*RateLimit*.java'
            # TASK-MONO-363: docs/adr/INDEX.md is the only entry point for "has this
            # already been decided?". It died at ADR-MONO-012a and by 2026-07-12 was
            # missing 38 of 53 ADRs — and was wrong about one it did list (008 was
            # ACCEPTED on 2026-05-18; the table still said PROPOSED). Nothing failed,
            # because the index is prose.
            # Pure-positive (no negation — MONO-074/075 quirk rule).
            adr-index:
              - 'docs/adr/**'
              - 'scripts/check-adr-index-drift.sh'
            # TASK-MONO-075: pure-positive enumeration of code-bearing file
            # extensions. `'some'` quantifier behaves intuitively here (no
            # negation → no quirk). markdown-only / docs-only / lifecycle-only
            # PRs do not match any positive → flag = false. AND-combined with
            # each code-area flag in `outputs` above to gate downstream jobs.
            code-changed:
              - '**/*.java'
              - '**/*.kt'
              - '**/*.kts'
              - '**/*.gradle'
              - '**/*.gradle.kts'
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.mjs'
              - '**/*.cjs'
              - '**/*.yaml'
              - '**/*.yml'
              - '**/*.json'
              - '**/*.xml'
              - '**/*.sql'
              - '**/*.sh'
              - '**/*.ps1'
              - '**/*.properties'
              - '**/*.css'
              - '**/*.scss'
              - '**/*.pem'
              - '**/Dockerfile'
              - '**/Dockerfile.*'
              - '**/.env'
              - '**/.env.*'

  # ---------------------------------------------------------------------------
  # TASK-MONO-341 — integrated demo wrapper regression guard.
  #
  # TASK-MONO-336 replaced the (impossible) single merged compose file with a
  # per-project `-p` wrapper, because docker compose `include:` / `-f` SILENTLY
  # merge services that share a compose key (redis x7, kafka x6, postgres x3 ...)
  # — 6 of 7 redis would vanish with no error.
  #
  # This job locks in the four invariants that make the wrapper valid, plus a
  # live proof that two same-keyed services really do coexist under separate -p.
  #
  # Scope note: `full` (41 JVMs, 32-48GB RAM) and even `demo-core` (~26 services)
  # exceed a GitHub runner (16GB). Real boot smoke stays EC2-authoritative
  # (m6i.4xlarge / 64GB) per MONO-336's carried-forward item. The live proof here
  # is deliberately minimal: two redis:7-alpine containers.
  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # TASK-MONO-345 — service-map drift guard.
  #
  # docs/project-overview.md hand-maintains a service map per project. The build
  # only ever reads settings.gradle. On 2026-07-10 the two had drifted by eight
  # entries (2 phantom services documented but never built, 5 shipped services
  # never documented, 1 decommissioned service still described as current) and
  # nothing failed — the doc is not executable, so the drift was invisible to
  # every reader who did not independently open settings.gradle.
  #
  # This job is cheap (a few hundred ms of bash) and gates both directions.
  # ---------------------------------------------------------------------------
  service-map-drift:
    name: Service map drift (settings.gradle vs project-overview.md)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: needs.changes.outputs.service-map == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax (bash -n)
        run: bash -n scripts/check-service-map-drift.sh

      - name: Guard — settings.gradle <-> docs/project-overview.md
        run: bash scripts/check-service-map-drift.sh

  # ---------------------------------------------------------------------------
  # TASK-MONO-360 — gateway declaration / exposure drift guard.
  # (Carries TASK-MONO-347 AC-3, which TASK-MONO-357 did not satisfy.)
  #
  # api-gateway-policy.md declares without exception that every project has a
  # gateway, that all external traffic passes through it, and that no backend is
  # directly exposed. For months finance and erp had no gateway module at all —
  # while their own PROJECT.md files listed gateway-service as v1-IN, and Traefik
  # routed finance.local straight at account-service and split erp.local across
  # four backends by PathPrefix. Policy, plan and code each said a different
  # thing, the L13/L14 violation was live, and nothing failed.
  #
  # MONO-357 created the two gateways. It closed the INSTANCE of that drift; it
  # did not close the PATH by which it recurs. MONO-345's service-map guard reads
  # settings.gradle and docs/project-overview.md only — neither PROJECT.md nor the
  # compose Traefik labels. This job covers those two axes.
  #
  # Note the filter above is NOT AND-combined with `code-changed`: this drift
  # arrives as a one-line markdown edit to a PROJECT.md.
  # ---------------------------------------------------------------------------
  gateway-drift:
    name: Gateway drift (PROJECT.md / settings.gradle / Traefik labels)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: needs.changes.outputs.gateway-policy == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax (bash -n)
        run: bash -n scripts/check-gateway-drift.sh

      - name: Guard — gateway declaration <-> module <-> exposure
        run: bash scripts/check-gateway-drift.sh

  # ---------------------------------------------------------------------------
  # TASK-MONO-363 — ADR index drift guard.
  #
  # docs/adr/INDEX.md is where anyone — human or agent — looks to find out what
  # has already been decided. If a decision is not there, the honest conclusion
  # is that it was never made, and it gets made again. The table stopped being
  # updated at ADR-MONO-012a (2026-05-15); by 2026-07-12 it was missing 38 of 53
  # ADRs, including 013 (console), 019 (tenant model), 022 (fulfillment), 043
  # (notification), 047 (org-node) and 048 (gateway library) — and it was wrong
  # about one of the 15 it did carry: ADR-MONO-008 was ACCEPTED on 2026-05-18 and
  # the row still read PROPOSED, for two months.
  #
  # The Status check is the sharp one. PROPOSED -> ACCEPTED is a human gate here
  # (an agent may not self-ACCEPT), so an index that disagrees with its ADR is
  # either hiding a decision or inventing one.
  #
  # The filter is NOT AND-combined with `code-changed` — see the outputs block.
  # Cheap (a few hundred ms of bash).
  # ---------------------------------------------------------------------------
  adr-index-drift:
    name: ADR index drift (docs/adr/*.md vs docs/adr/INDEX.md)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: needs.changes.outputs.adr-index == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax (bash -n)
        run: bash -n scripts/check-adr-index-drift.sh

      - name: Guard — every ADR is indexed, no phantom rows, Status matches
        run: bash scripts/check-adr-index-drift.sh

  # ---------------------------------------------------------------------------
  # TASK-MONO-352: platform/error-handling.md calls itself the single authoritative
  # error registry and mandates registration before use — as prose, which nothing
  # checked. 37 live codes had drifted out of it, including whole ADR-045/047 code
  # families. This makes the protocol enforceable. Cheap (a few hundred ms of bash).
  # ---------------------------------------------------------------------------
  error-code-registry:
    name: Error code registry (emitted codes vs platform/error-handling.md)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: needs.changes.outputs.error-registry == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax (bash -n)
        run: bash -n scripts/check-error-code-registry.sh

      - name: Guard — every emitted error code is registered
        run: bash scripts/check-error-code-registry.sh

  demo-wrapper-smoke:
    name: Demo wrapper smoke (infra/demo)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.demo-wrapper == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax (bash -n)
        run: |
          for f in infra/demo/projects.sh \
                   infra/demo/demo-up.sh \
                   infra/demo/demo-down.sh \
                   infra/demo/verify-demo-wrapper.sh; do
            bash -n "$f"
            echo "ok $f"
          done

      - name: Verify wrapper invariants + live coexistence proof
        run: bash infra/demo/verify-demo-wrapper.sh --live

      - name: Teardown safety net
        if: always()
        run: |
          docker ps -a --filter 'name=scm-platform-redis' \
                      --filter 'name=fan-platform-redis' -q \
            | xargs -r docker rm -f

  build-and-test:
    name: Build & Test (JDK 21, Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changes
    # Activate when:
    #   - any shared library / cross-project path changed (libs, workflows)
    #   - any project's backend code changed (wms, ecommerce, iam, fan, scm, finance, erp)
    #   - push to main always runs (safety net regardless of filter)
    # spec/chore PRs (tasks/** or *.md only) produce no matching flag → skip.
    if: >-
      (github.event_name == 'push' && needs.changes.outputs.code-changed != 'false') ||
      needs.changes.outputs.libs == 'true' ||
      needs.changes.outputs.workflows == 'true' ||
      needs.changes.outputs.wms == 'true' ||
      needs.changes.outputs.ecommerce == 'true' ||
      needs.changes.outputs.iam == 'true' ||
      needs.changes.outputs.fan == 'true' ||
      needs.changes.outputs.scm == 'true' ||
      needs.changes.outputs.finance == 'true' ||
      needs.changes.outputs.erp == 'true' ||
      needs.changes.outputs.platform-console == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 + Gradle
        uses: ./.github/actions/setup-java-gradle

      - name: Verify Docker (Testcontainers prerequisite)
        run: docker info

      - name: Build and test (libs + wms-platform + ecommerce backend)
        # Scope rationale:
        # - libs/* and wms-platform/* always run (the wms baseline).
        # - ecommerce-microservices-platform/* run on a per-service basis after
        #   TASK-MONO-004 added @Tag("integration") to Testcontainers-backed
        #   classes and made the default :test task Docker-free.
        # - 11 ecommerce backend services run (auth-service removed by TASK-BE-132).
        # Use :check (not :test) on every entry — matches the wms style, and
        # picks up jacoco / lint where defined.
        run: >-
          ./gradlew
          :libs:java-common:check
          :libs:java-messaging:check
          :libs:java-observability:check
          :libs:java-security:check
          :libs:java-test-support:check
          :libs:java-web:check
          :projects:wms-platform:apps:gateway-service:check
          :projects:wms-platform:apps:inbound-service:check
          :projects:wms-platform:apps:inventory-service:check
          :projects:wms-platform:apps:outbound-service:check
          :projects:wms-platform:apps:master-service:check
          :projects:wms-platform:apps:notification-service:check
          :projects:wms-platform:apps:admin-service:check
          :projects:ecommerce-microservices-platform:apps:batch-worker:check
          :projects:ecommerce-microservices-platform:apps:gateway-service:check
          :projects:ecommerce-microservices-platform:apps:notification-service:check
          :projects:ecommerce-microservices-platform:apps:order-service:check
          :projects:ecommerce-microservices-platform:apps:payment-service:check
          :projects:ecommerce-microservices-platform:apps:product-service:check
          :projects:ecommerce-microservices-platform:apps:promotion-service:check
          :projects:ecommerce-microservices-platform:apps:review-service:check
          :projects:ecommerce-microservices-platform:apps:search-service:check
          :projects:ecommerce-microservices-platform:apps:settlement-service:check
          :projects:ecommerce-microservices-platform:apps:shipping-service:check
          :projects:ecommerce-microservices-platform:apps:user-service:check
          --no-daemon --stacktrace

      - name: Build and check IAM backend (Docker-free)
        # IAM integration tests carry @Tag("integration") (either directly or
        # via AbstractIntegrationTest base) and are excluded from `:test` /
        # `:check` by `projects/iam-platform/build.gradle`. They
        # run in the dedicated `iam-integration-tests` job below. This step
        # therefore stays Docker-free. The tests/e2e module's default `test`
        # carries `excludeTags 'e2e'` (fan/scm pattern, TASK-MONO-080) so its
        # `:check` invocation is also Docker-free.
        run: >-
          ./gradlew
          :projects:iam-platform:apps:auth-service:check
          :projects:iam-platform:apps:account-service:check
          :projects:iam-platform:apps:admin-service:check
          :projects:iam-platform:apps:community-service:check
          :projects:iam-platform:apps:gateway-service:check
          :projects:iam-platform:apps:membership-service:check
          :projects:iam-platform:apps:security-service:check
          :projects:iam-platform:tests:e2e:check
          --no-daemon --stacktrace

      - name: Build and check fan-platform backend (Docker-free)
        # fan-platform integration tests carry @Tag("integration"); the e2e
        # module's tests carry @Tag("e2e"). Both are excluded from default
        # :test/:check tasks (see each module's build.gradle). The e2e job
        # below runs them with Docker.
        run: >-
          ./gradlew
          :projects:fan-platform:apps:gateway-service:check
          :projects:fan-platform:apps:community-service:check
          :projects:fan-platform:apps:artist-service:check
          :projects:fan-platform:apps:membership-service:check
          :projects:fan-platform:apps:notification-service:check
          :projects:fan-platform:tests:e2e:check
          --no-daemon --stacktrace

      - name: Build and check scm-platform backend (Docker-free)
        # scm-platform integration tests carry @Tag("integration") and are
        # excluded from default :test/:check tasks (see each module's
        # build.gradle). Docker-backed integrationTest is invoked separately
        # on dev environments / scm-integration-tests job below.
        # TASK-SCM-BE-001: gateway-service
        # TASK-SCM-BE-002: procurement-service
        # TASK-SCM-BE-003: inventory-visibility-service
        # TASK-SCM-BE-024: demand-planning-service
        run: >-
          ./gradlew
          :projects:scm-platform:apps:gateway-service:check
          :projects:scm-platform:apps:procurement-service:check
          :projects:scm-platform:apps:inventory-visibility-service:check
          :projects:scm-platform:apps:demand-planning-service:check
          --no-daemon --stacktrace

      - name: Build and check finance-platform backend (Docker-free)
        # finance-platform integration tests carry @Tag("integration") and are
        # excluded from default :test/:check tasks (see account-service
        # build.gradle). Docker-backed integrationTest is invoked separately
        # on dev environments / finance-integration-tests job below.
        # TASK-FIN-BE-001: account-service / TASK-FIN-BE-007: ledger-service
        run: >-
          ./gradlew
          :projects:finance-platform:apps:account-service:check
          :projects:finance-platform:apps:ledger-service:check
          --no-daemon --stacktrace

      - name: Build and check erp-platform backend (Docker-free)
        # erp-platform integration tests carry @Tag("integration") and are
        # excluded from default :test/:check tasks (see masterdata-service
        # build.gradle). Docker-backed integrationTest is invoked separately
        # on dev environments / erp-integration-tests job below.
        # TASK-ERP-BE-001: masterdata-service / TASK-ERP-BE-007: read-model-service
        # TASK-ERP-BE-009: approval-service / TASK-ERP-BE-011: notification-service
        run: >-
          ./gradlew
          :projects:erp-platform:apps:masterdata-service:check
          :projects:erp-platform:apps:read-model-service:check
          :projects:erp-platform:apps:approval-service:check
          :projects:erp-platform:apps:notification-service:check
          --no-daemon --stacktrace

      - name: Build and check platform-console backend (Docker-free)
        # platform-console console-bff integration tests carry @Tag("integration")
        # and are excluded from default :test/:check tasks (see console-bff
        # build.gradle). Docker-backed integrationTest is invoked separately
        # in the platform-console-bff-integration-tests job below.
        # TASK-PC-BE-001: console-bff (ADR-MONO-017 ACCEPTED post-ACCEPTED execution)
        run: >-
          ./gradlew
          :projects:platform-console:apps:console-bff:check
          --no-daemon --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7

  boot-jars:
