          ./gradlew
          :projects:ecommerce-microservices-platform:apps:batch-worker:bootJar
          :projects:ecommerce-microservices-platform:apps:gateway-service:bootJar
          :projects:ecommerce-microservices-platform:apps:notification-service:bootJar
          :projects:ecommerce-microservices-platform:apps:order-service:bootJar
          :projects:ecommerce-microservices-platform:apps:payment-service:bootJar
          :projects:ecommerce-microservices-platform:apps:product-service:bootJar
          :projects:ecommerce-microservices-platform:apps:promotion-service:bootJar
          :projects:ecommerce-microservices-platform:apps:review-service:bootJar
          :projects:ecommerce-microservices-platform:apps:search-service:bootJar
          :projects:ecommerce-microservices-platform:apps:settlement-service:bootJar
