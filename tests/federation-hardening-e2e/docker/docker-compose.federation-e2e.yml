# =============================================================================
# TASK-MONO-139 — Phase 8 Federation Hardening E2E Compose
# =============================================================================
# Cross-product e2e overlay. Boots 11+ services across all 5 backend domains.
# ADR-MONO-018 D1/D2/D3. HARDSTOP-04: producer specs / ADR byte-unchanged.
#
# Phase 1 (started first via `docker compose up -d ...`):
#   - mysql:8.0 (shared: auth_db / account_db / admin_db / finance_db / erp_db)
#   - redis:7-alpine
#   - kafka (DNS-only placeholder — TASK-PC-FE-023 pattern)
#   - auth-service (GAP OIDC AS)
#   - account-service (GAP account read)
#   - admin-service (GAP operator-token issuer + registry)
#
# Phase 1.5 (seed.sql applied via `docker compose exec -T mysql mysql ...`):
#   - auth_db.credentials + admin_db.admin_operators/roles
#   - finance_db + erp_db CREATE DATABASE
#
# Phase 2 (started after phase 1.5):
#   - wms-postgres (PostgreSQL for master-service)
#   - scm-postgres  (PostgreSQL for procurement-service)
#   - wms-master-service (wms domain read endpoint /api/v1/master/warehouses)
#   - scm-procurement-service (scm domain read endpoint /api/scm/purchase-orders)
#   - finance-account-service (finance read endpoint /api/finance/accounts/{id})
#   - erp-masterdata-service (erp read endpoint /api/erp/masterdata/employees)
#   - console-bff (Spring Boot orchestrator — operator-overview + domain-health)
#   - console-web (Next.js Playwright target)
#
# Phase 2.5 (seed-domains.sql + seed-wms.sql + seed-scm.sql applied):
#   - finance_db.accounts + balances (via mysql exec)
#   - erp_db.departments + employees (via mysql exec)
#   - wms warehouses (via psql exec against wms-postgres)
#   - scm purchase_orders (via psql exec against scm-postgres)
#
# console-bff outbound wiring (replaces 127.0.0.1:9 placeholder):
#   CONSOLE_BFF_OUTBOUND_WMS_BASE_URL=http://wms-master-service:8081
#   CONSOLE_BFF_OUTBOUND_SCM_BASE_URL=http://scm-procurement-service:8080
#   CONSOLE_BFF_OUTBOUND_ERP_BASE_URL=http://erp-masterdata-service:8080
#
# Usage (local dev):
#   ./gradlew :projects:global-account-platform:apps:auth-service:bootJar ...
#   docker compose -f docker-compose.federation-e2e.yml up -d --build mysql redis kafka auth-service account-service admin-service
#   # wait for admin-service healthy
#   docker compose -f docker-compose.federation-e2e.yml exec -T mysql mysql -uroot -prootpass < ../fixtures/seed.sql
#   docker compose -f docker-compose.federation-e2e.yml up -d --build wms-postgres scm-postgres wms-master-service scm-procurement-service finance-account-service erp-masterdata-service console-bff console-web
#   # wait for all healthy, then apply seed-domains.sql + seed-wms.sql + seed-scm.sql
# =============================================================================

name: federation-hardening-e2e

x-gap-service-env: &gap-service-env
  SPRING_PROFILES_ACTIVE: e2e
  DB_HOST: mysql
  DB_PORT: "3306"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ""
  # Kafka is DNS-only placeholder (TASK-PC-FE-023 pattern). GAP services bind
  # KAFKA_BOOTSTRAP_SERVERS at boot but e2e specs never exercise event paths.
  KAFKA_BOOTSTRAP_SERVERS: 127.0.0.1:9999
  JAVA_TOOL_OPTIONS: "-Dnetworkaddress.cache.ttl=0 -Dnetworkaddress.cache.negative.ttl=0"
  OIDC_ISSUER_URL: http://auth-service:8081

services:
  # ---------------------------------------------------------------------------
  # MySQL — shared instance for GAP + finance + erp schemas.
  # Reuses the GAP init.sh verbatim (creates auth_db / account_db /
  # security_db / admin_db / community_db / membership_db).
  # finance_db + erp_db are created at phase 1.5 via seed.sql.
  # wms and scm use separate PostgreSQL sidecars (below).
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    command: ["--log-bin-trust-function-creators=1", "--max_connections=500"]
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      AUTH_DB_PASSWORD: auth_pass
      ACCOUNT_DB_PASSWORD: account_pass
      SECURITY_DB_PASSWORD: security_pass
      ADMIN_DB_PASSWORD: admin_pass
      COMMUNITY_DB_PASSWORD: community_pass
      MEMBERSHIP_DB_PASSWORD: membership_pass
    volumes:
      - ../../../projects/global-account-platform/docker/mysql/init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports: ["13307:3306"]
    networks: [fed-e2e]

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports: ["16380:6379"]
    networks: [fed-e2e]

  # DNS-only Kafka placeholder — satisfies GAP Dockerfile BE-048 ENTRYPOINT
  # `getent hosts kafka` pre-flight without booting a real broker.
  kafka:
    image: alpine:3.19
    command: ["sleep", "infinity"]
    restart: unless-stopped
    networks: [fed-e2e]

  # ---------------------------------------------------------------------------
  # VictoriaTraces — trace backend for the ADR-MONO-018 D4 cross-product
  # distributed-trace verification (TASK-MONO-144). Image/flags/healthcheck
  # mirror infra/observability/docker-compose.yml (MONO-143 dev-stack).
  #
  # ADR-007a D2 **direct**-OTLP fallback (Vector 0.45 has no `opentelemetry`
  # sink — see infra/observability/vector.toml TRACE INGESTION note): the
  # OTLP-capable Spring producers + console-bff export OTLP/protobuf directly
  # here (MANAGEMENT_OTLP_TRACING_ENDPOINT env below), and console-web exports
  # OTLP/JSON via otel-node (OTEL_EXPORTER_OTLP_ENDPOINT). No Vector trace
  # stage in this cohort — there is no Vector container here at all (this stack
  # carries logs/metrics implicitly via container stdout, not a Vector spine).
  #
  # Host port 10428 mapped so the Playwright job (runs on the runner host)
  # can query the Jaeger-compat API at http://localhost:10428/select/jaeger/...
  victoriatraces:
    image: victoriametrics/victoria-traces:v0.9.0
    command:
      - "--retentionPeriod=1d"
      - "--storageDataPath=/victoria-traces-data"
      - "--httpListenAddr=:10428"
    tmpfs:
      - /victoria-traces-data
    ports: ["10428:10428"]
    networks: [fed-e2e]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:10428/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # PostgreSQL sidecars — wms and scm use PostgreSQL, not MySQL.
  # Two separate instances to avoid cross-domain schema collision.
  # ---------------------------------------------------------------------------
  wms-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: master_db
      POSTGRES_USER: master
      POSTGRES_PASSWORD: master
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U master -d master_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports: ["15432:5432"]
    networks: [fed-e2e]

  scm-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scm_procurement
      POSTGRES_USER: scm
      POSTGRES_PASSWORD: scm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scm -d scm_procurement"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports: ["15433:5432"]
    networks: [fed-e2e]

  # ---------------------------------------------------------------------------
  # GAP auth-service — SAS OIDC AS.
  # ---------------------------------------------------------------------------
  auth-service:
    build:
      context: ../../../projects/global-account-platform
      dockerfile: apps/auth-service/Dockerfile
    environment:
      <<: *gap-service-env
      DB_NAME: auth_db
      DB_USERNAME: auth_user
      DB_PASSWORD: auth_pass
      ACCOUNT_SERVICE_URL: http://account-service:8082
      OIDC_ISSUER_URL: http://auth-service:8081
      JWT_PRIVATE_KEY_PATH: file:/app/keys/private.pem
      JWT_PUBLIC_KEY_PATH: file:/app/keys/public.pem
    volumes:
      - ../../../projects/global-account-platform/apps/auth-service/src/test/resources/keys:/app/keys:ro
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_started }
    ports: ["8081:8081"]
    networks: [fed-e2e]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  # ---------------------------------------------------------------------------
  # GAP account-service.
  # ---------------------------------------------------------------------------
  account-service:
    build:
      context: ../../../projects/global-account-platform
      dockerfile: apps/account-service/Dockerfile
    environment:
      <<: *gap-service-env
      DB_NAME: account_db
      DB_USERNAME: account_user
      DB_PASSWORD: account_pass
      AUTH_SERVICE_URL: http://auth-service:8081
      INTERNAL_API_TOKEN: e2e-internal-token
    depends_on:
      mysql: { condition: service_healthy }
      auth-service: { condition: service_started }
      kafka: { condition: service_started }
    ports: ["18082:8082"]
    networks: [fed-e2e]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  # ---------------------------------------------------------------------------
  # GAP admin-service — operator-token issuer + operator registry.
  # ---------------------------------------------------------------------------
  admin-service:
    build:
      context: ../../../projects/global-account-platform
      dockerfile: apps/admin-service/Dockerfile
    environment:
      <<: *gap-service-env
      DB_NAME: admin_db
      DB_USERNAME: admin_user
      DB_PASSWORD: admin_pass
      AUTH_SERVICE_URL: http://auth-service:8081
      ACCOUNT_SERVICE_URL: http://account-service:8082
      INTERNAL_API_TOKEN: e2e-internal-token
      ADMIN_OIDC_ISSUER: http://auth-service:8081
      ADMIN_OIDC_JWKS_URI: http://auth-service:8081/oauth2/jwks
      ADMIN_OIDC_AUDIENCE: platform-console-web
      ADMIN_JWT_V1_PEM: |
        -----BEGIN PRIVATE KEY-----
        MIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQCwpwO4oW86ahUt
        7qzFCSMA0fdzc6ehRRJgwsNekNaf9lcBC0kFmShJQQzoaWZXW9g/Qfdq8rIGpO0Q
