    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      auth-service: { condition: service_started }
      account-service: { condition: service_started }
      kafka: { condition: service_started }
    ports: ["18085:8085"]
    networks: [fed-e2e]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8085/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  # ---------------------------------------------------------------------------
  # wms-master-service — wms domain read endpoint.
  # Exposes /api/v1/master/warehouses (warehouse list).
  # Uses wms-postgres sidecar (PostgreSQL).
  # Port 8081 internally (application.yml default SERVER_PORT).
  # ---------------------------------------------------------------------------
  wms-master-service:
    build:
      context: ../../../projects/wms-platform/apps/master-service
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: "8081"
      DB_URL: jdbc:postgresql://wms-postgres:5432/master_db
      DB_USERNAME: master
      DB_PASSWORD: master
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      OIDC_ISSUER_URL: http://auth-service:8081
      JWT_JWKS_URI: http://auth-service:8081/oauth2/jwks
      KAFKA_BOOTSTRAP_SERVERS: 127.0.0.1:9999
      JAVA_TOOL_OPTIONS: "-Dnetworkaddress.cache.ttl=0 -Dnetworkaddress.cache.negative.ttl=0"
      # TASK-MONO-144 — OTLP/protobuf direct export to VictoriaTraces (ADR-007a D2).
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://victoriatraces:10428/insert/opentelemetry/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
    depends_on:
      wms-postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      auth-service: { condition: service_started }
      victoriatraces: { condition: service_healthy }
    ports: ["18091:8081"]
    networks: [fed-e2e]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  # ---------------------------------------------------------------------------
  # scm-procurement-service — scm domain read endpoint.
  # Exposes /api/scm/purchase-orders (PO list).
  # Uses scm-postgres sidecar (PostgreSQL).
  # Port 8080 internally (application.yml SERVER_PORT default).
  # ---------------------------------------------------------------------------
  scm-procurement-service:
    build:
      context: ../../../projects/scm-platform/apps/procurement-service
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: "8080"
      POSTGRES_HOST: scm-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB_PROCUREMENT: scm_procurement
      POSTGRES_USER: scm
      POSTGRES_PASSWORD: scm
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      OIDC_ISSUER_URL: http://auth-service:8081
      JWT_JWKS_URI: http://auth-service:8081/oauth2/jwks
      KAFKA_BOOTSTRAP: 127.0.0.1:9999
      JAVA_TOOL_OPTIONS: "-Dnetworkaddress.cache.ttl=0 -Dnetworkaddress.cache.negative.ttl=0"
      # TASK-MONO-144 — OTLP/protobuf direct export to VictoriaTraces (ADR-007a D2).
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://victoriatraces:10428/insert/opentelemetry/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
    depends_on:
      scm-postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      auth-service: { condition: service_started }
      victoriatraces: { condition: service_healthy }
    ports: ["18092:8080"]
    networks: [fed-e2e]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  # ---------------------------------------------------------------------------
  # finance-account-service — finance domain read endpoint.
  # Reuse from platform-console docker-compose.e2e.yml verbatim.
  # ---------------------------------------------------------------------------
  finance-account-service:
    build:
      context: ../../../projects/finance-platform/apps/account-service
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: e2e
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DB: finance_db
      MYSQL_USER: finance
      MYSQL_PASSWORD: finance
      REDIS_HOST: redis
      OIDC_ISSUER_URL: http://auth-service:8081
      JWT_JWKS_URI: http://auth-service:8081/oauth2/jwks
      FINANCE_ACCOUNT_PII_KEY: finance-account-dev-pii-key-32bytes!!
      # TASK-MONO-144 — OTLP/protobuf direct export to VictoriaTraces (ADR-007a D2).
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://victoriatraces:10428/insert/opentelemetry/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      auth-service: { condition: service_started }
      victoriatraces: { condition: service_healthy }
    ports: ["18086:8080"]
    networks: [fed-e2e]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  # ---------------------------------------------------------------------------
  # erp-masterdata-service — erp domain read endpoint.
  # Exposes /api/erp/masterdata/employees (employee list).
  # Uses MySQL (erp_db created at phase 1.5 seed.sql).
  # ---------------------------------------------------------------------------
  erp-masterdata-service:
    build:
      context: ../../../projects/erp-platform/apps/masterdata-service
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: "8080"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DB: erp_db
      MYSQL_USER: erp
      MYSQL_PASSWORD: erp
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      OIDC_ISSUER_URL: http://auth-service:8081
      JWT_JWKS_URI: http://auth-service:8081/oauth2/jwks
      KAFKA_BOOTSTRAP_SERVERS: 127.0.0.1:9999
      JAVA_TOOL_OPTIONS: "-Dnetworkaddress.cache.ttl=0 -Dnetworkaddress.cache.negative.ttl=0"
      # TASK-MONO-144 — OTLP/protobuf direct export to VictoriaTraces (ADR-007a D2).
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://victoriatraces:10428/insert/opentelemetry/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      auth-service: { condition: service_started }
      victoriatraces: { condition: service_healthy }
    ports: ["18093:8080"]
    networks: [fed-e2e]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  # ---------------------------------------------------------------------------
  # console-bff — Spring Boot orchestrator.
  # ADR-MONO-018 phase 2 outbound wiring: replaces 127.0.0.1:9 placeholders
  # with real producer hostnames (wms / scm / erp).
  # ---------------------------------------------------------------------------
  console-bff:
    build:
      context: ../../../projects/platform-console/apps/console-bff
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: docker
      CONSOLE_BFF_GAP_ISSUER_URL: http://auth-service:8081
      CONSOLE_BFF_JWK_SET_URI: http://auth-service:8081/oauth2/jwks
      # Per-domain outbound base URLs — ALL 5 live for this cohort.
      # ADR-MONO-018 D1: replaces the 127.0.0.1:9 non-routable placeholders
      # in platform-console docker-compose.e2e.yml (wms/scm/erp were placeholder).
      CONSOLE_BFF_OUTBOUND_GAP_BASE_URL: http://admin-service:8085
      CONSOLE_BFF_OUTBOUND_WMS_BASE_URL: http://wms-master-service:8081
      CONSOLE_BFF_OUTBOUND_SCM_BASE_URL: http://scm-procurement-service:8080
      CONSOLE_BFF_OUTBOUND_FINANCE_BASE_URL: http://finance-account-service:8080
      CONSOLE_BFF_OUTBOUND_ERP_BASE_URL: http://erp-masterdata-service:8080
      # TASK-MONO-144 — OTLP/protobuf direct export to VictoriaTraces (ADR-007a D2).
      # console-bff adopts console-web's inbound W3C traceparent and continues
      # the trace; its exported spans share console-web's trace_id (the
      # federation propagation hub).
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://victoriatraces:10428/insert/opentelemetry/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
    depends_on:
      auth-service: { condition: service_started }
      admin-service: { condition: service_started }
      finance-account-service: { condition: service_started }
      wms-master-service: { condition: service_started }
      scm-procurement-service: { condition: service_started }
      erp-masterdata-service: { condition: service_started }
      victoriatraces: { condition: service_healthy }
    ports: ["18090:8080"]
    networks: [fed-e2e]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  # ---------------------------------------------------------------------------
  # console-web — Next.js Playwright target.
  # Reuse from platform-console docker-compose.e2e.yml verbatim.
  # ---------------------------------------------------------------------------
  console-web:
    build:
      context: ../../../projects/platform-console/apps/console-web
      dockerfile: Dockerfile
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: production
      OIDC_ISSUER_URL: http://auth-service:8081
      OIDC_CLIENT_ID: platform-console-web
      OIDC_REDIRECT_URI: http://localhost:3000/api/auth/callback
      OIDC_SCOPE: "openid profile email tenant.read"
      CONSOLE_REGISTRY_URL: http://admin-service:8085/api/admin/console/registry
      REGISTRY_TIMEOUT_MS: "5000"
      CONSOLE_TOKEN_EXCHANGE_URL: http://admin-service:8085/api/admin/auth/token-exchange
      TOKEN_EXCHANGE_TIMEOUT_MS: "5000"
      GAP_ADMIN_API_BASE: http://admin-service:8085
      CONSOLE_BFF_URL: http://console-bff:8080
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # TASK-MONO-144 — otel-node (MONO-143 D3) starts the root SSR span +
      # undici auto-instrumentation injects W3C traceparent into the console-bff
      # fetch. otel-node appends `/v1/traces` to this endpoint (OTLP/JSON).
      # Whether VictoriaTraces ingests OTLP/JSON is the MONO-144 reported
      # unknown — see task md honest-scope note. The traceparent propagation to
      # console-bff happens regardless of console-web's own export success.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://victoriatraces:10428/insert/opentelemetry
      OTEL_SERVICE_NAME: console-web
    depends_on:
      auth-service: { condition: service_started }
      admin-service: { condition: service_started }
      console-bff: { condition: service_started }
      victoriatraces: { condition: service_healthy }
    ports: ["3000:3000"]
    networks: [fed-e2e]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

networks:
  fed-e2e:
    driver: bridge
