spring:
  application:
    name: erp-platform-gateway-service

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URL:http://iam.local}
          # Default to /oauth2/jwks (GAP's SAS endpoint), not /.well-known/jwks.json.
          jwk-set-uri: ${OIDC_JWK_SET_URI:${JWT_JWKS_URI:${OIDC_ISSUER_URL:http://iam.local}/oauth2/jwks}}

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://erp.local}
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - X-Request-Id
              - Idempotency-Key
            exposedHeaders:
              - X-Request-Id
              - ETag
              - Retry-After
            maxAge: 3600
      httpclient:
        connect-timeout: 2000
        response-timeout: 10s
      routes:
        # No RewritePath: erp's controllers already serve /api/erp/**, and Traefik was routing
        # that namespace straight at them by PathPrefix. Introducing a /api/v1/ external prefix
        # here (as wms/scm/fan do) would be a client-visible contract change, not a gateway
        # bootstrap — so the gateway forwards 1:1 and takes over the routing Traefik was doing
        # without any of the validation (TASK-MONO-357 § Routes).
        - id: masterdata-service
          uri: ${MASTERDATA_SERVICE_URI:http://masterdata-service:8080}
          predicates:
            - Path=/api/erp/masterdata/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 120
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@accountKeyResolver}"

        - id: approval-service
          uri: ${APPROVAL_SERVICE_URI:http://approval-service:8080}
          predicates:
            - Path=/api/erp/approval/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 120
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@accountKeyResolver}"

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URI:http://notification-service:8080}
          predicates:
            - Path=/api/erp/notifications/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 120
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@accountKeyResolver}"

        - id: read-model-service
          uri: ${READ_MODEL_SERVICE_URI:http://read-model-service:8080}
          predicates:
            - Path=/api/erp/read-model/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 120
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@accountKeyResolver}"

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  level:
    root: INFO
    com.example.erp.gateway: INFO
    org.springframework.cloud.gateway: INFO
    org.springframework.web: INFO
  pattern:
    level: "%5p [traceId=%X{traceId:-} requestId=%X{requestId:-}]"

erpplatform:
  oauth2:
    # Acceptable iss values during the D2-b deprecation window: the SAS issuer URL and the
    # legacy "iam" string. An EMPTY list is a misconfiguration, not "accept any issuer" —
    # AllowedIssuersValidator refuses to construct from one, so a missing value fails the boot.
    allowed-issuers: ${OIDC_ALLOWED_ISSUERS:${OIDC_ISSUER_URL:http://iam.local},iam}
    # Same tenant the erp services' own ServiceLevelOAuth2Config requires. The gateway and the
    # service behind it must not disagree about which tokens are valid.
    required-tenant-id: ${OIDC_REQUIRED_TENANT_ID:erp}

gateway:
  jwks:
    startup-probe:
      enabled: ${GATEWAY_JWKS_STARTUP_PROBE_ENABLED:true}
      timeout-seconds: ${GATEWAY_JWKS_STARTUP_PROBE_TIMEOUT_SECONDS:30}
