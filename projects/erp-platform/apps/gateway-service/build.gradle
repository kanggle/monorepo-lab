plugins {
    id 'org.springframework.boot'
    id 'io.spring.dependency-management'
}

group = 'com.example.erp.gateway'

// -------------------------------------------------------------------------
// erp-platform's edge (TASK-MONO-357 / ADR-MONO-048 D7 step 4).
//
// Everything that used to make a gateway expensive to stand up — the error
// envelope, the request-id / retry-after filters, the fail-open rate limiter,
// the issuer allowlist, the tenant gate, the identity strip/enrich pair, the
// JWKS startup probe — now lives in libs/java-gateway. What is left here is the
// part that is genuinely erp's: its routes, its property prefix, and its
// tenant-gate policy.
//
//   - `implementation`, never `api`. Adding `api` would leak WebFlux + Spring
//     Cloud Gateway transitively; the mirror of the TASK-MONO-044a incident.
// -------------------------------------------------------------------------

dependencies {
    // Spring Cloud Gateway (reactive)
    implementation 'org.springframework.cloud:spring-cloud-starter-gateway'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-oauth2-resource-server'

    // Rate limiting (RedisRateLimiter)
    implementation 'org.springframework.boot:spring-boot-starter-data-redis-reactive'

    // Observability
    implementation 'io.micrometer:micrometer-registry-prometheus'
    implementation 'io.micrometer:micrometer-tracing-bridge-otel'
    implementation 'io.opentelemetry:opentelemetry-exporter-otlp'

    // JSON (error envelope)
    implementation 'com.fasterxml.jackson.core:jackson-databind'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310'

    // Structured logging (prod profile)
    implementation 'net.logstash.logback:logstash-logback-encoder:8.0'

    // Shared libs
    implementation project(':libs:java-common')
    implementation project(':libs:java-gateway')

    // AllowedIssuersValidator + TenantClaimValidator moved here from libs:java-gateway
    // (ADR-MONO-049 § D5-1). java-gateway depends on java-security with `implementation`,
    // which does NOT transit to this compile classpath — so this gateway declares it directly
    // (§ D2: no `api`, anywhere). Without this line the gateway does not compile.
    implementation project(':libs:java-security')

    implementation project(':libs:java-observability')

    // Test (unit / slice)
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-webflux'
    testImplementation 'io.projectreactor:reactor-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'org.assertj:assertj-core'

    // Integration suite (`@Tag("integration")`, TASK-MONO-458). erp's unit tests construct the
    // library filters directly and never drive an HTTP request through the real route + filter
    // chain; these deps let the integration suite do exactly that. Versions match scm's gateway,
    // the closest sibling edge, so the fleet's test infra stays uniform.
    //
    // JWT signing helper — signs RS256 tokens the gateway's resource-server verifies via JWKS.
    testImplementation 'com.nimbusds:nimbus-jose-jwt:9.48'
    // MockWebServer stands in for the JWKS endpoint and for the downstream service.
    testImplementation 'com.squareup.okhttp3:okhttp:4.12.0'
    testImplementation 'com.squareup.okhttp3:mockwebserver:4.12.0'
    // Testcontainers (Redis, for the rate-limit backend). Docker-gated → clean-SKIP without Docker.
    testImplementation 'org.testcontainers:junit-jupiter:1.21.3'
    testImplementation 'com.redis:testcontainers-redis:2.2.2'
    testImplementation 'org.awaitility:awaitility:4.2.2'
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.boot:spring-boot-dependencies:${springBootVersion}"
        mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
        mavenBom "org.testcontainers:testcontainers-bom:1.21.3"
    }
}

tasks.named('bootJar') {
    archiveFileName = 'gateway-service.jar'
}

// Default `test` task: unit + slice only. Excludes the Docker-dependent integration tag so
// `./gradlew check` stays fast and Docker-free — the same split scm/fan/wms use.
test {
    useJUnitPlatform {
        excludeTags 'integration'
    }
}

// Dedicated task that runs ONLY @Tag("integration") tests (Testcontainers → Docker required).
// Not wired into `check` so the fast feedback loop stays Docker-free; CI's integration lane
// invokes it explicitly.
tasks.register('integrationTest', Test) {
    description = 'Runs Testcontainers-backed integration tests (requires Docker).'
    group = 'verification'
    useJUnitPlatform {
        includeTags 'integration'
    }
    shouldRunAfter tasks.named('test')

    testLogging {
        events 'passed', 'failed', 'skipped'
        exceptionFormat 'full'
        showStandardStreams = true
    }
}
