# Test profile defaults. Integration tests inject concrete values for
# spring.datasource.* (MySQL Testcontainer) and
# spring.security.oauth2.resourceserver.jwt.jwk-set-uri (MockWebServer JWKS)
# via @DynamicPropertySource. H2 is FORBIDDEN — slice tests stub the service
# layer; integration tests use real MySQL.

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

outbox:
  polling:
    # Gate (preserved v1 name). Disabled by default for slice/unit tests;
    # integration tests explicitly enable it via @TestPropertySource.
    enabled: false
    interval-ms: 200
    batch-size: 50

masterdata:
  # TASK-ERP-BE-026 outbox v2 timing — tight loop so the relay reacts within an
  # awaitility timeout once an integration test flips outbox.polling.enabled=true.
  outbox:
    poll-ms: 200
    initial-delay-ms: 0
    batch-size: 50

erpplatform:
  oauth2:
    allowed-issuers: ${OIDC_ALLOWED_ISSUERS:http://test-issuer,iam}
    required-tenant-id: erp
  masterdata:
    idempotency:
      ttl-seconds: 86400
