# -----------------------------------------------------------------------------
# erp-platform masterdata-service — v1 bootstrap skeleton config.
#
# HARDSTOP-09 note (remediation option 3 — reversible + local skeleton, NO
# architecture decision is made in this file): this is the deliberate
# deferred-impl skeleton authored by TASK-MONO-119 (ADR-MONO-016 §D6.2 PR-B),
# byte-mirroring the finance account-service PR-B skeleton precedent
# (TASK-MONO-114, squash d2b579f2 — that PR-B also shipped account-service
# application.yml + bootstrap class with NO architecture.md; the finance
# architecture.md was added later by the TASK-FIN-BE-001 spec PR #597
# 5a4aae42, not by the bootstrap). Spring just boots; Flyway disabled (no
# migrations yet); the four package dirs are empty .gitkeep placeholders, not
# a Hexagonal-layout decision. The service architecture decision (Hexagonal
# layer boundaries, Service Type, erp E1-E8 mapping) is owned by the
# ALREADY-FILED follow-up task projects/erp-platform/tasks/ready/
# TASK-ERP-BE-001-masterdata-service-bootstrap.md (AC-1: architecture.md MUST
# exist before any domain implementation — HARDSTOP-09 is enforced at that
# stage, which is the correct gate, not the zero-logic bootstrap).
# -----------------------------------------------------------------------------
spring:
  application:
    name: erp-platform-masterdata-service

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DB:erp_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:erp}
    password: ${MYSQL_PASSWORD:erp}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      # Flyway owns the schema — Hibernate validates only.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc.time_zone: UTC
    open-in-view: false

  flyway:
    # V1__init.sql (MySQL) shipped by TASK-ERP-BE-001 — Flyway owns the
    # schema; Hibernate validates only (spring.jpa.hibernate.ddl-auto).
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s

  # Kafka — outbox relay target (libs/java-messaging AbstractOutboxPublisher, v2).
  # Until TASK-ERP-BE-007 wired a local broker into docker-compose, this fell
  # back to the Spring Boot default (localhost:9092) with no broker present, so
  # the relay never drained. KAFKA_BOOTSTRAP now points at the compose broker.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:kafka:9092}

  # Standard OAuth2 Resource Server backed by GAP's JWKS.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URL:http://iam.local}
          # V0018 SQL seeded the erp-platform OIDC client against GAP's
          # standard /oauth2/jwks endpoint (scm / finance / wms alignment).
          jwk-set-uri: ${OIDC_JWK_SET_URI:${JWT_JWKS_URI:${OIDC_ISSUER_URL:http://iam.local}/oauth2/jwks}}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  level:
    root: INFO
    com.example.erp.masterdata: INFO
    org.hibernate.SQL: WARN
  pattern:
    level: "%5p [traceId=%X{traceId:-} requestId=%X{requestId:-} tenantId=%X{tenantId:-} actorId=%X{actorId:-}]"

erpplatform:
  oauth2:
    # D2-b deprecation window: SAS issuer + legacy "iam"
    # string. Keep byte-identical to gateway-service's allowed-issuers when the
    # gateway-service is introduced (cross-service issuer drift guard — scm /
    # finance precedent).
    allowed-issuers: ${OIDC_ALLOWED_ISSUERS:${OIDC_ISSUER_URL:http://iam.local},iam}
    required-tenant-id: ${OIDC_REQUIRED_TENANT_ID:erp}
  masterdata:
    idempotency:
      # Idempotency store TTL (≥ 24h, architecture.md § Idempotency, FIN-BE-004
      # final form). DB-table primary inside the mutation Tx.
      ttl-seconds: ${ERP_IDEMPOTENCY_TTL_SECONDS:86400}

# Transactional outbox relay (libs/java-messaging v2 AbstractOutboxPublisher).
# TASK-ERP-BE-026 outbox v2: `enabled` is the relay gate (preserved v1 name —
# @ConditionalOnProperty on MasterdataOutboxPublisher; slice/unit tests set it
# false via application-test.yml). `interval-ms`/`batch-size` here are legacy v1
# keys (no longer read; v2 timing lives under `masterdata.outbox.*` below).
outbox:
  polling:
    enabled: ${OUTBOX_POLLING_ENABLED:true}
    interval-ms: 1000
    batch-size: 50

masterdata:
  outbox:
    poll-ms: ${MASTERDATA_OUTBOX_POLL_MS:1000}
    initial-delay-ms: ${MASTERDATA_OUTBOX_INITIAL_DELAY_MS:5000}
    batch-size: ${MASTERDATA_OUTBOX_BATCH_SIZE:100}
