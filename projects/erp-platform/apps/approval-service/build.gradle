plugins {
    id 'org.springframework.boot'
    id 'io.spring.dependency-management'
}

group = 'com.example.erp.approval'

// -------------------------------------------------------------------------
// erp-platform approval-service (TASK-ERP-BE-009).
//
// First increment of the erp Approval Workflow bounded context: the
// ApprovalRequest aggregate + single-stage state machine
// (DRAFT → SUBMITTED → APPROVED | REJECTED | WITHDRAWN), no-self-approval
// (E3/I4 SoD), idempotent transitions (E4), immutable audit (E8/A7), and a
// masterdata subject reference-integrity check on submit (E1). Hexagonal,
// rest-api. Publishes erp.approval.{submitted,approved,rejected,withdrawn}.v1
// through the transactional outbox (this service is a producer, unlike
// read-model-service; TASK-MONO-406 deleted the lib's OutboxAutoConfiguration,
// so there is no longer any outbox auto-config to keep or exclude).
//
// Source sets:
// * `test`             — unit + slice tests (default).
// * `integrationTest`  — Testcontainers-backed integration tests
//                         (MySQL + Kafka + WireMock JWKS + WireMock masterdata).
//                         Tagged @Tag("integration"); excluded from `test` so
//                         `./gradlew check` stays Docker-free.
// -------------------------------------------------------------------------

dependencies {
    // Spring Boot starters
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-data-redis'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-oauth2-resource-server'

    // Kafka — outbox relay via libs/java-messaging AbstractOutboxPublisher
    implementation 'org.springframework.kafka:spring-kafka'

    // Database — MySQL (mirrors masterdata-service's engine choice)
    implementation 'org.flywaydb:flyway-core'
    implementation 'org.flywaydb:flyway-mysql'
    runtimeOnly 'com.mysql:mysql-connector-j'

    // Observability
    implementation 'io.micrometer:micrometer-registry-prometheus'
    implementation 'io.micrometer:micrometer-tracing-bridge-otel'
    implementation 'io.opentelemetry:opentelemetry-exporter-otlp'

    // JSON
    implementation 'com.fasterxml.jackson.core:jackson-databind'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310'

    // Structured logging (prod profile)
    implementation 'net.logstash.logback:logstash-logback-encoder:8.0'

    // Shared libs
    implementation project(':libs:java-common')
    implementation project(':libs:java-web')
    implementation project(':libs:java-messaging')
    implementation project(':libs:java-observability')
    implementation project(':libs:java-security')
    // ADR-MONO-049 § D5-4: the canonical servlet TenantClaimEnforcer. `implementation`, not
    // `api` — a shared security class must not transit onto a consumer's compile classpath
    // (§ D2; assertNoApiOnSharedLibs enforces it).
    implementation project(':libs:java-security-servlet')

    // Test (unit + slice)
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'org.springframework.kafka:spring-kafka-test'
    testImplementation 'org.assertj:assertj-core'

    // JWT signing helper used by validator unit tests and the integration suite.
    testImplementation 'com.nimbusds:nimbus-jose-jwt:9.48'

    // Shared Testcontainers base utilities (DockerAvailableCondition etc.)
    testImplementation testFixtures(project(':libs:java-test-support'))

    // Testcontainers (integration tests, @Tag("integration"))
    testImplementation 'org.testcontainers:junit-jupiter:1.21.3'
    testImplementation 'org.testcontainers:mysql:1.21.3'
    testImplementation 'org.testcontainers:kafka:1.21.3'
    testImplementation 'com.redis:testcontainers-redis:2.2.2'
    testImplementation 'org.awaitility:awaitility:4.2.2'

    // MockWebServer for the JWKS stand-in + the masterdata-service stub.
    testImplementation 'com.squareup.okhttp3:okhttp:4.12.0'
    testImplementation 'com.squareup.okhttp3:mockwebserver:4.12.0'
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.boot:spring-boot-dependencies:${springBootVersion}"
        mavenBom "org.testcontainers:testcontainers-bom:1.21.3"
    }
}

tasks.named('bootJar') {
    archiveFileName = 'approval-service.jar'
}

// Default `test` task: unit + slice only. Excludes Docker-dependent tests so
// `./gradlew check` stays fast and Docker-free.
test {
    useJUnitPlatform {
        excludeTags 'integration'
    }
}

// Dedicated task that runs ONLY @Tag("integration") tests.
// Not wired into `check` so the fast feedback loop stays Docker-free.
tasks.register('integrationTest', Test) {
    description = 'Runs Testcontainers-backed integration tests (requires Docker).'
    group = 'verification'
    useJUnitPlatform {
        includeTags 'integration'
    }
    shouldRunAfter tasks.named('test')

    testLogging {
        events 'passed', 'failed', 'skipped'
        exceptionFormat 'full'
        showStandardStreams = true
    }

    systemProperty 'junit.jupiter.execution.timeout.default', '5m'
}
