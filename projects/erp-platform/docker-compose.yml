# =============================================================================
# erp-platform — Local Development Infrastructure (v1 placeholder)
# =============================================================================
# Hostname-based routing (per ADR-MONO-001 Option C):
#   gateway-service is reached via http://erp.local/ — Traefik routes based
#   on Host header. No PORT_PREFIX, no host-port slot allocation.
#
# Status: v1 bootstrap (TASK-MONO-119, ADR-MONO-016 ACCEPTED Option C). The
# gateway-service block below is commented out — its Spring Boot module is not
# yet generated. masterdata-service has a minimal skeleton (no business logic);
# its block is commented out too until TASK-ERP-BE-001 lands the implementation
# (Dockerfile + Flyway schema + domain code). The first impl task will:
#   1. Implement projects/erp-platform/apps/masterdata-service/ (domain code +
#      Dockerfile + Flyway V1 schema),
#   2. Activate the masterdata-service / gateway-service blocks below,
#   3. Activate Traefik labels so http://erp.local/ resolves.
#
# Backing services (mysql / redis) are placeholders — they are defined here so
# `docker compose --project-directory projects/erp-platform config`
# validates the file shape, but they are only meaningfully used once at least
# one application service depends on them.
#
# Prerequisites (when activated):
#   1. Start the shared Traefik stack:  pnpm traefik:up
#      (creates the external `traefik-net` network this compose file joins)
#   2. Add `127.0.0.1 erp.local` to your hosts file (one-time setup)
#
# Usage (after first service skeleton lands):
#   pnpm erp:up    — start everything in this compose file
#   pnpm erp:down  — stop containers (volumes preserved)
#   pnpm erp:logs  — tail logs
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # gateway-service — activated by TASK-MONO-357 (ADR-MONO-048 D7 step 4).
  #
  # This block sat commented out with the note "activated by a follow-up task"
  # because standing a gateway up meant hand-copying ~15 classes. libs/java-gateway
  # removed that cost; the gateway's own code is now 4 classes.
  #
  # It TAKES OVER `erp.local` from the four backend services. Until now Traefik split
  # the hostname across them by PathPrefix rule — doing the gateway's routing job with
  # none of its validation: no JWT check, no identity-header strip, no rate limit, no
  # error envelope. That is what platform/api-gateway-policy.md L13/L14 forbid. The
  # backends below now carry no Traefik labels and are `expose:`-only, per TEMPLATE.md
  # § Local Network Convention.
  # ---------------------------------------------------------------------------
  gateway-service:
    image: erp-platform/gateway-service:local
    container_name: erp-platform-gateway
    build:
      context: ./apps/gateway-service
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-http://iam.local}
      JWT_JWKS_URI: ${JWT_JWKS_URI:-http://iam.local/oauth2/jwks}
      OIDC_REQUIRED_TENANT_ID: erp
      MASTERDATA_SERVICE_URI: http://masterdata-service:8080
      APPROVAL_SERVICE_URI: http://approval-service:8080
      NOTIFICATION_SERVICE_URI: http://notification-service:8080
      READ_MODEL_SERVICE_URI: http://read-model-service:8080
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://erp.local}
    depends_on:
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.erp-platform.rule=Host(`erp.${DEMO_DOMAIN:-local}`)"
      - "traefik.http.routers.erp-platform.entrypoints=web"
      - "traefik.http.services.erp-platform.loadbalancer.server.port=8080"
    networks:
      - erp-platform-net
      - traefik-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "3"

  # ---------------------------------------------------------------------------
  # masterdata-service — TASK-ERP-BE-001 active. Organization master data:
  # 부서 / 직원 / 직급 / 비용센터 / 거래처 — reference integrity, effective
  # dating, immutable audit_log. Until gateway-service is introduced (v1
  # deferred per ADR-MONO-016 / PROJECT.md Service Map), masterdata-service
  # is directly behind the shared Traefik on erp.local.
  # ---------------------------------------------------------------------------
  masterdata-service:
    image: erp-platform/masterdata-service:local
    container_name: erp-platform-masterdata
    build:
      context: ./apps/masterdata-service
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DB: ${MYSQL_DB:-erp_db}
      MYSQL_USER: ${MYSQL_USER:-erp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-erp}
      REDIS_HOST: redis
      # Kafka broker for the transactional outbox relay (TASK-ERP-BE-007 added
      # the broker below; before this the relay had no broker locally).
      KAFKA_BOOTSTRAP: kafka:9092
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-http://iam.local}
      JWT_JWKS_URI: ${JWT_JWKS_URI:-http://iam.local/oauth2/jwks}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    # TASK-MONO-357: no Traefik labels. gateway-service took over edge routing, which is
    # what the "until gateway-service takes over" note here was waiting for. This service
    # is now reachable only from inside the compose network, via the gateway — which
    # validates the JWT and strips client-supplied identity headers first.
    networks:
      - erp-platform-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # read-model-service — TASK-ERP-BE-007 active. Integrated read model: consumes
  # masterdata-service's 4 master-change topics and serves a read-only employee
  # org-view REST API (rest-api + event-consumer, CQRS read-model, E5 terminal).
  # Own MySQL database erp_read_model_db (created by the mysql initdb script).
  # Not gateway-routed in v1 (no Traefik label) — reached internally / via
  # console-bff once wired; the read API is internal-only (E7).
  # ---------------------------------------------------------------------------
  read-model-service:
    image: erp-platform/read-model-service:local
    container_name: erp-platform-read-model
    build:
      context: ./apps/read-model-service
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DB: erp_read_model_db
      MYSQL_USER: ${MYSQL_USER:-erp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-erp}
      KAFKA_BOOTSTRAP: kafka:9092
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-http://iam.local}
      JWT_JWKS_URI: ${JWT_JWKS_URI:-http://iam.local/oauth2/jwks}
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      # Path-based routing on erp.local (TASK-PC-FE-049): /api/erp/read-model/**
      # → read-model-service; everything else → masterdata-service (catch-all,
      # priority=1). priority=100 ensures this PathPrefix router wins. This is
      # the v1 direct-routing bridge until gateway-service (v1-deferred) owns
      # the edge.
      # TASK-MONO-357: Traefik no longer routes this service. gateway-service owns
      # erp.local and forwards /api/erp/read-model/** here over the internal network.
    networks:
      - erp-platform-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # approval-service — TASK-ERP-BE-009 active. Approval Workflow bounded context
  # (first increment): ApprovalRequest aggregate + single-stage state machine +
  # no-self-approval + idempotent transitions + immutable audit + masterdata
  # subject ref-check; publishes erp.approval.*.v1 through the outbox. Shares the
  # erp_db MySQL instance (separate tables; no shared-table JOIN) and the Kafka
  # broker. Path-based routing on erp.local: /api/erp/approval/** → approval-service
  # (priority=100, like read-model); everything else → masterdata-service
  # (catch-all, priority=1). v1 direct-routing bridge until gateway-service.
  # ---------------------------------------------------------------------------
  approval-service:
    image: erp-platform/approval-service:local
    container_name: erp-platform-approval
    build:
      context: ./apps/approval-service
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DB: ${MYSQL_DB:-erp_db}
      MYSQL_USER: ${MYSQL_USER:-erp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-erp}
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP: kafka:9092
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-http://iam.local}
      JWT_JWKS_URI: ${JWT_JWKS_URI:-http://iam.local/oauth2/jwks}
      # masterdata-service base URL for the submit-time subject ref-check (E1).
      ERP_MASTERDATA_BASE_URL: ${ERP_MASTERDATA_BASE_URL:-http://masterdata-service:8080}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      # Path-based routing on erp.local: /api/erp/approval/** → approval-service.
      # priority=100 ensures this PathPrefix router wins over the masterdata-service
      # catch-all (priority=1); the read-model router (also priority=100) owns a
      # distinct PathPrefix (/api/erp/read-model) so the two never collide.
      # TASK-MONO-357: Traefik no longer routes this service. gateway-service owns
      # erp.local and forwards /api/erp/approval/** here over the internal network.
    networks:
      - erp-platform-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # notification-service — TASK-ERP-BE-011 active. Approval-notification fan-out
  # (first increment): consumes erp.approval.{submitted,approved,rejected,
  # withdrawn}.v1, resolves recipient + renders, persists in-app Notification +
  # Category C delivery (IN_APP), serves a recipient-scoped read-only inbox
  # (event-consumer + rest-api dual-type). Terminal consumer (no outbox, no
  # re-emission). Shares the erp_db MySQL instance (separate tables) + the Kafka
  # broker. Path-based routing on erp.local: /api/erp/notifications/** →
  # notification-service (priority=100, like read-model / approval); everything
  # else → masterdata-service (catch-all, priority=1). v1 direct-routing bridge
  # until gateway-service.
  # ---------------------------------------------------------------------------
  notification-service:
    image: erp-platform/notification-service:local
    container_name: erp-platform-notification
    build:
      context: ./apps/notification-service
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DB: ${MYSQL_DB:-erp_db}
      MYSQL_USER: ${MYSQL_USER:-erp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-erp}
      KAFKA_BOOTSTRAP: kafka:9092
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-http://iam.local}
      JWT_JWKS_URI: ${JWT_JWKS_URI:-http://iam.local/oauth2/jwks}
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      # Path-based routing on erp.local: /api/erp/notifications/** →
      # notification-service. priority=100 wins over the masterdata-service
      # catch-all (priority=1); read-model (/api/erp/read-model) + approval
      # (/api/erp/approval) own distinct PathPrefixes so the routers never collide.
      # TASK-MONO-357: Traefik no longer routes this service. gateway-service owns
      # erp.local and forwards /api/erp/notifications/** here over the internal network.
    networks:
      - erp-platform-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # MySQL 8 — backing store for masterdata-service (TASK-ERP-BE-001+). erp_db.
  # Mirrors GAP's MySQL engine choice (GAP Identity tables are MySQL); erp
  # master-data tables live here. expose: only — no host port (Local
  # Network Convention, production parity).
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: erp-platform-mysql
    restart: unless-stopped
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DB:-erp_db}
      MYSQL_USER: ${MYSQL_USER:-erp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-erp}
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
    volumes:
      - mysql-data:/var/lib/mysql
      # Create read-model-service's own database (erp_read_model_db) on first
      # init in addition to MYSQL_DATABASE=erp_db (TASK-ERP-BE-007 CQRS store).
      - ./infra/mysql-initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p${MYSQL_ROOT_PASSWORD:-root} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - erp-platform-net

  # ---------------------------------------------------------------------------
  # Redis 7 — rate-limit counters (gateway), short-lived idempotency cache.
  # expose: only — no host port (Local Network Convention).
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: erp-platform-redis
    restart: unless-stopped
    expose:
      - "6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - erp-platform-net

  # ---------------------------------------------------------------------------
  # Kafka 3.7 — single-broker KRaft mode. Master-change event bus: outbox relay
  # target for masterdata-service's erp.masterdata.*.changed.v1 topics, consumed
  # by read-model-service (TASK-ERP-BE-007 introduced the broker — the erp
  # compose previously had none, so the relay never drained locally). expose:
  # only — no host port (Local Network Convention). Mirrors scm-platform's block.
  # ---------------------------------------------------------------------------
  # KRaft mode (no Zookeeper).
  #
  # apache/kafka, NOT bitnami/kafka: `bitnami/kafka:3.7` was deleted from Docker Hub
  # (tag 404; the repository's tag list is now empty), so `docker compose up` died with
  # `failed to resolve reference`. iam/wms/ecommerce were already on apache/kafka —
  # scm/erp/fan were the stragglers. See TASK-MONO-353.
  #
  # The two images are not drop-in compatible:
  #   - env prefix:  bitnami `KAFKA_CFG_*` (+ ALLOW_PLAINTEXT_LISTENER) → apache raw `KAFKA_*`
  #   - CLUSTER_ID:  bitnami auto-generates one; apache requires it explicitly
  #   - data dir:    /bitnami/kafka → /var/lib/kafka/data
  #   - CLI path:    on PATH → /opt/kafka/bin (healthcheck must use the absolute path)
  #
  # The replication-factor overrides below are load-bearing on a single broker: bitnami
  # defaulted them to 1, apache defaults to 3. Without them the broker still reports
  # healthy but every consumer group silently fails to initialise its offsets topic.
  kafka:
    image: apache/kafka:3.7.0
    container_name: erp-platform-kafka
    restart: unless-stopped
    expose:
      - "9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: ${KAFKA_KRAFT_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qg}
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    networks:
      - erp-platform-net

volumes:
  mysql-data:
  redis-data:
  kafka-data:

networks:
  erp-platform-net:
    driver: bridge
  traefik-net:
    external: true
    name: traefik-net
