# Integration-test profile. Container endpoints are injected by the test
# initializer (see MasterServiceIntegrationBase). This file pins the few
# defaults that the initializer cannot reach — profile-gated beans, log
# level, and the JPA/Hibernate mode.
spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

  # Tighter producer timeouts for the integration suite only. The production
  # profile keeps `retries: 2147483647` and the Kafka defaults
  # (max.block.ms=60s, delivery.timeout.ms=120s, request.timeout.ms=30s),
  # which is correct for real traffic but incompatible with the
  # PublisherResilienceIntegrationTest scenario: that test pauses the broker
  # (SIGSTOP) and expects the send loop to surface a failure within ~20s.
  # With the default max.block.ms=60s, `kafkaTemplate.send(...).get()` blocks
  # past the Awaitility window and the failure-counter gauge never ticks.
  # TASK-BE-019 — CI flakiness fix.
  kafka:
    producer:
      # Finite retries so `delivery.timeout.ms` can actually fire. Production
      # keeps retries=MAX because the outbox pattern requires at-least-once
      # delivery with backoff; for tests we need the failure path to surface.
      retries: 3
      properties:
        # Bound the initial metadata fetch + buffer wait so a paused-broker
        # scenario surfaces within the 20 s Awaitility window.
        max.block.ms: 4000
        # request.timeout.ms must be <= delivery.timeout.ms; 3 s leaves room
        # for three retries within the 10 s delivery ceiling.
        request.timeout.ms: 3000
        # Upper bound for one send attempt (including all retries). Must be
        # < the Awaitility window in PublisherResilienceIntegrationTest (20 s).
        delivery.timeout.ms: 10000

# Disable micrometer Kafka **client** metrics in the in-JVM @SpringBootTest
# integration suite ONLY (test classpath; production application.yml keeps
# Kafka client metrics — auto-bound by KafkaMetricsAutoConfiguration).
#
# WHY (TASK-BE-458 — root cause of the flaky prometheusEndpoint_exposesOutboxMetrics):
# PublisherResilienceIntegrationTest pauses + unpauses the SHARED static Kafka
# container (SIGSTOP/SIGCONT) mid-suite. micrometer-kafka's KafkaClientMetrics
# then churns its `kafka.*` client gauges as the producer/consumer re-attach to
# the restarted broker. When WarehouseIntegrationTest later scrapes
# /actuator/prometheus, that churn disrupts the scrape-body composition over the
# shared PrometheusMeterRegistry (the `kafka.*` collectors are re-registering /
# their gauge functions read a reconnecting client), so the `master.outbox.*`
# meter families intermittently fail to appear for a window that on slow
# GitHub-hosted runners outlasts the 30 s Awaitility budget — even though the
# outbox meters themselves are healthy (TASK-BE-020 already fixed the gauge GC
# race). Removing the `kafka.*` client meters from the test registry eliminates
# the disruptor entirely → the outbox scrape is deterministic regardless of the
# broker pause/unpause ordering. The test asserts OUTBOX metrics, never kafka
# client metrics, so fidelity is unaffected.
management:
  metrics:
    enable:
      kafka: false

logging:
  level:
    org.apache.kafka: WARN
    kafka: WARN
    org.testcontainers: INFO
    com.wms.master: INFO
