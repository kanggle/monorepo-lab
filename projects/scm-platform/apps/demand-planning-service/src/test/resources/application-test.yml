spring:
  datasource:
    # H2 in-memory for JPA slice tests. IT overrides via @DynamicPropertySource.
    url: "jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE"
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        jdbc.time_zone: UTC
    open-in-view: false

  flyway:
    enabled: false

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: scm-demand-planning-v1-test
      auto-offset-reset: earliest
    listener:
      ack-mode: manual

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9999
          jwk-set-uri: http://localhost:9999/oauth2/jwks

scmplatform:
  oauth2:
    allowed-issuers: "http://localhost:9999,iam"
    required-tenant-id: scm

demand-planning:
  sweep:
    cron: "0 0 2 * * *"

logging:
  level:
    root: WARN
    com.example.scmplatform.demandplanning: DEBUG
