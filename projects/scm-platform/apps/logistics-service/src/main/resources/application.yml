spring:
  application:
    name: scm-platform-logistics-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:scm_logistics}
    username: ${POSTGRES_USER:scm}
    password: ${POSTGRES_PASSWORD:scm}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      # Flyway owns the schema — Hibernate validates only.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration/logistics
    baseline-on-migrate: true

  # Kafka SCAFFOLD only. The seam consumer (@KafkaListener on
  # wms.outbound.shipping.confirmed.v1, group scm-logistics-v1) is wired in
  # TASK-SCM-BE-044 — no listener consumes this topic yet.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:kafka:9092}
    consumer:
      group-id: scm-logistics-v1
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
      properties:
        isolation.level: read_committed
    listener:
      ack-mode: manual

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URL:http://iam.local}
          jwk-set-uri: ${OIDC_JWK_SET_URI:${JWT_JWKS_URI:${OIDC_ISSUER_URL:http://iam.local}/oauth2/jwks}}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  level:
    root: INFO
    com.example.scmplatform.logistics: INFO
    org.hibernate.SQL: WARN
  pattern:
    level: "%5p [traceId=%X{traceId:-} requestId=%X{requestId:-} tenantId=%X{tenantId:-}]"

scmplatform:
  oauth2:
    allowed-issuers: ${OIDC_ALLOWED_ISSUERS:${OIDC_ISSUER_URL:http://iam.local},iam}
    required-tenant-id: ${OIDC_REQUIRED_TENANT_ID:scm}

logistics:
  # EasyPost carrier-aggregator dispatch (external-integrations.md §1).
  # Auth = HTTP Basic (API key as username, empty password). base = api.easypost.com/v2.
  # The dev fallback key is a placeholder — a missing/invalid key surfaces as
  # DISPATCH_FAILED on first call (§6), never a boot failure.
  easypost:
    base-url: ${EASYPOST_BASE_URL:https://api.easypost.com/v2}
    api-key: ${EASYPOST_API_KEY:easypost-test-key-placeholder}
    connect-timeout-seconds: ${EASYPOST_CONNECT_TIMEOUT_SECONDS:5}
    read-timeout-seconds: ${EASYPOST_READ_TIMEOUT_SECONDS:30}
    # Dedicated pool — NOT shared with any other vendor (I9).
    pool-max-total: ${EASYPOST_POOL_MAX_TOTAL:10}
    pool-max-per-route: ${EASYPOST_POOL_MAX_PER_ROUTE:10}

  # 굿스플로 domestic carrier-aggregator dispatch (external-integrations.md §2, BE-043).
  # Auth = API-key header (NOT Basic). base = test-api.goodsflow.io for stg/dev.
  # A missing/invalid key surfaces ONLY on 굿스플로 dispatches as DISPATCH_FAILED
  # (EasyPost unaffected — per-vendor keys/pools, §6), never a boot failure.
  goodsflow:
    base-url: ${GOODSFLOW_BASE_URL:https://test-api.goodsflow.io}
    api-key: ${GOODSFLOW_API_KEY:goodsflow-test-key-placeholder}
    # Vendor-specified API-key header name (§2.2). Configurable — set to whatever the
    # 굿스플로 OPEN API mandates without a code change.
    api-key-header-name: ${GOODSFLOW_API_KEY_HEADER:Authorization}
    connect-timeout-seconds: ${GOODSFLOW_CONNECT_TIMEOUT_SECONDS:5}
    read-timeout-seconds: ${GOODSFLOW_READ_TIMEOUT_SECONDS:30}
    # Dedicated pool — NOT shared with EasyPost or any other vendor (I9, §2.8).
    pool-max-total: ${GOODSFLOW_POOL_MAX_TOTAL:10}
    pool-max-per-route: ${GOODSFLOW_POOL_MAX_PER_ROUTE:10}

  # CarrierRouter registry (ADR-053 §D3). carrierCode → vendor; a null/unmapped code
  # routes to default-vendor with a CARRIER_UNROUTABLE degrade (never a drop). The
  # domestic/international split is registry structure — the seam carries carrierCode,
  # not a geographic Region.
  carrier-router:
    default-vendor: ${LOGISTICS_DEFAULT_VENDOR:EASYPOST}
    carrier-vendors:
      # Domestic (KR) carriers → 굿스플로.
      CJ-LOGISTICS: GOODSFLOW
      HANJIN: GOODSFLOW
      LOTTE: GOODSFLOW
      KOREA-POST: GOODSFLOW
      # International carriers → EasyPost.
      UPS: EASYPOST
      FEDEX: EASYPOST
      DHL: EASYPOST
      USPS: EASYPOST

# Dedicated EasyPost resilience instances (external-integrations.md §1.5/§1.6/§1.8).
# NOT shared with any other pool (I9). 429 is surfaced by the client as a
# EasyPostRateLimitedException so it is RETRIED (retry-exceptions) while other 4xx
# (HttpClientErrorException) are IGNORED (never retried, never open the circuit).
resilience4j:
  circuitbreaker:
    instances:
      easyPostDispatch:
        failure-rate-threshold: 50
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: false
        record-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
          - java.io.IOException
          - com.example.scmplatform.logistics.adapter.outbound.dispatch.EasyPostRateLimitedException
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
      # 굿스플로 circuit — same policy SHAPE as easyPostDispatch, INDEPENDENT instance (I9,
      # external-integrations.md §2.5). A 굿스플로 outage must not open EasyPost's circuit.
      goodsflowDispatch:
        failure-rate-threshold: 50
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: false
        record-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
          - java.io.IOException
          - com.example.scmplatform.logistics.adapter.outbound.dispatch.GoodsflowRateLimitedException
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
  retry:
    instances:
      easyPostDispatch:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        exponential-max-wait-duration: 4s
        enable-randomized-wait: true
        # ±200ms jitter at the ~1s base (external-integrations.md §1.6). resilience4j
        # jitter is proportional to the interval, so this approximates ±200ms at 1s.
        randomized-wait-factor: 0.2
        retry-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
          - java.io.IOException
          - com.example.scmplatform.logistics.adapter.outbound.dispatch.EasyPostRateLimitedException
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
          - io.github.resilience4j.bulkhead.BulkheadFullException
      # 굿스플로 retry — same shape as easyPostDispatch (3 attempts, ~1/2/4s ±200ms),
      # INDEPENDENT instance (I9, §2.6). 429 → GoodsflowRateLimitedException → retried.
      goodsflowDispatch:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        exponential-max-wait-duration: 4s
        enable-randomized-wait: true
        randomized-wait-factor: 0.2
        retry-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
          - java.io.IOException
          - com.example.scmplatform.logistics.adapter.outbound.dispatch.GoodsflowRateLimitedException
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
          - io.github.resilience4j.bulkhead.BulkheadFullException
  bulkhead:
    instances:
      easyPostDispatch:
        max-concurrent-calls: 10
        # fail-fast → BulkheadFullException → DISPATCH_FAILED (I9).
        max-wait-duration: 0
      # 굿스플로 bulkhead — dedicated 10-slot fail-fast semaphore, INDEPENDENT of EasyPost (I9, §2.8).
      goodsflowDispatch:
        max-concurrent-calls: 10
        max-wait-duration: 0
