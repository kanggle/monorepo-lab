plugins {
    id 'org.springframework.boot'
    id 'io.spring.dependency-management'
}

group = 'com.example.scmplatform.logistics'

// -------------------------------------------------------------------------
// Source sets:
//
// * `test`             — unit + slice tests (default).
// * `integrationTest`  — Testcontainers-backed integration tests
//                         (Postgres + WireMock EasyPost stand-in).
//                         Tagged @Tag("integration"); excluded from `test`
//                         so `./gradlew check` stays Docker-free on
//                         developer machines.
//
// TASK-SCM-BE-042 (ADR-MONO-053 Phase 1). Blueprint: demand-planning-service
// (bootstrap layout, OAuth2 RS, tenant dual-accept) + procurement-service
// (Resilience4j vendor adapter). The EasyPost outbound leg uses a DEDICATED
// Apache HttpClient 5 pool (integration-heavy I9) — httpclient5 is added here.
// -------------------------------------------------------------------------

dependencies {
    // Spring Boot starters
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-oauth2-resource-server'
    // Kafka scaffold only — the seam consumer (@KafkaListener) is wired in BE-044.
    implementation 'org.springframework.kafka:spring-kafka'

    // Database
    implementation 'org.flywaydb:flyway-core'
    implementation 'org.flywaydb:flyway-database-postgresql'
    runtimeOnly 'org.postgresql:postgresql'

    // Resilience4j — dedicated EasyPost circuit breaker / retry / bulkhead (I2/I3/I9)
    implementation 'io.github.resilience4j:resilience4j-spring-boot3:2.2.0'
    implementation 'io.github.resilience4j:resilience4j-circuitbreaker:2.2.0'
    implementation 'io.github.resilience4j:resilience4j-retry:2.2.0'
    implementation 'io.github.resilience4j:resilience4j-bulkhead:2.2.0'

    // Apache HttpClient 5 — the DEDICATED easypost-client connection pool
    // (PoolingHttpClientConnectionManager maxTotal=10, I1/I9). Not shared with any
    // other vendor pool (external-integrations.md §1.8). Version managed by the BOM.
    implementation 'org.apache.httpcomponents.client5:httpclient5'

    // Observability
    implementation 'io.micrometer:micrometer-registry-prometheus'
    implementation 'io.micrometer:micrometer-tracing-bridge-otel'
    implementation 'io.opentelemetry:opentelemetry-exporter-otlp'

    // JSON
    implementation 'com.fasterxml.jackson.core:jackson-databind'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310'

    // Structured logging (prod profile)
    implementation 'net.logstash.logback:logstash-logback-encoder:8.0'

    // Shared libs
    implementation project(':libs:java-common')
    implementation project(':libs:java-web')
    implementation project(':libs:java-messaging')
    implementation project(':libs:java-observability')
    implementation project(':libs:java-security')
    // ADR-MONO-049 § D5-5: the canonical servlet TenantClaimEnforcer. `implementation`, not
    // `api` — a shared security class must not transit onto a consumer's compile classpath.
    implementation project(':libs:java-security-servlet')

    // Test (unit + slice)
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'org.springframework.kafka:spring-kafka-test'
    testImplementation 'org.assertj:assertj-core'

    // JWT signing helper used by validator unit tests and the integration suite.
    testImplementation 'com.nimbusds:nimbus-jose-jwt:9.48'

    // Shared Testcontainers base utilities (DockerAvailableCondition etc.)
    testImplementation testFixtures(project(':libs:java-test-support'))

    // Testcontainers (integration tests, @Tag("integration"))
    testImplementation 'org.testcontainers:junit-jupiter:1.21.3'
    testImplementation 'org.testcontainers:postgresql:1.21.3'
    testImplementation 'org.awaitility:awaitility:4.2.2'

    // WireMock — EasyPost vendor stand-in for the integration-heavy dispatch matrix (I10).
    testImplementation 'org.wiremock:wiremock-standalone:3.9.1'

    // MockWebServer for the JWKS stand-in.
    testImplementation 'com.squareup.okhttp3:okhttp:4.12.0'
    testImplementation 'com.squareup.okhttp3:mockwebserver:4.12.0'
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.boot:spring-boot-dependencies:${springBootVersion}"
        mavenBom "org.testcontainers:testcontainers-bom:1.21.3"
    }
}

tasks.named('bootJar') {
    archiveFileName = 'logistics-service.jar'
}

// Default `test` task: unit + slice only. Excludes Docker-dependent tests so
// `./gradlew check` stays fast and Docker-free.
test {
    useJUnitPlatform {
        excludeTags 'integration'
    }
}

// Dedicated task that runs ONLY @Tag("integration") tests.
// Not wired into `check` so the fast feedback loop stays Docker-free.
tasks.register('integrationTest', Test) {
    description = 'Runs Testcontainers-backed integration tests (requires Docker).'
    group = 'verification'
    useJUnitPlatform {
        includeTags 'integration'
    }
    shouldRunAfter tasks.named('test')

    testLogging {
        events 'passed', 'failed', 'skipped'
        exceptionFormat 'full'
        showStandardStreams = true
    }

    // Generous timeout — container cold start can exceed 30s on CI.
    systemProperty 'junit.jupiter.execution.timeout.default', '5m'
}
