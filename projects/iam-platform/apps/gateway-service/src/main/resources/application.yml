server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        # OIDC / OAuth2 standard endpoints (TASK-BE-251 Phase 2c).
        # Ordered BEFORE auth-service to ensure /oauth2/** and /.well-known/openid-configuration
        # are forwarded to auth-service WITHOUT gateway JWT verification.
        # The SAS filter chain inside auth-service handles all authentication for these paths.
        - id: auth-service-oidc
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/oauth2/**,/.well-known/openid-configuration
          filters:
            - StripPrefix=0

        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        # TASK-BE-508: user session-management endpoints are implemented by
        # auth-service (AccountSessionController), NOT account-service, yet they
        # share the /api/accounts/me/sessions prefix. This more-specific route MUST
        # be declared BEFORE the account-service /api/accounts/** route — Spring
        # Cloud Gateway matches routes in DECLARATION ORDER, so the broader account
        # route would otherwise swallow session calls (misroute → account-service
        # NoResourceFoundException → 500). Authenticated: NOT in public-paths, so the
        # JWT filter runs and injects X-Account-ID / X-Device-Id downstream.
        - id: auth-service-sessions
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/accounts/me/sessions,/api/accounts/me/sessions/**
          filters:
            - StripPrefix=0

        - id: account-service
          uri: ${ACCOUNT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/accounts/**
          filters:
            - StripPrefix=0

        - id: admin-service
          uri: ${ADMIN_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/admin/**,/.well-known/admin/**
          filters:
            - StripPrefix=0

        - id: account-service-internal
          uri: ${ACCOUNT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/internal/tenants/**
          filters:
            - StripPrefix=0

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 100ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: never
    prometheus:
      enabled: true
  metrics:
    tags:
      service: ${spring.application.name}

gateway:
  jwt:
    jwks-url: ${JWKS_URL:http://localhost:8081/internal/auth/jwks}
    jwks-refresh-interval-ms: 600000
    jwks-cache-ttl-seconds: 600
    grace-period-seconds: 300
    # TASK-BE-143: enforce the iss claim.
    #
    # TASK-MONO-365: an ALLOWLIST, not a single value — and this edge was the only
    # gateway of seven that pinned one. IAM mints two issuers during the D2-b window:
    # the SAS/OIDC issuer (auth-service application.yml L177) and the legacy `iam`
    # string (L114). The other six gateways accept both. This one accepted the LEGACY
    # value only, and JWT_EXPECTED_ISSUER was overridden in no compose file anywhere —
    # so SAS-issued tokens, which the rest of the fleet takes as primary, were 401'd
    # here. Nothing failed, because console-bff reaches the IAM services directly and
    # never crosses this edge (TASK-MONO-347).
    #
    # TASK-BE-398 retires the legacy custom-JWT flow that mints `iss=iam`. Under the
    # old single-value config, that would have left this gateway with NO acceptable
    # issuer at all. When BE-398 lands, drop the trailing `,iam` here — and
    # `TokenValidatorUnitTest#theEdgeSurvivesTheLegacyIssuerSunset` already asserts
    # that the edge keeps working when you do.
    allowed-issuers: ${JWT_ALLOWED_ISSUERS:${OIDC_ISSUER_URL:http://localhost:8081},iam}

  tenant:
    legacy-fallback:
      enabled: ${GATEWAY_TENANT_LEGACY_FALLBACK_ENABLED:false}
      default-tenant-id: fan-platform

  rate-limit:
    fail-open: ${RATE_LIMIT_FAIL_OPEN:true}
    login:
      max-requests: 20
      window-seconds: 60
    signup:
      max-requests: 5
      window-seconds: 60
    refresh:
      max-requests: 10
      window-seconds: 60
    global:
      max-requests: 100
      window-seconds: 1

  public-paths:
    - POST:/api/auth/login
    - POST:/api/accounts/signup
    - POST:/api/auth/refresh
    - GET:/api/auth/oauth/authorize
    - POST:/api/auth/oauth/callback
    - GET:/actuator/health
    # OIDC / OAuth2 standard endpoints (TASK-BE-251 Phase 2c).
    # Gateway passes these through without JWT verification — auth-service (SAS)
    # handles all authentication for these endpoints internally.
    # Covers: /oauth2/authorize, /oauth2/token, /oauth2/jwks, /oauth2/userinfo,
    #         /oauth2/revoke, /oauth2/introspect, /.well-known/openid-configuration
    - GET:/oauth2/**
    - POST:/oauth2/**
    - GET:/.well-known/openid-configuration
    # admin-service self-serve auth (no operator JWT at gateway layer).
    # operator JWT verification is delegated to admin-service
    # OperatorAuthenticationFilter. admin-api.md §Authentication Exceptions.
    - POST:/api/admin/auth/login
    # TASK-BE-298 / ADR-MONO-014: GAP OIDC -> operator token exchange.
    # No prior operator JWT (GAP OIDC subject token in body); admin-service
    # TokenExchangeService validates the subject token against auth-service
    # JWKS and fail-closed mints the operator token. Same model as /login.
    - POST:/api/admin/auth/token-exchange
    - POST:/api/admin/auth/2fa/enroll
    - POST:/api/admin/auth/2fa/verify
    - POST:/api/admin/auth/refresh
    - GET:/.well-known/admin/jwks.json
    # admin operator-protected endpoints. gateway skips its account-JWT check
    # because operator tokens are signed by admin-service (separate JWKS);
    # admin-service's OperatorAuthenticationFilter is the single verification
    # point for operator identity. See gateway-api.md §Admin Routes.
    - GET:/api/admin/accounts
    - GET:/api/admin/accounts/**
    - POST:/api/admin/accounts/*/lock
    - POST:/api/admin/accounts/*/unlock
    - POST:/api/admin/sessions/*/revoke
    - GET:/api/admin/audit
    # TASK-BE-296: platform-console product/tenant registry. operator JWT is
    # verified by admin-service OperatorAuthenticationFilter (single point) —
    # gateway skips its account-JWT check, same model as GET /api/admin/audit.
    - GET:/api/admin/console/registry

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
