spring:
  application:
    name: membership-service
  config:
    import: optional:classpath:application-defaults.yml

  datasource:
    url: jdbc:mysql://localhost:3306/membership_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:membership_user}
    password: ${DB_PASSWORD:membership_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 50ms

  # TASK-BE-253: Standard OAuth2 Resource Server.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URL:http://localhost:8081}
          jwk-set-uri: ${OIDC_JWK_SET_URI:${OIDC_ISSUER_URL:http://localhost:8081}/oauth2/jwks}

server:
  port: 8087

outbox:
  topic-mapping:
    membership.subscription.activated: membership.subscription.activated
    membership.subscription.expired: membership.subscription.expired
    membership.subscription.cancelled: membership.subscription.cancelled

# TASK-BE-318d (ADR-005 단계 3): outbound /internal/accounts/** calls (AccountStatusClient)
# authenticate with a GAP client_credentials Bearer JWT (replaces the legacy X-Internal-Token).
# Token is fetched from GAP /oauth2/token and cached by IamClientCredentialsTokenProvider.
# membership-service-client is pre-registered (V0009, client_credentials, scope account.read).
iam:
  internal-client:
    token-uri: ${OIDC_TOKEN_URI:${OIDC_ISSUER_URL:http://localhost:8081}/oauth2/token}
    client-id: ${MEMBERSHIP_SERVICE_CLIENT_ID:membership-service-client}
    client-secret: ${MEMBERSHIP_SERVICE_CLIENT_SECRET:membership-service-secret}

membership:
  # TASK-BE-454: v2 outbox relay (MembershipOutboxPublisher) cadence. The legacy
  # `outbox.topic-mapping` block above feeds the now-unused lib v1 relay
  # (KEEP-auto-config); the v2 relay reads these `membership.outbox.*` keys.
  outbox:
    poll-ms: ${MEMBERSHIP_OUTBOX_POLL_MS:1000}
    initial-delay-ms: ${MEMBERSHIP_OUTBOX_INITIAL_DELAY_MS:5000}
    batch-size: ${MEMBERSHIP_OUTBOX_BATCH_SIZE:100}
  # TASK-BE-253: OIDC Resource Server validators.
  oauth2:
    # Acceptable iss claim values during the D2-b deprecation window.
    allowed-issuers: ${OIDC_ALLOWED_ISSUERS:${OIDC_ISSUER_URL:http://localhost:8081},iam}
    required-tenant-id: ${OIDC_REQUIRED_TENANT_ID:fan-platform}
  account-service:
    base-url: ${ACCOUNT_SERVICE_URL:http://localhost:8082}
    connect-timeout-ms: ${ACCOUNT_SERVICE_CONNECT_TIMEOUT:2000}
    read-timeout-ms: ${ACCOUNT_SERVICE_READ_TIMEOUT:3000}
    # TASK-BE-318d: membership → account `/internal/accounts/{id}/status` now authenticates with a
    # GAP client_credentials Bearer JWT (iam.internal-client below) — the legacy X-Internal-Token was
    # removed. Receiver dual-allows JWT or X-token (BE-317).
  idempotency:
    ttl-seconds: ${IDEMPOTENCY_TTL_SECONDS:86400}
  scheduler:
    expiry-fixed-delay-ms: ${EXPIRY_SCHEDULER_DELAY_MS:3600000}
    expiry-batch-size: ${EXPIRY_SCHEDULER_BATCH_SIZE:100}
