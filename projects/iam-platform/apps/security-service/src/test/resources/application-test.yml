spring:
  application:
    name: security-service-test

  # TASK-BE-075: Hikari validation options for Testcontainers MySQL.
  # Rationale: CI observed stale pool connections reused across context
  # boundaries, surfacing as Communications link failure inside
  # OutboxPollingScheduler. These options force validation and aggressive
  # recycling during the short test lifetime.
  # Invariants: max-lifetime > keepalive-time (Hikari requirement).
  datasource:
    hikari:
      validation-timeout: 3000
      connection-test-query: SELECT 1
      max-lifetime: 60000
      keepalive-time: 30000
      leak-detection-threshold: 10000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  kafka:
    consumer:
      # TASK-MONO-046-3 Phase 6: per-Spring-context random group ID. KafkaProperties is
      # bound via @ConfigurationProperties so ${random.uuid} is evaluated ONCE per
      # context refresh — every test class that builds a fresh ApplicationContext
      # (each one does, via distinct @DynamicPropertySource) lands on a unique
      # group. @KafkaListener annotations no longer set groupId, so this consumer
      # factory value is what the listener containers use.
      group-id: test-security-service-${random.uuid}
      # TASK-MONO-046-3 Phase 7: auto-offset-reset=latest so a fresh per-class
      # consumer group does NOT replay every accumulated message from prior classes
      # in the shared Kafka container's topics. Tests must wait for partition
      # assignment via ContainerTestUtils.waitForAssignment before sending — see
      # the @BeforeEach hook in each IT class.
      auto-offset-reset: latest
      enable-auto-commit: false
      # TASK-MONO-046-8a: align with production deserializer chain so
      # DlqRoutingIntegrationTest.invalidBytesRoutedToDlq exercises the same
      # ErrorHandlingDeserializer + StrictJsonStringDeserializer path that
      # production uses. Plain StringDeserializer (the previous override)
      # silently decoded poison bytes to garbage strings + bypassed EHD's
      # header-stash + byte[]-restore path, so the byte[] DLPR test never
      # received the original bytes on .dlq.
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      # TASK-BE-075: reconnect backoff tuning for Testcontainers Kafka.
      # CI sees random port assignment between container restarts; aggressive
      # reconnect helps the Consumer recover from transient broker drops.
      properties:
        reconnect.backoff.ms: 500
        reconnect.backoff.max.ms: 10000
        request.timeout.ms: 60000
        # ErrorHandlingDeserializer delegates — match production wiring.
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: com.example.security.infrastructure.kafka.StrictJsonStringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      # TASK-BE-070: extend reconnect backoff and request timeout so producer
      # tests tolerate slow Testcontainers Kafka startup / transient broker drops.
      # TASK-BE-075: add reconnect.backoff.max.ms + tighten reconnect.backoff.ms.
      properties:
        reconnect.backoff.ms: 500
        reconnect.backoff.max.ms: 10000
        request.timeout.ms: 60000
    # TASK-MONO-046-3: ack-mode=record commits offsets per record so an unexpected
    # @DirtiesContext teardown mid-batch cannot leave uncommitted offsets that the
    # next test class's listener would re-read with auto-offset-reset=earliest.
    # Production stays on the Spring Kafka default (BATCH) — this override is
    # test-profile only.
    listener:
      ack-mode: record

outbox:
  polling:
    interval-ms: 60000
    batch-size: 10

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

security-service:
  dedup:
    redis-ttl-seconds: 60
  # TASK-BE-319a: internal-token removed (JWT-only). The 'test' profile bypasses InternalAuthFilter,
  # so /internal/** slice + integration tests need no credential.

# TASK-BE-032: override detection thresholds for test runs.
# Demonstrates that rule behaviour is config-driven and can be tuned
# without code changes. Values are intentionally close to defaults so
# integration tests remain deterministic.
security:
  # TASK-BE-453: v2 outbox relay cadence. Long poll + initial-delay so the
  # background relay does not race the test assertions; ITs that need fast
  # publishing override security.outbox.poll-ms via @DynamicPropertySource.
  outbox:
    poll-ms: 60000
    initial-delay-ms: 1000
    batch-size: 10
  detection:
    velocity:
      threshold: 5
      window-seconds: 600
      score-weight: 80
    geo:
      speed-km-per-hour: 900
      min-score: 85
      score-slope: 15
    device:
      score: 50
      alert-on-new: true
    auto-lock:
      account-service-base-url: http://localhost:0
      max-attempts: 2
      initial-backoff-ms: 50
      connect-timeout-ms: 500
      read-timeout-ms: 2000
    geoip:
      db-path: ""

app:
  pii:
    masking:
      fingerprint-salt: test-fingerprint-salt-TASK-BE-270
