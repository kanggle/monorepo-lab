<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Create your Global Account</title>
    <style>
        :root { color-scheme: light dark; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; display: flex; min-height: 100vh; align-items: center; justify-content: center;
            background: #f4f5f7;
        }
        .card {
            background: #fff; width: 360px; max-width: calc(100vw - 32px);
            padding: 32px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08);
        }
        h1 { font-size: 20px; margin: 0 0 24px; text-align: center; }
        label { display: block; font-size: 13px; margin: 12px 0 4px; color: #333; }
        input[type=email], input[type=password], input[type=text] {
            width: 100%; box-sizing: border-box; padding: 10px 12px; font-size: 14px;
            border: 1px solid #ccc; border-radius: 8px;
        }
        .hint { font-size: 12px; color: #888; margin: 4px 0 0; }
        button.primary {
            width: 100%; margin-top: 20px; padding: 11px; font-size: 14px; font-weight: 600;
            color: #fff; background: #2563eb; border: none; border-radius: 8px; cursor: pointer;
        }
        .error {
            background: #fde8e8; color: #9b1c1c; border: 1px solid #f8b4b4;
            padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px;
        }
        .footer { margin-top: 20px; font-size: 13px; text-align: center; color: #555; }
        .footer a { color: #2563eb; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <h1>Create your Global Account</h1>

    <!-- fix-001: errors are rendered server-side after the proxy call (no client fetch). -->
    <div class="error" th:if="${error != null}" th:text="${error}" role="alert">error</div>

    <form th:action="@{/signup}" method="post" id="signup-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email"
               th:value="${email}" required autofocus/>

        <label for="displayName">Display name <span style="color:#aaa">(optional)</span></label>
        <input type="text" id="displayName" name="displayName" autocomplete="name"
               th:value="${displayName}" maxlength="100"/>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="new-password" required/>
        <p class="hint">8자 이상, 대문자·소문자·숫자·특수문자 중 3종 이상.</p>

        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required/>

        <button type="submit" class="primary">회원가입</button>
    </form>

    <div class="footer">
        이미 계정이 있으신가요? <a th:href="@{/login}">로그인</a>
    </div>
</div>

<!-- Progressive enhancement: block an obvious mismatch/short password before the round-trip.
     The server re-validates regardless (source of truth). -->
<script th:inline="none">
    (function () {
        var form = document.getElementById('signup-form');
        form.addEventListener('submit', function (e) {
            var pw = document.getElementById('password').value;
            var cpw = document.getElementById('confirmPassword').value;
            if (pw.length < 8) {
                e.preventDefault();
                alert('패스워드는 8자 이상이어야 합니다.');
                return;
            }
            if (pw !== cpw) {
                e.preventDefault();
                alert('패스워드가 일치하지 않습니다.');
            }
        });
    })();
</script>
</body>
</html>
