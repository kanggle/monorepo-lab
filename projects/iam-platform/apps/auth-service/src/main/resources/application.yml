spring:
  application:
    name: auth-service
  config:
    import: optional:classpath:application-defaults.yml

  datasource:
    url: jdbc:mysql://localhost:3306/auth_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:auth_user}
    password: ${DB_PASSWORD:auth_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 50ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1

outbox:
  polling:
    interval-ms: ${OUTBOX_POLLING_INTERVAL_MS:1000}
    batch-size: ${OUTBOX_POLLING_BATCH_SIZE:50}
  topic-mapping:
    auth.login.attempted: auth.login.attempted
    auth.login.failed: auth.login.failed
    auth.login.succeeded: auth.login.succeeded
    auth.token.refreshed: auth.token.refreshed
    auth.token.reuse.detected: auth.token.reuse.detected
    auth.session.created: auth.session.created
    auth.session.revoked: auth.session.revoked

server:
  port: 8081

# OIDC issuer URL — externalized for gateway / production override.
# TASK-BE-251: Spring Authorization Server discovery document uses this as the issuer claim.
# Override with: OIDC_ISSUER_URL=https://auth.example.com (gateway-facing external URL).
oidc:
  issuer-url: ${OIDC_ISSUER_URL:http://localhost:8081}

oauth:
  google:
    client-id: ${OAUTH_GOOGLE_CLIENT_ID:test-google-client-id}
    client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET:test-google-client-secret}
    redirect-uri: ${OAUTH_GOOGLE_REDIRECT_URI:http://localhost:3000/oauth/callback}
    # Server-side allowlist of redirect URIs (exact-string match). Comma-separated env var.
    # TASK-BE-396 (ADR-006): the SAS browser flow's callback URIs are added so
    # SocialLoginBrowserController's authorize() passes redirect-uri validation.
    allowed-redirect-uris: ${OAUTH_GOOGLE_ALLOWED_REDIRECT_URIS:http://localhost:3000/oauth/callback,http://iam.local/login/oauth/google/callback,http://localhost:8081/login/oauth/google/callback}
    scopes: openid,email,profile
    token-uri: https://oauth2.googleapis.com/token
    auth-uri: https://accounts.google.com/o/oauth2/v2/auth
    # TASK-BE-145: id_token signature + iss + aud + exp verification.
    # Google publishes both 'https://accounts.google.com' and 'accounts.google.com' as iss.
    jwks-uri: ${OAUTH_GOOGLE_JWKS_URI:https://www.googleapis.com/oauth2/v3/certs}
    expected-issuer-pattern: ${OAUTH_GOOGLE_ISSUER_PATTERN:^(https://)?accounts\.google\.com$}
  kakao:
    client-id: ${OAUTH_KAKAO_CLIENT_ID:test-kakao-client-id}
    client-secret: ${OAUTH_KAKAO_CLIENT_SECRET:test-kakao-client-secret}
    redirect-uri: ${OAUTH_KAKAO_REDIRECT_URI:http://localhost:3000/oauth/callback}
    allowed-redirect-uris: ${OAUTH_KAKAO_ALLOWED_REDIRECT_URIS:http://localhost:3000/oauth/callback,http://iam.local/login/oauth/kakao/callback,http://localhost:8081/login/oauth/kakao/callback}
    scopes: account_email,profile_nickname
    token-uri: https://kauth.kakao.com/oauth/token
    auth-uri: https://kauth.kakao.com/oauth/authorize
    user-info-uri: https://kapi.kakao.com/v2/user/me
    # Kakao does not return an id_token — JWKS verification is not applied.
  microsoft:
    client-id: ${OAUTH_MICROSOFT_CLIENT_ID:test-microsoft-client-id}
    client-secret: ${OAUTH_MICROSOFT_CLIENT_SECRET:test-microsoft-client-secret}
    redirect-uri: ${OAUTH_MICROSOFT_REDIRECT_URI:http://localhost:3000/oauth/callback}
    allowed-redirect-uris: ${OAUTH_MICROSOFT_ALLOWED_REDIRECT_URIS:http://localhost:3000/oauth/callback,http://iam.local/login/oauth/microsoft/callback,http://localhost:8081/login/oauth/microsoft/callback}
    scopes: openid,email,profile
    token-uri: https://login.microsoftonline.com/${OAUTH_MICROSOFT_TENANT:common}/oauth2/v2.0/token
    auth-uri: https://login.microsoftonline.com/${OAUTH_MICROSOFT_TENANT:common}/oauth2/v2.0/authorize
    # TASK-BE-145: id_token JWKS verification. Microsoft tenant=common returns
    # iss containing the actual user tenant guid — regex pattern below allows that.
    jwks-uri: ${OAUTH_MICROSOFT_JWKS_URI:https://login.microsoftonline.com/${OAUTH_MICROSOFT_TENANT:common}/discovery/v2.0/keys}
    expected-issuer-pattern: ${OAUTH_MICROSOFT_ISSUER_PATTERN:^https://login\.microsoftonline\.com/[^/]+/v2\.0$}
  naver:
    client-id: ${OAUTH_NAVER_CLIENT_ID:test-naver-client-id}
    client-secret: ${OAUTH_NAVER_CLIENT_SECRET:test-naver-client-secret}
    redirect-uri: ${OAUTH_NAVER_REDIRECT_URI:http://localhost:3000/oauth/callback}
    allowed-redirect-uris: ${OAUTH_NAVER_ALLOWED_REDIRECT_URIS:http://localhost:3000/oauth/callback,http://iam.local/login/oauth/naver/callback,http://localhost:8081/login/oauth/naver/callback}
    scopes: name,email
    token-uri: https://nid.naver.com/oauth2.0/token
    auth-uri: https://nid.naver.com/oauth2.0/authorize
    user-info-uri: https://openapi.naver.com/v1/nid/me
    # Naver does not return an id_token — JWKS verification is not applied (mirrors Kakao).

auth:
  # TASK-BE-450 — v2 outbox relay (AuthOutboxPublisher) cadence + batch size.
  outbox:
    poll-ms: ${AUTH_OUTBOX_POLL_MS:1000}
    initial-delay-ms: ${AUTH_OUTBOX_INITIAL_DELAY_MS:5000}
    batch-size: ${AUTH_OUTBOX_BATCH_SIZE:100}
  jwt:
    issuer: iam
    access-token-ttl-seconds: ${JWT_ACCESS_TTL:1800}
    refresh-token-ttl-seconds: ${JWT_REFRESH_TTL:604800}
    private-key-path: ${JWT_PRIVATE_KEY_PATH:classpath:keys/private.pem}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:classpath:keys/public.pem}
    kid: ${JWT_KID:key-2026-04-01}
  login:
    max-failure-count: ${LOGIN_MAX_FAILURES:5}
    failure-window-seconds: ${LOGIN_FAILURE_WINDOW:900}
  password-reset:
    rate-limit:
      # TASK-BE-144: per-email reset request flood protection (silent drop on overflow,
      # 204 response shape preserved to avoid account-existence leaks).
      window-seconds: ${PASSWORD_RESET_WINDOW:900}
      max-attempts: ${PASSWORD_RESET_MAX_ATTEMPTS:3}
  device-session:
    max-active-sessions: ${AUTH_MAX_ACTIVE_SESSIONS:10}
  account-service:
    base-url: ${ACCOUNT_SERVICE_URL:http://localhost:8082}
    connect-timeout-ms: ${ACCOUNT_SERVICE_CONNECT_TIMEOUT:3000}
    # Outer leg of the browser signup path: SignupPageController POST /signup proxies to
    # account-service POST /api/accounts/signup, whose @Transactional chain synchronously
    # calls BACK into auth-service (createCredential → Argon2id). That inner account→auth
    # leg was raised to 15s in TASK-BE-247 to absorb cold-start / GC pauses, but this OUTER
    # auth→account timeout was left at 5s — a budget inversion: the outer call abandoned the
    # request (surfacing a false "인증 서비스가 일시적으로 불가합니다") while the backend went
    # on to create the account (retry then hit "이미 가입된 이메일"). Aligned to 20s so the
    # outer budget always exceeds the inner 15s ceiling. Beyond that, an async signup
    # redesign would be required (same stance as TASK-BE-247).
    read-timeout-ms: ${ACCOUNT_SERVICE_READ_TIMEOUT:20000}
  # TASK-BE-327 (ADR-MONO-020 D2): assume-tenant exchange assignment gate — auth-service calls
  # admin-service GET /internal/operator-assignments/check at issuance time. FAIL-CLOSED: any failure
  # (not-assigned / admin down / timeout / circuit-open) denies the assumed token.
  admin-service:
    base-url: ${ADMIN_SERVICE_URL:http://localhost:8084}
    connect-timeout-ms: ${ADMIN_SERVICE_CONNECT_TIMEOUT:3000}
    read-timeout-ms: ${ADMIN_SERVICE_READ_TIMEOUT:5000}

# TASK-BE-318c (ADR-005 단계 3c): outbound /internal/accounts/** calls (status / social-signup /
# profile) authenticate with a GAP client_credentials Bearer JWT (was unauthenticated). auth-service
# IS the GAP SAS, so the token is minted via a self-call to its own /oauth2/token — lazy (first
# outbound call) so startup never depends on the SAS being ready. Cached by
# IamClientCredentialsTokenProvider. Receiver (account /internal/**) dual-allows JWT or X-token (BE-317).
iam:
  internal-client:
    token-uri: ${OIDC_TOKEN_URI:${OIDC_ISSUER_URL:http://localhost:8081}/oauth2/token}
    client-id: ${AUTH_SERVICE_CLIENT_ID:auth-service-client}
    client-secret: ${AUTH_SERVICE_CLIENT_SECRET:secret}

# TASK-BE-487 (ADR-005 단계 4 — auth-service receiver): the credential/action /internal/auth/**
# endpoints authenticate with a GAP-issued client_credentials JWT (Authorization: Bearer) ONLY —
# closing the last internal boundary that was still permitAll. When bypass-when-unconfigured=false
# (default) and no valid JWT is presented, those endpoints are rejected with 401 (fail-closed). The
# bypass flag is for @WebMvcTest slice tests, local development and the 'test'/'standalone' profiles
# only — never in production. /internal/auth/jwks stays public (the gateway fetches keys to validate
# tokens and cannot present one). auth-service IS the GAP SAS, so the decoder validates tokens it
# issued itself; JWKS is fetched lazily (no OIDC discovery at startup) so bootup is not coupled to the
# SAS being ready.
internal:
  api:
    bypass-when-unconfigured: ${INTERNAL_API_BYPASS_WHEN_UNCONFIGURED:false}
    jwt:
      jwk-set-uri: ${OIDC_JWK_SET_URI:${OIDC_ISSUER_URL:http://localhost:8081}/oauth2/jwks}
      issuer: ${OIDC_ISSUER_URL:http://localhost:8081}
