spring:
  application:
    name: account-service
  config:
    import: optional:classpath:application-defaults.yml

  datasource:
    url: jdbc:mysql://localhost:3306/account_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:account_user}
    password: ${DB_PASSWORD:account_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  jpa:
    properties:
      hibernate:
        jdbc:
          # TASK-BE-257: bulk provisioning — Hibernate JDBC batch size for IO optimization.
          # Keeps per-row transactions short while grouping INSERT statements into batches of 50.
          batch_size: 50
        order_inserts: true
        order_updates: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 50ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
    consumer:
      # TASK-BE-103: account-service consumes auth.login.succeeded to update
      # accounts.last_login_succeeded_at. The group ID is independent from
      # security-service's "security-service" group so both services receive
      # every event.
      group-id: account-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        "[enable.idempotence]": true
        "[max.in.flight.requests.per.connection]": 1

server:
  port: 8082

account:
  # TASK-BE-451 — v2 outbox relay (AccountOutboxPublisher) cadence + batch size.
  outbox:
    poll-ms: ${ACCOUNT_OUTBOX_POLL_MS:1000}
    initial-delay-ms: ${ACCOUNT_OUTBOX_INITIAL_DELAY_MS:5000}
    batch-size: ${ACCOUNT_OUTBOX_BATCH_SIZE:100}
  deletion:
    grace-period-days: ${DELETION_GRACE_PERIOD_DAYS:30}
  auth-service:
    base-url: ${AUTH_SERVICE_URL:http://localhost:8081}
    connect-timeout-ms: 3000
    # TASK-BE-247: raised from 5000 to 15000 to mask auth-service cold-start / GC pauses.
    # This reduces the race window where auth-service commits after account-service times out
    # and rolls back (half-commit producing an orphan credential). 15s is the agreed UX ceiling;
    # beyond that, async signup redesign would be required.
    read-timeout-ms: 15000

outbox:
  polling:
    interval-ms: ${OUTBOX_POLLING_INTERVAL_MS:1000}
    batch-size: ${OUTBOX_POLLING_BATCH_SIZE:50}
  topic-mapping:
    account.created: account.created
    account.status.changed: account.status.changed
    account.locked: account.locked
    account.unlocked: account.unlocked
    account.deleted: account.deleted

internal:
  api:
    # TASK-BE-319b (ADR-005 단계 4b): /internal/** authenticates with a GAP-issued
    # client_credentials JWT (Authorization: Bearer) ONLY — the legacy static X-Internal-Token
    # (internal.api.token) was removed now that every caller (security/admin/auth/community/
    # membership) is on Bearer. When bypass-when-unconfigured=false (default) and no valid JWT is
    # presented, /internal/** is rejected with 401 (fail-closed). The bypass flag is for @WebMvcTest
    # slice tests, local development and the 'test'/'standalone' profiles only — never in production.
    bypass-when-unconfigured: ${INTERNAL_API_BYPASS_WHEN_UNCONFIGURED:false}
    # The decoder validates signature (JWKS) + issuer only — account-service is multi-tenant, so no
    # tenant_id pinning here. JWKS is fetched lazily (no OIDC discovery at startup), so bootup is not
    # coupled to auth-service availability.
    jwt:
      jwk-set-uri: ${OIDC_JWK_SET_URI:${OIDC_ISSUER_URL:http://localhost:8081}/oauth2/jwks}
      issuer: ${OIDC_ISSUER_URL:http://localhost:8081}
