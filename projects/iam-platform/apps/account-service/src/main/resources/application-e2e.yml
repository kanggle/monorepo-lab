# E2E profile — docker-compose.e2e.yml driven overrides.
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:account_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:account_user}
    password: ${DB_PASSWORD:account_pass}
    # TASK-BE-045: see auth-service/application-e2e.yml for rationale.
    hikari:
      connection-timeout: 60000
      initialization-fail-timeout: 60000
      maximum-pool-size: 5
  flyway:
    enabled: true
    # migration-dev carries the e2e-only demo customers, present at startup via
    # Flyway (matching the acme-corp production V0020 path) so account-service's
    # keystone reverse-lookup resolves their entitled_domains. NOT loaded in
    # production — these tenants never reach a real DB.
    #   - V9001 globex-corp [scm,erp]  — TASK-MONO-160 (ADR-020 D4 A↔B switch)
    #   - V9002 initech-corp [finance,wms] — TASK-MONO-207 (ADR-023 D2 proof)
    # TASK-MONO-207: dev seeds use a high V9000+ band. The e2e timeline merges
    # production db/migration + this dir under one version sequence; production
    # grew a real V0021 (BE-341 status CHECK) that collided with the old globex
    # V0021. The high band the (gapless) production timeline never reaches keeps
    # them permanently decoupled.
    locations: classpath:db/migration,classpath:db/migration-dev
    baseline-on-migrate: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

logging:
  level:
    root: INFO
  file:
    name: ""
