spring:
  application:
    name: admin-service

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  flyway:
    enabled: true
    # Include migration-dev so AdminLoginControllerTest and other tests that
    # depend on the dev SUPER_ADMIN seed (V0014) can boot. Prod profile
    # deliberately excludes this path.
    locations: classpath:db/migration,classpath:db/migration-dev
    baseline-on-migrate: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

outbox:
  polling:
    interval-ms: 500
    batch-size: 50

server:
  port: 0

