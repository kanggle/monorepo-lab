global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: local
    platform: iam

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'gateway-service'
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          service: gateway-service

  - job_name: 'auth-service'
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels:
          service: auth-service

  - job_name: 'account-service'
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ['host.docker.internal:8082']
        labels:
          service: account-service

  - job_name: 'security-service'
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ['host.docker.internal:8084']
        labels:
          service: security-service

  - job_name: 'admin-service'
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ['host.docker.internal:8085']
        labels:
          service: admin-service

# TASK-MONO-394: the community-service (:8086) and membership-service (:8087)
# scrape jobs are gone with the services (RETIRED 2026-07-14). They had been
# scraping targets no compose in this repository ever started — this file said
# it was watching two services that did not exist, which is how the retirement
# investigation nearly misread them as deployed.
