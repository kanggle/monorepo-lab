# =============================================================================
# fan-platform — Local Development Infrastructure
# =============================================================================
# Hostname-based routing (per ADR-MONO-001 Option C):
#   gateway-service is reached via http://fan-platform.local/ — Traefik routes
#   based on Host header. No PORT_PREFIX, no host-port slot allocation.
#
# Prerequisites:
#   1. Start the shared Traefik stack:  pnpm traefik:up
#      (creates the external `traefik-net` network this compose file joins)
#   2. Add `127.0.0.1 fan-platform.local` to your hosts file (one-time setup)
#
# Services:
#   gateway-service   — Spring Cloud Gateway, OIDC token validation, tenant gate
#   community-service — REST + JPA + Kafka outbox; only reachable via gateway
#   postgres          — relational store (databases auto-provisioned via init script)
#   redis             — rate-limit counters, feed cache
#   kafka             — single-broker KRaft mode, outbox relay target
#
# Usage:
#   pnpm fan-platform:up    — start everything in this compose file
#   pnpm fan-platform:down  — stop containers (volumes preserved)
#   pnpm fan-platform:logs  — tail logs
# =============================================================================

services:
  gateway-service:
    image: fan-platform/gateway-service:local
    container_name: fan-platform-gateway
    build:
      context: ./apps/gateway-service
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-http://iam.local}
      JWT_JWKS_URI: ${JWT_JWKS_URI:-http://iam.local/.well-known/jwks.json}
      OIDC_REQUIRED_TENANT_ID: fan-platform
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      COMMUNITY_SERVICE_URI: http://community-service:8080
      ARTIST_SERVICE_URI: http://artist-service:8080
      MEMBERSHIP_SERVICE_URI: http://membership-service:8080
      NOTIFICATION_SERVICE_URI: http://notification-service:8080
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://fan-platform.local,http://localhost:3000}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.fan-platform.rule=Host(`fan-platform.local`)"
      - "traefik.http.routers.fan-platform.entrypoints=web"
      - "traefik.http.services.fan-platform.loadbalancer.server.port=8080"
    networks:
      - fan-platform-net
      - traefik-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # community-service — TASK-FAN-BE-002.
  # Only reachable internally via the gateway; no Traefik label.
  # ---------------------------------------------------------------------------
  community-service:
    image: fan-platform/community-service:local
    container_name: fan-platform-community
    build:
      context: ./apps/community-service
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-http://iam.local}
      JWT_JWKS_URI: ${JWT_JWKS_URI:-http://iam.local/.well-known/jwks.json}
      OIDC_REQUIRED_TENANT_ID: fan-platform
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB_COMMUNITY: ${POSTGRES_DB_COMMUNITY:-fanplatform_community}
      POSTGRES_USER: ${POSTGRES_USER:-fanplatform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fanplatform}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      KAFKA_BOOTSTRAP: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - fan-platform-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

  # ---------------------------------------------------------------------------
  # artist-service — TASK-FAN-BE-003.
  # Master-data REST service (Hexagonal architecture). Only reachable internally
  # via the gateway; no Traefik label.
  # ---------------------------------------------------------------------------
  artist-service:
    image: fan-platform/artist-service:local
    container_name: fan-platform-artist
    build:
      context: ./apps/artist-service
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-http://iam.local}
      JWT_JWKS_URI: ${JWT_JWKS_URI:-http://iam.local/.well-known/jwks.json}
      OIDC_REQUIRED_TENANT_ID: fan-platform
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB_ARTIST: ${POSTGRES_DB_ARTIST:-fanplatform_artist}
      POSTGRES_USER: ${POSTGRES_USER:-fanplatform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fanplatform}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      KAFKA_BOOTSTRAP: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - fan-platform-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

  # ---------------------------------------------------------------------------
  # membership-service — TASK-FAN-BE-009.
  # Subscription state machine + PG mock + internal access-check + outbox.
  # The /api/fan/** surface is reachable via the gateway; the /internal/**
  # access-check surface is reachable only on fan-platform-net by community-service
  # (workload-identity, ADR-MONO-005) and is NOT gateway-routed. No Traefik label.
  # ---------------------------------------------------------------------------
  membership-service:
    image: fan-platform/membership-service:local
    container_name: fan-platform-membership
    build:
      context: ./apps/membership-service
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-http://iam.local}
      JWT_JWKS_URI: ${JWT_JWKS_URI:-http://iam.local/.well-known/jwks.json}
      OIDC_REQUIRED_TENANT_ID: fan-platform
      # Workload-identity (ADR-MONO-005) — /internal/** validates an IAM
      # client_credentials JWT against this JWKS + issuer.
      INTERNAL_JWT_JWK_SET_URI: ${INTERNAL_JWT_JWK_SET_URI:-http://iam.local/oauth2/jwks}
      INTERNAL_JWT_ISSUER: ${INTERNAL_JWT_ISSUER:-http://iam.local}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB_MEMBERSHIP: ${POSTGRES_DB_MEMBERSHIP:-fanplatform_membership}
      POSTGRES_USER: ${POSTGRES_USER:-fanplatform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fanplatform}
      KAFKA_BOOTSTRAP: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - fan-platform-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

  # ---------------------------------------------------------------------------
  # notification-service — TASK-FAN-BE-013.
  # event-consumer (membership lifecycle events) + thin rest-api inbox. Consumes
  # fan.membership.{activated,canceled}.v1, records a per-fan notification
  # idempotently, fans out via mock channels, serves a recipient-scoped inbox.
  # The /api/fan/notifications surface is reachable via the gateway; the consume
  # path is Kafka-only. Terminal consumer (no outbox). No Traefik label.
  # ---------------------------------------------------------------------------
  notification-service:
    image: fan-platform/notification-service:local
    container_name: fan-platform-notification
    build:
      context: ./apps/notification-service
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-http://iam.local}
      JWT_JWKS_URI: ${JWT_JWKS_URI:-http://iam.local/.well-known/jwks.json}
      OIDC_REQUIRED_TENANT_ID: fan-platform
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB_NOTIFICATION: ${POSTGRES_DB_NOTIFICATION:-fanplatform_notification}
      POSTGRES_USER: ${POSTGRES_USER:-fanplatform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fanplatform}
      KAFKA_BOOTSTRAP: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - fan-platform-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

  # ---------------------------------------------------------------------------
  # Postgres 16 — backing store for community / artist / membership / notification.
  # Multi-database: docker-entrypoint-initdb.d script creates per-service DBs
  # so each service has its own isolated schema namespace.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: fan-platform-postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fanplatform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fanplatform}
      POSTGRES_DB: ${POSTGRES_DB:-fanplatform}
      POSTGRES_DB_COMMUNITY: ${POSTGRES_DB_COMMUNITY:-fanplatform_community}
      POSTGRES_DB_ARTIST: ${POSTGRES_DB_ARTIST:-fanplatform_artist}
      POSTGRES_DB_MEMBERSHIP: ${POSTGRES_DB_MEMBERSHIP:-fanplatform_membership}
      POSTGRES_DB_NOTIFICATION: ${POSTGRES_DB_NOTIFICATION:-fanplatform_notification}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fanplatform}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - fan-platform-net

  # ---------------------------------------------------------------------------
  # Redis 7 — rate-limit counters (gateway) + feed cache (community).
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: fan-platform-redis
    restart: unless-stopped
    expose:
      - "6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fan-platform-net

  # ---------------------------------------------------------------------------
  # Kafka 3.7 — single-broker KRaft mode. Outbox relay target.
  # bitnami/kafka image because the same image is used in the wms-platform and
  # ecommerce-microservices-platform compose files (consistency wins).
  # ---------------------------------------------------------------------------
  kafka:
    image: bitnami/kafka:3.7
    container_name: fan-platform-kafka
    restart: unless-stopped
    expose:
      - "9092"
    environment:
      # KRaft mode (no Zookeeper)
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server kafka:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    networks:
      - fan-platform-net

volumes:
  postgres-data:
  redis-data:
  kafka-data:

networks:
  fan-platform-net:
    driver: bridge
  traefik-net:
    external: true
    name: traefik-net
