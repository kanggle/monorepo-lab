spring:
  application:
    name: fan-platform-community-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB_COMMUNITY:fanplatform_community}
    username: ${POSTGRES_USER:fanplatform}
    password: ${POSTGRES_PASSWORD:fanplatform}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      # Flyway owns the schema — Hibernate validates only.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration/community
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 2147483647
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5

  # Standard OAuth2 Resource Server backed by GAP's JWKS.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URL:http://iam.local}
          jwk-set-uri: ${OIDC_JWK_SET_URI:${JWT_JWKS_URI:${OIDC_ISSUER_URL:http://iam.local}/.well-known/jwks.json}}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  level:
    root: INFO
    com.example.fanplatform.community: INFO
    org.hibernate.SQL: WARN
  pattern:
    level: "%5p [traceId=%X{traceId:-} requestId=%X{requestId:-} tenantId=%X{tenantId:-} accountId=%X{accountId:-}]"

outbox:
  # Legacy v1 timing knobs — inert now that the v1 OutboxPollingScheduler is gone
  # (TASK-FAN-BE-021). The lib OutboxAutoConfiguration is retained for its
  # EntityScan only; no scheduler reads these keys anymore.
  polling:
    interval-ms: ${OUTBOX_POLLING_INTERVAL_MS:1000}
    batch-size: ${OUTBOX_POLLING_BATCH_SIZE:50}
    enabled: true

# TASK-FAN-BE-010: outbound workload-identity call to membership-service.
# TASK-FAN-BE-021: v2 outbox relay (CommunityOutboxPublisher extends AbstractOutboxPublisher).
community:
  outbox:
    poll-ms: ${COMMUNITY_OUTBOX_POLL_MS:1000}
    initial-delay-ms: ${COMMUNITY_OUTBOX_INITIAL_DELAY_MS:5000}
    batch-size: ${COMMUNITY_OUTBOX_BATCH_SIZE:100}
  membership-service:
    base-url: ${MEMBERSHIP_SERVICE_BASE_URL:http://membership-service:8080}
    connect-timeout-ms: ${MEMBERSHIP_SERVICE_CONNECT_TIMEOUT_MS:2000}
    read-timeout-ms: ${MEMBERSHIP_SERVICE_READ_TIMEOUT_MS:3000}

# IAM client_credentials token for the /internal/** call above (ADR-MONO-005).
# Uses the pre-seeded community-service-client (IAM V0009, scope membership.read).
iam:
  internal-client:
    token-uri: ${IAM_TOKEN_URI:${OIDC_ISSUER_URL:http://iam.local}/oauth2/token}
    client-id: ${COMMUNITY_SERVICE_CLIENT_ID:community-service-client}
    client-secret: ${COMMUNITY_SERVICE_CLIENT_SECRET:secret}

fanplatform:
  oauth2:
    # D2-b deprecation window: SAS issuer + legacy "iam" string.
    # MUST stay byte-identical to gateway-service's allowed-issuers — if the
    # gateway accepts an issuer that this service rejects, traffic flowing
    # through the gateway gets a 401 here despite the gateway's green light
    # (cross-service issuer drift). When changing this value, update
    # projects/fan-platform/apps/gateway-service/src/main/resources/application.yml
    # in the same commit.
    allowed-issuers: ${OIDC_ALLOWED_ISSUERS:${OIDC_ISSUER_URL:http://iam.local},iam}
    required-tenant-id: ${OIDC_REQUIRED_TENANT_ID:fan-platform}
