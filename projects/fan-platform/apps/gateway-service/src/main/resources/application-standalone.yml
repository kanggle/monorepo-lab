# Standalone profile: disable Redis-dependent rate limiting so the gateway
# runs without external infra. Activated with SPRING_PROFILES_ACTIVE=standalone.

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  cloud:
    gateway:
      routes:
        - id: community-service
          uri: ${COMMUNITY_SERVICE_URI:http://community-service:8080}
          predicates:
            - Path=/api/v1/community/**
          # No RequestRateLimiter filter under standalone (Redis is not available).
        - id: artist-service
          uri: ${ARTIST_SERVICE_URI:http://artist-service:8080}
          predicates:
            - Path=/api/v1/artist/**
