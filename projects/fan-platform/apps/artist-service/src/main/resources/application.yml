spring:
  application:
    name: fan-platform-artist-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB_ARTIST:fanplatform_artist}
    username: ${POSTGRES_USER:fanplatform}
    password: ${POSTGRES_PASSWORD:fanplatform}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      # Flyway owns the schema — Hibernate validates only.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration/artist
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 2147483647
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5

  # Standard OAuth2 Resource Server backed by GAP's JWKS.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URL:http://iam.local}
          jwk-set-uri: ${OIDC_JWK_SET_URI:${JWT_JWKS_URI:${OIDC_ISSUER_URL:http://iam.local}/.well-known/jwks.json}}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  level:
    root: INFO
    com.example.fanplatform.artist: INFO
    org.hibernate.SQL: WARN
  pattern:
    level: "%5p [traceId=%X{traceId:-} requestId=%X{requestId:-} tenantId=%X{tenantId:-} accountId=%X{accountId:-}]"

outbox:
  # Legacy v1 timing knobs — inert now that the v1 OutboxPollingScheduler is gone
  # (TASK-FAN-BE-022). TASK-MONO-406 corrected the second half of this note: the lib
  # OutboxAutoConfiguration was NOT "retained for its EntityScan" — it has been deleted
  # along with the ProcessedEvent entity it carried, and libs/ now ships no @Entity at all.
  # `polling.enabled` below is still a live @ConditionalOnProperty gate; `interval-ms` and
  # `batch-size` bind to nothing.
  polling:
    interval-ms: ${OUTBOX_POLLING_INTERVAL_MS:1000}
    batch-size: ${OUTBOX_POLLING_BATCH_SIZE:50}
    enabled: true

# v2 outbox relay (ArtistOutboxPublisher extends AbstractOutboxPublisher).
artist:
  outbox:
    poll-ms: ${ARTIST_OUTBOX_POLL_MS:1000}
    initial-delay-ms: ${ARTIST_OUTBOX_INITIAL_DELAY_MS:5000}
    batch-size: ${ARTIST_OUTBOX_BATCH_SIZE:100}

fanplatform:
  oauth2:
    # D2-b deprecation window: SAS issuer + legacy "iam" string.
    # MUST stay byte-identical to gateway-service's allowed-issuers — if the
    # gateway accepts an issuer that this service rejects, traffic flowing
    # through the gateway gets a 401 here despite the gateway's green light
    # (cross-service issuer drift). When changing this value, update
    # projects/fan-platform/apps/gateway-service/src/main/resources/application.yml
    # in the same commit.
    allowed-issuers: ${OIDC_ALLOWED_ISSUERS:${OIDC_ISSUER_URL:http://iam.local},iam}
    required-tenant-id: ${OIDC_REQUIRED_TENANT_ID:fan-platform}
  artist:
    cache:
      directory:
        # Read-through Redis cache for `GET /api/artists?q=...`. Per task spec
        # § Implementation Notes: TTL 5 min, key `cache:fan-platform:artist:directory:<query-hash>`.
        ttl-seconds: ${ARTIST_DIRECTORY_CACHE_TTL_SECONDS:300}
        namespace: ${ARTIST_DIRECTORY_CACHE_NAMESPACE:cache:fan-platform:artist:directory:}
