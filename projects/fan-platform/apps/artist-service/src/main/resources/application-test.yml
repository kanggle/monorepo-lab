# Test profile defaults. Integration tests inject concrete values for
# spring.datasource.* (PostgreSQL Testcontainer), spring.kafka.bootstrap-servers
# (Kafka Testcontainer), spring.data.redis.host (Redis Testcontainer), and
# spring.security.oauth2.resourceserver.jwt.jwk-set-uri (WireMock JWKS) via
# @DynamicPropertySource.

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration/artist
    baseline-on-migrate: true

outbox:
  polling:
    # Legacy v1 knobs — inert (v1 scheduler removed, TASK-FAN-BE-022).
    enabled: false
    interval-ms: 200
    batch-size: 50

# v2 outbox relay timing for tests. The relay (ArtistOutboxPublisher) is an
# unconditional @Component (no enable gate, matching v1); a short poll keeps the
# relay IT within its awaitility window.
artist:
  outbox:
    poll-ms: 200
    initial-delay-ms: 200
    batch-size: 100

fanplatform:
  oauth2:
    allowed-issuers: ${OIDC_ALLOWED_ISSUERS:http://test-issuer,iam}
    required-tenant-id: fan-platform
  artist:
    cache:
      directory:
        ttl-seconds: 60
        # Quoted: the value contains colons and a trailing colon, which an
        # unquoted YAML plain scalar rejects ("mapping values are not allowed
        # here"). The main application.yml wraps it in ${...} so it parses there;
        # this test-profile file uses the raw value and must quote it.
        namespace: "cache:fan-platform:artist:directory:"
