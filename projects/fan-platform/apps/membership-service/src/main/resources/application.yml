spring:
  application:
    name: fan-platform-membership-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB_MEMBERSHIP:fanplatform_membership}
    username: ${POSTGRES_USER:fanplatform}
    password: ${POSTGRES_PASSWORD:fanplatform}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      # Flyway owns the schema — Hibernate validates only.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration/membership
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 2147483647
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5

  # Standard OAuth2 Resource Server backed by IAM's JWKS (end-user routes).
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URL:http://iam.local}
          jwk-set-uri: ${OIDC_JWK_SET_URI:${JWT_JWKS_URI:${OIDC_ISSUER_URL:http://iam.local}/.well-known/jwks.json}}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  level:
    root: INFO
    com.example.fanplatform.membership: INFO
    org.hibernate.SQL: WARN
  pattern:
    level: "%5p [traceId=%X{traceId:-} requestId=%X{requestId:-} tenantId=%X{tenantId:-} accountId=%X{accountId:-}]"

outbox:
  polling:
    interval-ms: ${OUTBOX_POLLING_INTERVAL_MS:1000}
    batch-size: ${OUTBOX_POLLING_BATCH_SIZE:50}
    enabled: true

fanplatform:
  oauth2:
    # D2-b deprecation window: SAS issuer + legacy "iam" string. MUST stay
    # byte-identical to gateway-service's allowed-issuers (cross-service issuer
    # drift — see community-service application.yml for the rationale).
    allowed-issuers: ${OIDC_ALLOWED_ISSUERS:${OIDC_ISSUER_URL:http://iam.local},iam}
    required-tenant-id: ${OIDC_REQUIRED_TENANT_ID:fan-platform}

  # Workload-identity (ADR-MONO-005) — the /internal/** security chain validates
  # an IAM client_credentials JWT, NOT an end-user token. Separate JWKS + issuer
  # so app startup is not coupled to auth-service availability (JWKS fetched
  # lazily on first verification). The end-user (tenant-pinned) decoder above is
  # intentionally NOT reused: client_credentials tokens carry no tenant_id.
  internal:
    jwt:
      jwk-set-uri: ${INTERNAL_JWT_JWK_SET_URI:${OIDC_ISSUER_URL:http://iam.local}/oauth2/jwks}
      issuer: ${INTERNAL_JWT_ISSUER:${OIDC_ISSUER_URL:http://iam.local}}
