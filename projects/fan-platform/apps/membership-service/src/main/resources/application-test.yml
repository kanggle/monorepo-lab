# Test profile defaults. Integration tests inject concrete values for
# spring.datasource.* (PostgreSQL Testcontainer), spring.kafka.bootstrap-servers
# (Kafka Testcontainer), and spring.security.oauth2.resourceserver.jwt.jwk-set-uri
# (WireMock JWKS) via @DynamicPropertySource. No Redis (membership-service has no
# cache case).

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration/membership
    baseline-on-migrate: true

outbox:
  polling:
    # Tighten the loop in tests so the relay reacts within an awaitility
    # timeout. Disabled by default for slice/unit tests; integration tests
    # explicitly enable it.
    enabled: false
    interval-ms: 200
    batch-size: 50

fanplatform:
  oauth2:
    allowed-issuers: ${OIDC_ALLOWED_ISSUERS:http://test-issuer,iam}
    required-tenant-id: fan-platform
  internal:
    jwt:
      # Integration tests point this at the WireMock JWKS + the
      # workload-identity issuer via @DynamicPropertySource.
      jwk-set-uri: ${INTERNAL_JWT_JWK_SET_URI:http://test-issuer/oauth2/jwks}
      issuer: ${INTERNAL_JWT_ISSUER:http://test-issuer}
