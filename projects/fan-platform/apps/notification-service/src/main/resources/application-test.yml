# Test profile defaults. Integration tests inject concrete values for
# spring.datasource.* (PostgreSQL Testcontainer), spring.kafka.bootstrap-servers
# (Kafka Testcontainer), and spring.security.oauth2.resourceserver.jwt.jwk-set-uri
# (WireMock JWKS) via @DynamicPropertySource. No Redis (notification-service has
# no cache case).

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration/notification
    baseline-on-migrate: true

fanplatform:
  oauth2:
    allowed-issuers: ${OIDC_ALLOWED_ISSUERS:http://test-issuer,iam}
    required-tenant-id: fan-platform
