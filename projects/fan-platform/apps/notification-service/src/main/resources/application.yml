spring:
  application:
    name: fan-platform-notification-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB_NOTIFICATION:fanplatform_notification}
    username: ${POSTGRES_USER:fanplatform}
    password: ${POSTGRES_PASSWORD:fanplatform}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      # Flyway owns the schema — Hibernate validates only.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration/notification
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:kafka:9092}
    consumer:
      # Consumer group per the architecture.md § Subscribed Topics
      # (<service>-<purpose>). Values are read as raw String and parsed by the
      # service ObjectMapper in the consumer so an undeserializable payload is a
      # controlled DLQ route, not a poison-pill deserialization loop.
      group-id: ${KAFKA_CONSUMER_GROUP:notification-service-membership-events}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        isolation.level: read_committed
    producer:
      # Producer used ONLY by the DLQ recoverer (<topic>.dlq). This service
      # publishes NO domain events (terminal consumer).
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all

  # Standard OAuth2 Resource Server backed by IAM's JWKS (end-user inbox routes).
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URL:http://iam.local}
          jwk-set-uri: ${OIDC_JWK_SET_URI:${JWT_JWKS_URI:${OIDC_ISSUER_URL:http://iam.local}/.well-known/jwks.json}}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  level:
    root: INFO
    com.example.fanplatform.notification: INFO
    org.hibernate.SQL: WARN
  pattern:
    level: "%5p [traceId=%X{traceId:-} requestId=%X{requestId:-} tenantId=%X{tenantId:-} accountId=%X{accountId:-}]"

fanplatform:
  oauth2:
    # D2-b deprecation window: SAS issuer + legacy "iam" string. MUST stay
    # byte-identical to gateway-service's allowed-issuers (cross-service issuer
    # drift — see membership-service application.yml for the rationale).
    allowed-issuers: ${OIDC_ALLOWED_ISSUERS:${OIDC_ISSUER_URL:http://iam.local},iam}
    required-tenant-id: ${OIDC_REQUIRED_TENANT_ID:fan-platform}
