apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-service-config
  namespace: ecommerce
data:
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8080"
  OTEL_SERVICE_NAME: "gateway-service"
  AUTH_SERVICE_URL: "http://auth-service.ecommerce.svc.cluster.local:8081"
  PRODUCT_SERVICE_URL: "http://product-service.ecommerce.svc.cluster.local:8082"
  USER_SERVICE_URL: "http://user-service.ecommerce.svc.cluster.local:8084"
  SEARCH_SERVICE_URL: "http://search-service.ecommerce.svc.cluster.local:8085"
  ORDER_SERVICE_URL: "http://order-service.ecommerce.svc.cluster.local:8086"
  PAYMENT_SERVICE_URL: "http://payment-service.ecommerce.svc.cluster.local:8087"
  CORS_ALLOWED_ORIGINS: "https://ecommerce.example.com"
