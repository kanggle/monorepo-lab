# ============================================================
# MinIO (S3-compatible object storage) for dev/staging k8s
# ------------------------------------------------------------
# Runs in the `infra` namespace alongside postgres / redis / kafka.
# Production environments replace this with AWS S3 + CloudFront;
# the `storage-credentials` SealedSecret and the STORAGE_* keys in
# the `infrastructure-endpoints` ConfigMap are the stable contract
# that services bind to, regardless of backend.
#
# See: specs/platform/object-storage-policy.md
#
# Prerequisite: `infra` namespace exists (provisioned outside this repo).
# ============================================================
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: infra
  labels:
    app: minio
spec:
  clusterIP: None
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
  selector:
    app: minio
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: infra
  labels:
    app: minio
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-10-13T13-34-11Z
          imagePullPolicy: IfNotPresent
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - containerPort: 9000
              name: s3
            - containerPort: 9001
              name: console
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - "ALL"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: storage-credentials
                  key: STORAGE_S3_ACCESS_KEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: storage-credentials
                  key: STORAGE_S3_SECRET_KEY
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
---
# Mirror of `storage-credentials` into the `infra` namespace so MinIO can read
# its own root credentials. Services consume the same secret from the
# `ecommerce` namespace (see k8s/base/secrets.yaml).
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: storage-credentials
  namespace: infra
spec:
  encryptedData:
    STORAGE_S3_ACCESS_KEY: AgBy3i4OJSWK+PiTySYZZA9rO... # sealed by kubeseal — replace
    STORAGE_S3_SECRET_KEY: AgBy3i4OJSWK+PiTySYZZA9rO... # sealed by kubeseal — replace
  template:
    metadata:
      name: storage-credentials
      namespace: infra
    type: Opaque
---
# One-shot Job: create the product-images bucket (private — no anonymous access).
# Idempotent — re-runs safely. Apply after the StatefulSet is Ready.
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-init
  namespace: infra
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: minio-init
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mc
          image: minio/mc:RELEASE.2024-10-08T09-37-26Z
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # mc writes ~/.mc config
            capabilities:
              drop:
                - "ALL"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: storage-credentials
                  key: STORAGE_S3_ACCESS_KEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: storage-credentials
                  key: STORAGE_S3_SECRET_KEY
            - name: PRODUCT_IMAGES_BUCKET
              value: "firstproject-dev-product-images"
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
              mc mb --ignore-existing local/"$PRODUCT_IMAGES_BUCKET"
