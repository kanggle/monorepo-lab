# jwt-secret (JWT_SECRET) removed by TASK-BE-132 — auth-service decommissioned.
# auth-db-secret removed by TASK-BE-132 — auth-postgres decommissioned.
# GAP handles all token issuance via OIDC; gateway validates via GAP JWKS.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: product-db-secret
  namespace: ecommerce
spec:
  encryptedData:
    DB_USERNAME: AgBy3i4OJSWK+PiTySYZZA9rO... # sealed by kubeseal
    DB_PASSWORD: AgBy3i4OJSWK+PiTySYZZA9rO... # sealed by kubeseal
  template:
    metadata:
      name: product-db-secret
      namespace: ecommerce
    type: Opaque
