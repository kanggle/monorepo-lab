---
# Object storage credentials — consumed by services that upload/serve media.
# Same secret name is mirrored into the `infra` namespace for MinIO itself
# (see k8s/base/storage-minio.yaml).
# In production, STORAGE_S3_* becomes the IAM role access-key / secret-key pair.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: storage-credentials
  namespace: ecommerce
spec:
  encryptedData:
    STORAGE_S3_ACCESS_KEY: AgBy3i4OJSWK+PiTySYZZA9rO... # sealed by kubeseal — replace
    STORAGE_S3_SECRET_KEY: AgBy3i4OJSWK+PiTySYZZA9rO... # sealed by kubeseal — replace
  template:
    metadata:
      name: storage-credentials
      namespace: ecommerce
    type: Opaque
