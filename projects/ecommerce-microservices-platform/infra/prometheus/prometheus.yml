global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: 'auth-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['auth-service:8081']

  - job_name: 'gateway-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['gateway-service:8080']

  - job_name: 'product-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['product-service:8082']

  - job_name: 'search-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['search-service:8085']

  - job_name: 'order-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['order-service:8086']

  - job_name: 'payment-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['payment-service:8087']

  - job_name: 'user-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['user-service:8084']

  - job_name: 'batch-worker'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['batch-worker:8088']

  - job_name: 'shipping-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['shipping-service:8090']

  - job_name: 'review-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['review-service:8091']

  - job_name: 'promotion-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['promotion-service:8092']

  - job_name: 'notification-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['notification-service:8093']
