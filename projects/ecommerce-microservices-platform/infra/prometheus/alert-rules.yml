# ============================================================
# Prometheus Alert Rules
# 6개 카테고리: 에러율, 응답시간, 서비스다운, Kafka지연, DB커넥션풀, 알림 발송
# ============================================================

groups:

  # ──────────────────────────────────────────────
  # 카테고리 1: 높은 에러율 (5xx 비율)
  # specs/platform/observability.md 기준: Error rate > 5% → CRITICAL
  # ──────────────────────────────────────────────
  - name: high_error_rate
    rules:
      - alert: HighErrorRate
        expr: |
          (
            sum by (job) (rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
            /
            sum by (job) (rate(http_server_requests_seconds_count[5m]))
          ) > 0.05
        for: 2m
        labels:
          severity: critical
          category: error_rate
        annotations:
          summary: "{{ $labels.job }} 에러율 5% 초과"
          description: "{{ $labels.job }}의 5xx 에러 비율이 {{ $value | humanizePercentage }}입니다. (임계값: 5%)"

      - alert: ElevatedErrorRate
        expr: |
          (
            sum by (job) (rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
            /
            sum by (job) (rate(http_server_requests_seconds_count[5m]))
          ) > 0.01
        for: 5m
        labels:
          severity: warning
          category: error_rate
        annotations:
          summary: "{{ $labels.job }} 에러율 1% 초과"
          description: "{{ $labels.job }}의 5xx 에러 비율이 {{ $value | humanizePercentage }}입니다. (임계값: 1%)"

  # ──────────────────────────────────────────────
  # 카테고리 2: 느린 응답 시간 (P95/P99 임계값)
  # specs/platform/observability.md 기준: P99 > 2s → WARNING
  # ──────────────────────────────────────────────
  - name: slow_response_time
    rules:
      - alert: HighP99Latency
        expr: |
          histogram_quantile(0.99,
            sum by (job, le) (rate(http_server_requests_seconds_bucket[5m]))
          ) > 2
        for: 5m
        labels:
          severity: warning
          category: latency
        annotations:
          summary: "{{ $labels.job }} P99 응답시간 2초 초과"
          description: "{{ $labels.job }}의 P99 응답시간이 {{ $value | humanizeDuration }}입니다. (임계값: 2s)"

      - alert: HighP95Latency
        expr: |
          histogram_quantile(0.95,
            sum by (job, le) (rate(http_server_requests_seconds_bucket[5m]))
          ) > 1
        for: 5m
        labels:
          severity: warning
          category: latency
        annotations:
          summary: "{{ $labels.job }} P95 응답시간 1초 초과"
          description: "{{ $labels.job }}의 P95 응답시간이 {{ $value | humanizeDuration }}입니다. (임계값: 1s)"

      - alert: CriticalLatency
        expr: |
          histogram_quantile(0.99,
            sum by (job, le) (rate(http_server_requests_seconds_bucket[5m]))
          ) > 5
        for: 2m
        labels:
          severity: critical
          category: latency
        annotations:
          summary: "{{ $labels.job }} P99 응답시간 5초 초과"
          description: "{{ $labels.job }}의 P99 응답시간이 {{ $value | humanizeDuration }}입니다. 즉시 확인이 필요합니다."

  # ──────────────────────────────────────────────
  # 카테고리 3: 서비스 다운 (health check 실패)
  # specs/platform/observability.md 기준: health check failure → CRITICAL
  # ──────────────────────────────────────────────
  - name: service_down
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "{{ $labels.job }} 서비스 다운"
          description: "{{ $labels.job }} ({{ $labels.instance }})이 1분 이상 응답하지 않습니다."

      - alert: ServiceHealthCheckFailing
        expr: |
          spring_boot_health_status{status!="UP"} == 1
        for: 2m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "{{ $labels.job }} 헬스체크 실패"
          description: "{{ $labels.job }}의 Spring Boot 헬스체크 상태가 {{ $labels.status }}입니다."

  # ──────────────────────────────────────────────
  # 카테고리 4: Kafka 소비 지연 (consumer lag)
  # ──────────────────────────────────────────────
  - name: kafka_consumer_lag
    rules:
      - alert: KafkaConsumerLagHigh
        expr: |
          sum by (job, group, topic) (
            kafka_consumer_fetch_manager_records_lag_max
          ) > 10000
        for: 5m
        labels:
          severity: warning
          category: kafka
        annotations:
          summary: "{{ $labels.job }} Kafka consumer lag 높음"
          description: "{{ $labels.job }}의 토픽 {{ $labels.topic }} (그룹: {{ $labels.group }}) consumer lag이 {{ $value }}입니다. (임계값: 10,000)"

      - alert: KafkaConsumerLagCritical
        expr: |
          sum by (job, group, topic) (
            kafka_consumer_fetch_manager_records_lag_max
          ) > 50000
        for: 5m
        labels:
          severity: critical
          category: kafka
        annotations:
          summary: "{{ $labels.job }} Kafka consumer lag 심각"
          description: "{{ $labels.job }}의 토픽 {{ $labels.topic }} (그룹: {{ $labels.group }}) consumer lag이 {{ $value }}입니다. (임계값: 50,000)"

      - alert: KafkaConsumerNotConsuming
        expr: |
          rate(kafka_consumer_fetch_manager_records_consumed_total[5m]) == 0
          and
          kafka_consumer_fetch_manager_records_lag_max > 0
        for: 10m
        labels:
          severity: critical
          category: kafka
        annotations:
          summary: "{{ $labels.job }} Kafka consumer 소비 중단"
          description: "{{ $labels.job }}의 consumer가 10분 이상 메시지를 소비하지 않고 있으며 lag이 존재합니다."

  # ──────────────────────────────────────────────
  # 카테고리 5: DB 커넥션 풀 고갈
  # specs/platform/observability.md 기준: DB pool exhausted → CRITICAL
  # ──────────────────────────────────────────────
  - name: db_connection_pool
    rules:
      - alert: DBConnectionPoolNearExhaustion
        expr: |
          (
            hikaricp_connections_active
            /
            hikaricp_connections_max
          ) > 0.8
        for: 5m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "{{ $labels.job }} DB 커넥션 풀 80% 초과"
          description: "{{ $labels.job }}의 활성 커넥션이 {{ $value | humanizePercentage }} 사용 중입니다. (최대: {{ with printf `hikaricp_connections_max{job=\"%s\"}` $labels.job | query }}{{ . | first | value }}{{ end }})"

      - alert: DBConnectionPoolExhausted
        expr: |
          (
            hikaricp_connections_active
            /
            hikaricp_connections_max
          ) > 0.95
        for: 2m
        labels:
          severity: critical
          category: database
        annotations:
          summary: "{{ $labels.job }} DB 커넥션 풀 고갈 임박"
          description: "{{ $labels.job }}의 활성 커넥션이 {{ $value | humanizePercentage }} 사용 중입니다. 즉시 확인이 필요합니다."

      - alert: DBConnectionPoolPendingHigh
        expr: |
          hikaricp_connections_pending > 5
        for: 2m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "{{ $labels.job }} DB 커넥션 대기 요청 증가"
          description: "{{ $labels.job }}의 커넥션 풀 대기 요청이 {{ $value }}건입니다."

  # ──────────────────────────────────────────────
  # 카테고리 6: 알림 발송 실패 (notification-service 전용)
  # specs/services/notification-service/observability.md:
  #   notification_failed_total{channel, reason} / notification_sent_total{channel} 기반
  #
  # TASK-BE-532 (2026-07-20) removed the two rate rules below because notification-service emitted
  # neither metric — they were permanently no-data. TASK-BE-533 restored them together with the
  # emitters, so each rule below now names a metric with a demonstrated increment path:
  #
  #   notification_sent_total{channel}          <- MicrometerNotificationMetrics.recordSent(...),
  #                                                called from NotificationSendService#renderAndSend
  #                                                on the success branch.
  #   notification_failed_total{channel,reason} <- MicrometerNotificationMetrics.recordFailed(...),
  #                                                called from the SAME method's catch branch.
  #
  # Both increments are covered by tests that drive a real send outcome and read the counter back
  # out of a SimpleMeterRegistry (NotificationSendServiceTest, MicrometerNotificationMetricsTest) —
  # a registered-but-never-incremented counter would reproduce the no-data defect one layer deeper.
  # NotificationSenderDown is unchanged; it is backed by Prometheus's own up{} scrape metric.
  # ──────────────────────────────────────────────
  - name: notification_delivery
    rules:
      - alert: NotificationDeliveryFailureRateHigh
        expr: |
          (
            sum(rate(notification_failed_total[5m]))
            /
            (
              sum(rate(notification_failed_total[5m]))
              +
              sum(rate(notification_sent_total[5m]))
            )
          ) > 0.1
        for: 5m
        labels:
          severity: warning
          category: notification
          service: notification-service
        annotations:
          summary: "notification-service 발송 실패율 10% 초과"
          description: "최근 5분간 알림 발송 실패율이 {{ $value | humanizePercentage }}입니다. (임계값: 10%)"

      - alert: NotificationDeliveryFailureRateCritical
        expr: |
          (
            sum(rate(notification_failed_total[5m]))
            /
            (
              sum(rate(notification_failed_total[5m]))
              +
              sum(rate(notification_sent_total[5m]))
            )
          ) > 0.3
        for: 5m
        labels:
          severity: critical
          category: notification
          service: notification-service
        annotations:
          summary: "notification-service 발송 실패율 30% 초과"
          description: "최근 5분간 알림 발송 실패율이 {{ $value | humanizePercentage }}입니다. 외부 채널 연동 장애 가능성이 있습니다."

      - alert: NotificationSenderDown
        expr: up{job="notification-service"} == 0
        for: 1m
        labels:
          severity: critical
          category: notification
          service: notification-service
        annotations:
          summary: "notification-service 다운"
          description: "notification-service가 1분 이상 응답하지 않아 알림 발송이 중단되었습니다."

  # ──────────────────────────────────────────────
  # 카테고리 7: 이벤트 발행 실패 (user-service Scenario B — TASK-BE-533)
  #
  # ADR-006 § user-service Scenario B gates its own ACCEPT on this alert. user-service publishes
  # user.user.withdrawn best-effort (KafkaTemplate.send inside @TransactionalEventListener
  # AFTER_COMMIT), so a broker-send failure after a committed withdrawal leaves the user WITHDRAWN
  # in user-service while order-service never cancels their active orders. There is no retry row —
  # this counter is the ONLY signal that it happened.
  #
  # order-service is the sole live consumer. ADR-006's prose also names auth-service, but ecommerce's
  # auth-service was decommissioned by TASK-BE-132 (out of settings.gradle, out of docker-compose);
  # its consumer is preserved-history dead code. Verified 2026-07-20 (TASK-BE-533).
  #
  # 🔴 Metric-name divergence, deliberate: ADR-006 writes the expression as
  #   user_event_publish_failure_total{event_type="UserWithdrawn"}
  # but no such series exists. The emitter is UserMetrics#incrementEventPublishFailure, which uses
  # the SHARED name from libs/java-observability EventMetricNames:
  #   event_publish_failure_total{service="user-service", event_type="UserWithdrawn"}
  # called from KafkaUserProfileEventPublisher on both the async-callback and synchronous-throw
  # failure paths, and covered by UserMetricsTest. The rule is written against the metric that is
  # actually emitted — writing the ADR's literal string would restore the ADR's letter and leave
  # the alert permanently no-data, which is the exact defect TASK-BE-532 had to clean up.
  #
  # "> 0 in any 5-minute window" is expressed as increase(...[5m]) > 0 with `for: 0m`: a single
  # lost withdrawal event is already actionable, so there is nothing to debounce.
  # ──────────────────────────────────────────────
  - name: event_publish_failure
    rules:
      - alert: UserWithdrawnEventPublishFailure
        expr: increase(event_publish_failure_total{service="user-service", event_type="UserWithdrawn"}[5m]) > 0
        for: 0m
        labels:
          severity: critical
          category: event_publish
          service: user-service
        annotations:
          summary: "user-service UserWithdrawn 이벤트 발행 실패"
          description: >-
            최근 5분간 UserWithdrawn 이벤트 발행이 {{ $value }}건 실패했습니다. 탈퇴는 커밋됐지만
            order-service 의 주문 취소가 실행되지 않았을 수 있습니다.
            복구 절차: knowledge/runbooks/user-withdrawn-not-cancelled.md
