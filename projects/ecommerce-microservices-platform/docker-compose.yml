# =============================================================================
# E-Commerce Microservices Platform — Local Development Infrastructure
# =============================================================================
# Hostname-based routing (per ADR-MONO-001 Option C, TASK-MONO-024):
#   gateway-service is reached via http://ecommerce.local/ — Traefik routes
#   based on Host header. No legacy host-port-prefix scheme; no host-port
#   slot allocation across projects.
#
# Prerequisites (one-time setup):
#   1. Register *.local hostnames in your hosts file:
#        bash scripts/dev-setup.sh           # Linux/macOS
#        .\scripts\dev-setup.ps1              # Windows (Run as Administrator)
#   2. Start the shared Traefik stack:
#        pnpm traefik:up
#      (creates the external `traefik-net` network this compose file joins)
#
# Usage:
#   pnpm ecommerce:up      — start everything in this compose file
#   pnpm ecommerce:down    — stop containers (volumes preserved)
#   pnpm ecommerce:logs    — tail logs
#
# Direct DB / queue access from external tools (DBeaver, Redis Insight, ...):
#   See docs/guides/dev-tooling.md for `docker exec` / per-developer overlay
#   options. Backing services no longer publish host ports by default.
#
# Internal service URLs (docker network only):
#   - kafka:9092, redis:6379, elasticsearch:9200, minio:9000, jaeger:4318
#   - per-service postgres: <svc>-postgres:5432
#   - gateway-service:8080 (entry through Traefik at http://ecommerce.local/)
# =============================================================================

services:

  # ──────────────────────────────────────────────
  # 인프라 — Kafka (KRaft, single broker)
  # ──────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: ecommerce-kafka
    restart: unless-stopped
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_DEFAULT_REPLICATION_FACTOR=1
      - KAFKA_MIN_INSYNC_REPLICAS=1
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    expose:
      - "9092"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-metadata.sh status -s localhost:9092 2>/dev/null || /opt/kafka/bin/kafka-topics.sh --list --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 30s
      retries: 10
      start_period: 30s
    networks:
      - ecommerce-net

  # ──────────────────────────────────────────────
  # 인프라 — Redis (gateway-service 공유)
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    restart: unless-stopped
    expose:
      - "6379"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ecommerce-net

  # ──────────────────────────────────────────────
  # 인프라 — Elasticsearch (search-service용)
  # ──────────────────────────────────────────────
  elasticsearch:
    build:
      context: .
      dockerfile: infra/elasticsearch/Dockerfile
    image: ecommerce-microservices-platform-elasticsearch:nori
    container_name: ecommerce-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    expose:
      - "9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          # TASK-BE-406: 1G → 2G. With a 512m heap, ES needs roughly equal off-heap
          # (Lucene mmap, the nori plugin, JVM overhead); a 1G cgroup limit left no
          # headroom and ES could be OOM-pressured into an unhealthy state at startup
          # on a loaded CI runner (recurring `ecommerce-elasticsearch is unhealthy`
          # nightly flake, 2026-06-18).
          memory: 2G
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 10s
      timeout: 10s
      # TASK-BE-406: retries 10 → 15, start_period 30s → 120s. The nori-plugin image's
      # cold start (JVM + plugin load + single-node bootstrap) regularly exceeds the
      # old 30s start_period on a loaded CI runner, so the first real health probes
      # began burning the retry budget before ES was ready → intermittent
      # `dependency failed to start: container ecommerce-elasticsearch is unhealthy`
      # aborting the whole web-store full-stack e2e bring-up. Wider cold-start window
      # + more retries absorb the variance without masking a genuinely-down ES.
      retries: 15
      start_period: 120s
    networks:
      - ecommerce-net

  # ──────────────────────────────────────────────
  # 인프라 — MinIO (S3 호환 객체 스토리지 — product-images)
  # specs/platform/object-storage-policy.md
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: ecommerce-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio-data:/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ecommerce-net

  # ──────────────────────────────────────────────
  # MinIO 부트스트랩 — 버킷 생성 + 익명 읽기 정책
  # 1회 실행 후 종료(oneshot). restart 정책 "no" 유지.
  # ──────────────────────────────────────────────
  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: ecommerce-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - PRODUCT_IMAGES_BUCKET=${PRODUCT_IMAGES_BUCKET:-firstproject-local-product-images}
    volumes:
      - ./infra/minio/init.sh:/usr/local/bin/init.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/init.sh"]
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    networks:
      - ecommerce-net

  # ──────────────────────────────────────────────
  # 인프라 — Jaeger (분산 트레이싱)
  # 16686 (UI) 는 5자리 호스트 포트라 prefix 무관 — 그대로 노출 유지.
  # OTLP 수신 포트(4317/4318)는 docker network 내부 전용.
  # ──────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: ecommerce-jaeger
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
    expose:
      - "4317"
      - "4318"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:14269/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  # ──────────────────────────────────────────────
  # 인프라 — Prometheus (메트릭 수집)
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ecommerce-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    expose:
      - "9090"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    depends_on:
      alertmanager:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  # ──────────────────────────────────────────────
  # 인프라 — AlertManager (알림 관리)
  # ──────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ecommerce-alertmanager
    restart: unless-stopped
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      # Slack Webhook URL 파일 마운트 — slack-webhook-url.example 참고하여 slack-webhook-url 파일 생성 (gitignored)
      - ./infra/alertmanager/slack-webhook-url:/etc/alertmanager/slack-webhook-url:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.listen-address=:9093'
    expose:
      - "9093"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  # ──────────────────────────────────────────────
  # 인프라 — Grafana (메트릭 시각화)
  # ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    container_name: ecommerce-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ecommerce-net

  # ──────────────────────────────────────────────
  # 인프라 — Loki (로그 집계)
  # ──────────────────────────────────────────────
  loki:
    image: grafana/loki:3.2.1
    container_name: ecommerce-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    expose:
      - "3100"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ecommerce-net

  # ──────────────────────────────────────────────
  # 인프라 — Promtail (로그 수집 → Loki)
  # ──────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.2.1
    container_name: ecommerce-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-data:/tmp
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - ecommerce-net

  # ──────────────────────────────────────────────
  # 인프라 — PostgreSQL (서비스별 DB)
  # auth-postgres removed by TASK-BE-132 — auth-service decommissioned.
  # ──────────────────────────────────────────────
  product-postgres:
    image: postgres:16-alpine
    container_name: ecommerce-product-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: product_user
      POSTGRES_PASSWORD: ${PRODUCT_DB_PASSWORD}
    expose:
      - "5432"
    volumes:
      - product-postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U product_user -d product_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  order-postgres:
    image: postgres:16-alpine
    container_name: ecommerce-order-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD}
    expose:
      - "5432"
    volumes:
      - order-postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  payment-postgres:
    image: postgres:16-alpine
    container_name: ecommerce-payment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD}
    expose:
      - "5432"
    volumes:
      - payment-postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_user -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  user-postgres:
