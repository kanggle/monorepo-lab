# ============================================================
# 로컬 개발 전체 스택
# 실행 전: ./gradlew bootJar
# 실행: docker-compose up --build -d
# ============================================================
#
# Kafka 리스너:
#   - Docker 내부: kafka:9092
#   - 호스트 bootRun: localhost:9093 (KAFKA_BOOTSTRAP_SERVERS=localhost:9093)
#
# PostgreSQL 포트 (호스트):
#   - auth-postgres    : 5432
#   - product-postgres : 5433
#   - order-postgres   : 5434
#   - payment-postgres : 5435
#   - batch-postgres   : 5436
#   - user-postgres    : 5437
#   - shipping-postgres: 5438
#   - review-postgres  : 5439
#   - promotion-postgres: 5440
#   - notification-postgres: 5441
#
# Frontend 포트 (호스트):
#   - web-store        : 3000
#   - admin-dashboard  : 3001
# ============================================================

services:

  # ──────────────────────────────────────────────
  # 인프라 — Kafka (이중 리스너: Docker 내부 + 호스트)
  # ──────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    restart: unless-stopped
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_DEFAULT_REPLICATION_FACTOR=1
      - KAFKA_MIN_INSYNC_REPLICAS=1
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "${PORT_PREFIX:-1}9093:9094"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-metadata.sh status -s localhost:9092 2>/dev/null || /opt/kafka/bin/kafka-topics.sh --list --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 30s
      retries: 10
      start_period: 30s

  # ──────────────────────────────────────────────
  # 인프라 — Redis (auth-service + gateway-service 공유)
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "${PORT_PREFIX:-1}6379:6379"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────────────
  # 인프라 — Elasticsearch (search-service용)
  # ──────────────────────────────────────────────
  elasticsearch:
    build:
      context: .
      dockerfile: infra/elasticsearch/Dockerfile
    image: ecommerce-microservices-platform-elasticsearch:nori
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "${PORT_PREFIX:-1}9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ──────────────────────────────────────────────
  # 인프라 — MinIO (S3 호환 객체 스토리지 — product-images)
  # specs/platform/object-storage-policy.md
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${PORT_PREFIX:-1}9000:9000"
      - "${PORT_PREFIX:-1}9001:9001"
    volumes:
      - minio-data:/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ──────────────────────────────────────────────
  # MinIO 부트스트랩 — 버킷 생성 + 익명 읽기 정책
  # 1회 실행 후 종료(oneshot). restart 정책 "no" 유지.
  # ──────────────────────────────────────────────
  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - PRODUCT_IMAGES_BUCKET=${PRODUCT_IMAGES_BUCKET:-firstproject-local-product-images}
    volumes:
      - ./infra/minio/init.sh:/usr/local/bin/init.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/init.sh"]
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'

  # ──────────────────────────────────────────────
  # 인프라 — Jaeger (분산 트레이싱)
  # ──────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "${PORT_PREFIX:-1}4317:4317"
      - "${PORT_PREFIX:-1}4318:4318"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:14269/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # 인프라 — Prometheus (메트릭 수집)
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    ports:
      - "${PORT_PREFIX:-1}9090:9090"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    depends_on:
      alertmanager:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # 인프라 — AlertManager (알림 관리)
  # ──────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      # Slack Webhook URL 파일 마운트 — slack-webhook-url.example 참고하여 slack-webhook-url 파일 생성 (gitignored)
      - ./infra/alertmanager/slack-webhook-url:/etc/alertmanager/slack-webhook-url:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.listen-address=:9093'
    ports:
      - "${PORT_PREFIX:-1}9094:9093"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # 인프라 — Grafana (메트릭 시각화)
  # ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${PORT_PREFIX:-1}3100:3000"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────────
  # 인프라 — Loki (로그 집계)
  # ──────────────────────────────────────────────
  loki:
    image: grafana/loki:3.2.1
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "${PORT_PREFIX:-1}3101:3100"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ──────────────────────────────────────────────
  # 인프라 — Promtail (로그 수집 → Loki)
  # ──────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.2.1
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-data:/tmp
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    depends_on:
      loki:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # 인프라 — PostgreSQL ×5
  # ──────────────────────────────────────────────
  auth-postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
    ports:
      - "${PORT_PREFIX:-1}5432:5432"
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  product-postgres:
    image: postgres:16-alpine
    container_name: product-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: product_user
      POSTGRES_PASSWORD: ${PRODUCT_DB_PASSWORD}
    ports:
      - "${PORT_PREFIX:-1}5433:5432"
    volumes:
      - product-postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U product_user -d product_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  order-postgres:
    image: postgres:16-alpine
    container_name: order-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD}
    ports:
      - "${PORT_PREFIX:-1}5434:5432"
    volumes:
      - order-postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  payment-postgres:
    image: postgres:16-alpine
    container_name: payment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD}
    ports:
      - "${PORT_PREFIX:-1}5435:5432"
    volumes:
      - payment-postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_user -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-postgres:
    image: postgres:16-alpine
    container_name: user-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user_user
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
    ports:
      - "${PORT_PREFIX:-1}5437:5432"
    volumes:
      - user-postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_user -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  batch-postgres:
    image: postgres:16-alpine
    container_name: batch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: batch_db
      POSTGRES_USER: batch_user
      POSTGRES_PASSWORD: ${BATCH_DB_PASSWORD}
    ports:
      - "${PORT_PREFIX:-1}5436:5432"
    volumes:
      - batch-postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U batch_user -d batch_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  shipping-postgres:
    image: postgres:16-alpine
    container_name: shipping-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: shipping_db
      POSTGRES_USER: shipping_user
      POSTGRES_PASSWORD: ${SHIPPING_DB_PASSWORD}
    ports:
      - "${PORT_PREFIX:-1}5438:5432"
    volumes:
      - shipping-postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipping_user -d shipping_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  review-postgres:
    image: postgres:16-alpine
    container_name: review-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: review_db
      POSTGRES_USER: review_user
      POSTGRES_PASSWORD: ${REVIEW_DB_PASSWORD}
    ports:
      - "${PORT_PREFIX:-1}5439:5432"
    volumes:
      - review-postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U review_user -d review_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  promotion-postgres:
    image: postgres:16-alpine
    container_name: promotion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: promotion_db
      POSTGRES_USER: promotion_user
      POSTGRES_PASSWORD: ${PROMOTION_DB_PASSWORD}
    ports:
      - "${PORT_PREFIX:-1}5440:5432"
    volumes:
      - promotion-postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promotion_user -d promotion_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  notification-postgres:
    image: postgres:16-alpine
    container_name: notification-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
    ports:
      - "${PORT_PREFIX:-1}5441:5432"
    volumes:
      - notification-postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification_user -d notification_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # 백엔드 서비스
  # ──────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    container_name: auth-service
    init: true
    restart: unless-stopped
    environment:
      - DB_URL=jdbc:postgresql://auth-postgres:5432/auth_db
      - DB_USERNAME=auth_user
      - DB_PASSWORD=${AUTH_DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TOKEN_TTL_SECONDS=3600
      - JWT_REFRESH_TOKEN_TTL_SECONDS=2592000
      - JWT_ISSUER=auth-service
      - JWT_AUDIENCE=api
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SERVER_PORT=8081
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - OTEL_SERVICE_NAME=auth-service
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - SPRING_PROFILES_ACTIVE=prod
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - NAVER_CLIENT_ID=${NAVER_CLIENT_ID}
      - NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET}
      - NAVER_REDIRECT_URI=${NAVER_REDIRECT_URI}
      - OAUTH_CALLBACK_ALLOWLIST=${OAUTH_CALLBACK_ALLOWLIST}
    ports:
      - "${PORT_PREFIX:-1}8081:8081"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    depends_on:
      auth-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 360s

  product-service:
    build:
      context: .
      dockerfile: apps/product-service/Dockerfile
    container_name: product-service
    init: true
    restart: unless-stopped
    environment:
      - DB_URL=jdbc:postgresql://product-postgres:5432/product_db
      - DB_USERNAME=product_user
      - DB_PASSWORD=${PRODUCT_DB_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SERVER_PORT=8082
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - OTEL_SERVICE_NAME=product-service
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - SPRING_PROFILES_ACTIVE=prod
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET_PRODUCT_IMAGES=firstproject-local-product-images
      - CDN_BASE_URL=http://localhost:9000
    ports:
      - "${PORT_PREFIX:-1}8082:8082"
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.5'
    depends_on:
      product-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 360s

  search-service:
    build:
      context: .
      dockerfile: apps/search-service/Dockerfile
    container_name: search-service
    init: true
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_URIS=http://elasticsearch:9200
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SERVER_PORT=8085
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - OTEL_SERVICE_NAME=search-service
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - SPRING_PROFILES_ACTIVE=prod
    ports:
      - "${PORT_PREFIX:-1}8085:8085"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    depends_on:
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 360s

  user-service:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    container_name: user-service
    init: true
    restart: unless-stopped
    environment:
      - DB_URL=jdbc:postgresql://user-postgres:5432/user_db
      - DB_USERNAME=user_user
      - DB_PASSWORD=${USER_DB_PASSWORD}
      - DB_POOL_MIN_IDLE=10
