    container_name: ecommerce-user-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user_user
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
    expose:
      - "5432"
    volumes:
      - user-postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_user -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  batch-postgres:
    image: postgres:16-alpine
    container_name: ecommerce-batch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: batch_db
      POSTGRES_USER: batch_user
      POSTGRES_PASSWORD: ${BATCH_DB_PASSWORD}
    expose:
      - "5432"
    volumes:
      - batch-postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U batch_user -d batch_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  shipping-postgres:
    image: postgres:16-alpine
    container_name: ecommerce-shipping-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: shipping_db
      POSTGRES_USER: shipping_user
      POSTGRES_PASSWORD: ${SHIPPING_DB_PASSWORD}
    expose:
      - "5432"
    volumes:
      - shipping-postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipping_user -d shipping_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  review-postgres:
    image: postgres:16-alpine
    container_name: ecommerce-review-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: review_db
      POSTGRES_USER: review_user
      POSTGRES_PASSWORD: ${REVIEW_DB_PASSWORD}
    expose:
      - "5432"
    volumes:
