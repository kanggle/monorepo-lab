  gateway-service:
    build:
      context: .
      dockerfile: apps/gateway-service/Dockerfile
    container_name: ecommerce-gateway-service
    init: true
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # TASK-MONO-027: ecommerce gateway is now a GAP OIDC consumer.
      # GAP joins the shared traefik-net network so http://iam.local works
      # from inside the ecommerce stack (mirrors fan-platform compose,
      # TASK-MONO-026). JWT_JWKS_URI is kept for backward-compat with the
      # e2e harness; the production lookup comes from OIDC_ISSUER_URL.
      # TASK-BE-132: auth-service decommissioned; gateway validates GAP tokens only.
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-http://iam.local}
      - JWT_JWKS_URI=${JWT_JWKS_URI:-http://iam.local/oauth2/jwks}
      - OIDC_REQUIRED_TENANT_ID=${OIDC_REQUIRED_TENANT_ID:-ecommerce}
      - OIDC_ALLOWED_ISSUERS=${OIDC_ALLOWED_ISSUERS:-http://iam.local,iam}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - PRODUCT_SERVICE_URL=http://product-service:8082
      - SEARCH_SERVICE_URL=http://search-service:8085
      - ORDER_SERVICE_URL=http://order-service:8086
      - USER_SERVICE_URL=http://user-service:8084
      - PAYMENT_SERVICE_URL=http://payment-service:8087
      - SHIPPING_SERVICE_URL=http://shipping-service:8090
      - REVIEW_SERVICE_URL=http://review-service:8091
      - PROMOTION_SERVICE_URL=http://promotion-service:8092
      - NOTIFICATION_SERVICE_URL=http://notification-service:8093
      - SETTLEMENT_SERVICE_URL=http://settlement-service:8094
      - SERVER_PORT=8080
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - OTEL_SERVICE_NAME=gateway-service
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - SPRING_PROFILES_ACTIVE=prod
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    depends_on:
      redis:
        condition: service_healthy
      # TASK-BE-132: auth-service decommissioned — not in depends_on.
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      shipping-service:
        condition: service_healthy
      review-service:
        condition: service_healthy
      promotion-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      settlement-service:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.ecommerce.rule=Host(`ecommerce.${DEMO_DOMAIN:-local}`)"
      - "traefik.http.routers.ecommerce.entrypoints=web"
      - "traefik.http.services.ecommerce.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 360s
    networks:
      - ecommerce-net
      - traefik-net

  # ──────────────────────────────────────────────
  # 프론트엔드 애플리케이션
  # web-store 는 Traefik 아래의 서브도메인으로 노출.
  # NEXT_PUBLIC_API_URL 은 브라우저에서 접근하는 절대 URL 이므로
  # Traefik 진입점인 http://ecommerce.local 로 지정한다.
  # ──────────────────────────────────────────────
  web-store:
    build:
      context: .
      dockerfile: apps/web-store/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://ecommerce.local}
        - NEXT_PUBLIC_TOSS_CLIENT_KEY=${NEXT_PUBLIC_TOSS_CLIENT_KEY}
    container_name: ecommerce-web-store
    init: true
    restart: unless-stopped
    environment:
      - API_URL_INTERNAL=http://gateway-service:8080
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    depends_on:
      gateway-service:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.ecommerce-web.rule=Host(`web.ecommerce.${DEMO_DOMAIN:-local}`)"
      - "traefik.http.routers.ecommerce-web.entrypoints=web"
      - "traefik.http.services.ecommerce-web.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://0.0.0.0:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ecommerce-net
      - traefik-net

