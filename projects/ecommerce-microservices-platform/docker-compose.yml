    container_name: ecommerce-promotion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: promotion_db
      POSTGRES_USER: promotion_user
      POSTGRES_PASSWORD: ${PROMOTION_DB_PASSWORD}
    expose:
