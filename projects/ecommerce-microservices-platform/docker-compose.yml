  # ──────────────────────────────────────────────
  # 백엔드 서비스
  # auth-service removed by TASK-BE-132 — replaced by GAP OIDC (TASK-MONO-027).
  # Source code preserved in apps/auth-service/ for history; excluded from build
  # via settings.gradle.
  # ──────────────────────────────────────────────
  product-service:
    build:
      context: .
      dockerfile: apps/product-service/Dockerfile
    container_name: ecommerce-product-service
    init: true
    restart: unless-stopped
    environment:
      - DB_URL=jdbc:postgresql://product-postgres:5432/product_db
      - DB_USERNAME=product_user
      - DB_PASSWORD=${PRODUCT_DB_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SERVER_PORT=8082
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - OTEL_SERVICE_NAME=product-service
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - SPRING_PROFILES_ACTIVE=prod
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET_PRODUCT_IMAGES=firstproject-local-product-images
      - CDN_BASE_URL=http://localhost:9000
    expose:
      - "8082"
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.5'
    depends_on:
      product-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 360s
    networks:
      - ecommerce-net

  search-service:
    build:
      context: .
      dockerfile: apps/search-service/Dockerfile
    container_name: ecommerce-search-service
    init: true
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_URIS=http://elasticsearch:9200
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SERVER_PORT=8085
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - OTEL_SERVICE_NAME=search-service
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - SPRING_PROFILES_ACTIVE=prod
    expose:
      - "8085"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    depends_on:
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 360s
    networks:
      - ecommerce-net

  user-service:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    container_name: ecommerce-user-service
    init: true
    restart: unless-stopped
    environment:
