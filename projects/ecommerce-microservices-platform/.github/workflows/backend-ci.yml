name: Backend CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    paths:
      - 'apps/auth-service/**'
      - 'apps/batch-worker/**'
      - 'apps/gateway-service/**'
      - 'apps/order-service/**'
      - 'apps/payment-service/**'
      - 'apps/product-service/**'
      - 'apps/search-service/**'
      - 'apps/user-service/**'
      - 'libs/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'

concurrency:
  group: backend-ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
    steps:
      - uses: actions/checkout@v4

      - id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files_yaml: |
            libs:
              - 'libs/**'
            auth-service:
              - 'apps/auth-service/**'
            batch-worker:
              - 'apps/batch-worker/**'
            gateway-service:
              - 'apps/gateway-service/**'
            order-service:
              - 'apps/order-service/**'
            payment-service:
              - 'apps/payment-service/**'
            product-service:
              - 'apps/product-service/**'
            search-service:
              - 'apps/search-service/**'
            user-service:
              - 'apps/user-service/**'

      - id: changes
        run: |
          services=()

          libs_changed="${{ steps.changed-files.outputs.libs_any_changed }}"

          for svc in auth-service batch-worker gateway-service order-service payment-service product-service search-service user-service; do
            case "$svc" in
              auth-service) svc_changed="${{ steps.changed-files.outputs.auth-service_any_changed }}" ;;
              batch-worker) svc_changed="${{ steps.changed-files.outputs.batch-worker_any_changed }}" ;;
              gateway-service) svc_changed="${{ steps.changed-files.outputs.gateway-service_any_changed }}" ;;
              order-service) svc_changed="${{ steps.changed-files.outputs.order-service_any_changed }}" ;;
              payment-service) svc_changed="${{ steps.changed-files.outputs.payment-service_any_changed }}" ;;
              product-service) svc_changed="${{ steps.changed-files.outputs.product-service_any_changed }}" ;;
              search-service) svc_changed="${{ steps.changed-files.outputs.search-service_any_changed }}" ;;
              user-service) svc_changed="${{ steps.changed-files.outputs.user-service_any_changed }}" ;;
            esac

            if [[ "$svc_changed" == "true" || "$libs_changed" == "true" ]]; then
              services+=("\"$svc\"")
            fi
          done

          if [[ ${#services[@]} -eq 0 ]]; then
            echo "services=[]" >> "$GITHUB_OUTPUT"
          else
            json=$(IFS=,; echo "[${services[*]}]")
            echo "services=$json" >> "$GITHUB_OUTPUT"
          fi

  build-and-test:
    name: "Build & Test — ${{ matrix.service }}"
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew :apps:${{ matrix.service }}:build -x test

      - name: Run tests
        run: ./gradlew :apps:${{ matrix.service }}:test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: apps/${{ matrix.service }}/build/reports/tests/
          retention-days: 7
