server:
  port: 8094

spring:
  application:
    name: settlement-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/settlement_db}
    username: ${DB_USERNAME:settlement_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: settlement-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      service: ${spring.application.name}

settlement:
  commission:
    # Platform default commission rate in basis points (1000 = 10%). 0 = net-zero
    # degrade (single-store keeps everything, D8 / AC-9). Per-seller overrides win.
    default-rate-bps: ${SETTLEMENT_DEFAULT_RATE_BPS:0}
  # TASK-BE-447: outbox v2 (SettlementOutboxPublisher extends AbstractOutboxPublisher).
  outbox:
    batch-size: ${SETTLEMENT_OUTBOX_BATCH_SIZE:100}
    poll-ms: ${SETTLEMENT_OUTBOX_POLL_MS:1000}
    initial-delay-ms: ${SETTLEMENT_OUTBOX_INITIAL_DELAY_MS:5000}

logging:
  level:
    com.example.settlement: INFO
