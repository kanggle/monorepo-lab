server:
  port: ${SERVER_PORT:8092}

spring:
  application:
    name: promotion-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/promotion_db}
    username: ${DB_USERNAME:promotion_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: promotion-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      service: ${spring.application.name}

# TASK-BE-444: outbox v2 (PromotionOutboxPublisher extends AbstractOutboxPublisher);
# the v2 publisher reads the `promotion.outbox.*` keys.
# TASK-MONO-406 corrected the note that used to sit here: these keys were never bound by
# the lib OutboxAutoConfiguration (that auto-config only imported a JPA config, and it no
# longer exists at all). Measured: `outbox.polling.enabled` IS live — it is the
# @ConditionalOnProperty gate on the v2 publisher — but `interval-ms` / `batch-size` bind
# to nothing. They are v1 leftovers, kept rather than removed under an unrelated task.
outbox:
  polling:
    interval-ms: ${OUTBOX_POLLING_INTERVAL_MS:1000}
    batch-size: ${OUTBOX_POLLING_BATCH_SIZE:50}

promotion:
  outbox:
    batch-size: ${PROMOTION_OUTBOX_BATCH_SIZE:100}
    poll-ms: ${PROMOTION_OUTBOX_POLL_MS:1000}
    initial-delay-ms: ${PROMOTION_OUTBOX_INITIAL_DELAY_MS:5000}

logging:
  level:
    com.example.promotion: INFO
