# 통합 테스트 프로파일: Rate Limiter 없이 라우트 설정 (다운스트림 불필요 경로 테스트용)
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          audiences: ecommerce
          # No issuer-uri here: integration tests publish a MockWebServer-backed
          # JWKS document (see GatewayIntegrationTest.JwksMockServer) and set
          # jwk-set-uri via DynamicPropertySource. Setting issuer-uri would
          # trigger /.well-known/openid-configuration discovery against the
          # mock server which does not implement it.

  cloud:
    gateway:
      routes:
        - id: order-service-test
          uri: http://localhost:19999
          predicates:
            - Path=/api/orders/**

        - id: product-service-test
          uri: http://localhost:19999
          predicates:
            - Path=/api/products/**

        - id: search-service-test
          uri: http://localhost:19999
          predicates:
            - Path=/api/search/**

        - id: user-service-test
          uri: http://localhost:19999
          predicates:
            - Path=/api/users/**,/api/admin/users/**

        - id: admin-product-service-test
          uri: http://localhost:19999
          predicates:
            - Path=/api/admin/products/**

        - id: payment-service-test
          uri: http://localhost:19999
          predicates:
            - Path=/api/payments/**

# TASK-MONO-027: validator config for the integration profile.
# JwtTestHelper signs tokens with iss=https://test.local/issuer and
# tenant_id=ecommerce; the validators must accept that pair.
ecommerce:
  oauth2:
    allowed-issuers: https://test.local/issuer,iam
    required-tenant-id: ecommerce
