spring:
  application:
    name: gateway-service

  # TASK-MONO-027: Standard OAuth2 Resource Server backed by GAP's JWKS.
  # Mirrors the wms-platform pattern (TASK-MONO-019) so the GAP issuer URL
  # discovery + JWKS fetch + tenant/issuer validation chain are shared
  # across consumer projects.
  security:
    oauth2:
      resourceserver:
        jwt:
          # OIDC issuer for SAS-issued tokens (GAP auth-service via Traefik
          # at http://iam.local). The issuer-uri triggers Spring Security's
          # automatic /.well-known/openid-configuration discovery.
          issuer-uri: ${OIDC_ISSUER_URL:http://localhost:8081}
          # Default port 8088 avoids a self-referential loop when the gateway
          # binds to 8080. Real environments set OIDC_JWK_SET_URI / JWT_JWKS_URI
          # to the issuer's JWKS endpoint. JWT_JWKS_URI is the legacy env var
          # name kept for backward compatibility with the e2e harness and
          # docker-compose envs predating TASK-MONO-027.
          jwk-set-uri: ${OIDC_JWK_SET_URI:${JWT_JWKS_URI:${OIDC_ISSUER_URL:http://localhost:8088}/oauth2/jwks}}
          audiences: ecommerce

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
            allowed-methods: '*'
            allowed-headers: '*'
            allow-credentials: true
            exposed-headers:
              - 'Authorization'
            max-age: 3600
      routes:
        # auth-service route removed by TASK-BE-132 — auth-service decommissioned.
        # Authentication is now handled by GAP OIDC (TASK-MONO-027).
        # /api/auth/** paths previously routed to auth-service are retired;
        # login/logout flows go through GAP's /oauth2/authorize endpoint directly.

        - id: product-service
          uri: ${PRODUCT_SERVICE_URL:http://localhost:8082}
          predicates:
            # /api/admin/sellers/** — the operator seller surface (AdminSellerController,
            # TASK-BE-375). BE-375 assumed a generic /api/admin/** OPERATOR branch routed
            # it, but routing is per-service: the predicate was missing, so the gateway
            # 404'd before reaching product-service. Add it here (product-api.md § sellers).
            - Path=/api/products/**,/api/admin/products/**,/api/admin/sellers/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@tenantRouteKeyResolver}"

        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/users/**,/api/admin/users/**,/api/wishlists/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@tenantRouteKeyResolver}"

        - id: search-service
          uri: ${SEARCH_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/search/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@tenantRouteKeyResolver}"

        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/orders/**,/api/admin/orders/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@tenantRouteKeyResolver}"

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/payments/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@tenantRouteKeyResolver}"

        - id: shipping-service
          uri: ${SHIPPING_SERVICE_URL:http://localhost:8090}
          predicates:
            - Path=/api/shippings/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@tenantRouteKeyResolver}"

        - id: review-service
          uri: ${REVIEW_SERVICE_URL:http://localhost:8091}
          predicates:
            - Path=/api/reviews/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@tenantRouteKeyResolver}"

        - id: promotion-service
          uri: ${PROMOTION_SERVICE_URL:http://localhost:8092}
          predicates:
            - Path=/api/promotions/**,/api/coupons/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@tenantRouteKeyResolver}"

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8093}
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@tenantRouteKeyResolver}"

        # TASK-BE-365 (ADR-MONO-030 Step 4 facet b): settlement-service —
        # operator-plane marketplace settlement read + commission-rate admin.
        - id: settlement-service
          uri: ${SETTLEMENT_SERVICE_URL:http://localhost:8094}
          predicates:
            - Path=/api/admin/settlements/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@tenantRouteKeyResolver}"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  health:
    redis:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      service: ${spring.application.name}

server:
  port: 8080

# TASK-BE-379: aggregated Swagger UI (single entry point for all downstream service docs).
# OFF by default — prod-safe. The k8s/compose `prod` profile does not set the env, so a real
# production gateway never exposes the service API specs. The local demo opts in with
# GATEWAY_SWAGGER_AGGREGATION_ENABLED=true on the gateway container.
gateway:
  swagger-aggregation:
    enabled: ${GATEWAY_SWAGGER_AGGREGATION_ENABLED:false}

springdoc:
  api-docs:
    enabled: ${gateway.swagger-aggregation.enabled}
  swagger-ui:
    enabled: ${gateway.swagger-aggregation.enabled}
    path: /swagger-ui.html
    # Service dropdown — each url is proxied to the downstream /v3/api-docs by
    # SwaggerAggregationConfig (registered only when aggregation is enabled).
    urls:
      - name: product-service
        url: /api-docs/product-service
      - name: user-service
        url: /api-docs/user-service
      - name: search-service
        url: /api-docs/search-service
      - name: order-service
        url: /api-docs/order-service
      - name: payment-service
        url: /api-docs/payment-service
      - name: shipping-service
        url: /api-docs/shipping-service
      - name: review-service
        url: /api-docs/review-service
      - name: promotion-service
        url: /api-docs/promotion-service
      - name: notification-service
        url: /api-docs/notification-service
      - name: settlement-service
        url: /api-docs/settlement-service

ecommerce:
  # TASK-MONO-027: OIDC Resource Server validators.
  # Consumed by OAuth2ResourceServerConfig + TenantClaimValidator +
  # AllowedIssuersValidator. See specs/integration/iam-integration.md.
  oauth2:
    # Acceptable iss claim values during the D2-b deprecation window
    # (~2026-08-01). Both the SAS issuer (default http://iam.local) and the
    # legacy 'iam' string must validate while the
    # legacy path is being deprecated.
    allowed-issuers: ${OIDC_ALLOWED_ISSUERS:${OIDC_ISSUER_URL:http://localhost:8081},iam}
    # Tokens whose tenant_id claim does not match this value are rejected
    # at the gateway with 403 (TENANT_FORBIDDEN). Single-tenant only — no
    # wildcard support; cross-tenant access is blocked by design.
    required-tenant-id: ${OIDC_REQUIRED_TENANT_ID:ecommerce}
