server:
  port: 8090

spring:
  application:
    name: shipping-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/shipping_db}
    username: ${DB_USERNAME:shipping_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: shipping-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      service: ${spring.application.name}

outbox:
  polling:
    interval-ms: ${OUTBOX_POLLING_INTERVAL_MS:1000}
    batch-size: ${OUTBOX_POLLING_BATCH_SIZE:50}

# Cross-project fulfillment forward leg (ADR-MONO-022 §D7)
fulfillment:
  enabled: ${FULFILLMENT_ENABLED:true}
  default-warehouse-code: ${FULFILLMENT_DEFAULT_WAREHOUSE_CODE:WH-MAIN}
  require-sku-mapping: ${FULFILLMENT_REQUIRE_SKU_MAPPING:false}
  sku-map: {}

# External carrier tracking integration (TASK-BE-293, the v2 first increment).
#
# Provider = a LOGISTICS AGGREGATOR (물류 중개 플랫폼: 굿스플로 / 스윗트래커 / 셀메이트 등),
# NOT a single carrier and NOT a contract-partner-direct carrier API (ADR-007 D2). The
# aggregator holds master contracts with the underlying carriers and exposes ONE endpoint
# / ONE key / ONE unified status-code scheme, which CarrierStatusMapper maps to the four
# shipping states. So base-url / api-key below point at the AGGREGATOR's endpoint + key.
#
# mode=mock (default) = MockCarrierTrackingAdapter; with a blank mock-status the
# carrier integration is OFF (a refresh is a no-op = the v1 admin-driven baseline).
# mode=http = HttpCarrierTrackingAdapter (real aggregator GET ${base-url}/track). The
# two are mutually-exclusive @ConditionalOnProperty beans.
#
# Secrets (api-key, webhook.secret) are env-injected ONLY (Secret Manager stand-in) — no
# value is hard-coded; the defaults are blank so an unconfigured deploy is net-zero/fail-closed.
shipping:
  carrier:
    mode: ${SHIPPING_CARRIER_MODE:mock}
    # Aggregator API base URL + key (aggregator account credentials, env-injected).
    base-url: ${SHIPPING_CARRIER_BASE_URL:}
    api-key: ${SHIPPING_CARRIER_API_KEY:}
    mock-status: ${SHIPPING_CARRIER_MOCK_STATUS:}
    connect-timeout-ms: ${SHIPPING_CARRIER_CONNECT_TIMEOUT_MS:2000}
    read-timeout-ms: ${SHIPPING_CARRIER_READ_TIMEOUT_MS:5000}
    # The `carrier` query param sent to the aggregator is the AGGREGATOR-INTERNAL carrier code
    # (or a sentinel for aggregator auto-assignment). The aggregator may auto-assign / differ
    # from what we send — tracking is keyed by our trackingNumber/shippingId, so that is no-op
    # for identity (ADR-007 Edge Cases). The CarrierTrackingPort.fetchLatest(carrier, ...)
    # signature is unchanged; only the semantics of `carrier` are documented here.
    #
    # Inbound aggregator webhook (TASK-BE-294): HMAC-SHA256 shared secret over the raw body
    # (X-Carrier-Signature: sha256=<hex>) — the aggregator's webhook signing spec. Blank
    # (default) = fail-closed: every webhook is rejected 401 (inbound integration OFF = net-zero).
    webhook:
      secret: ${SHIPPING_CARRIER_WEBHOOK_SECRET:}
      # Retention / cleanup sweep for the BE-294 processed_carrier_webhooks dedup table
      # (TASK-BE-361 / ADR-007 D5-4). Every inbound aggregator webhook persists its delivery_id
      # as a permanent idempotency marker, so the table grows unbounded; this sweep periodically
      # deletes markers OLDER than retention-days, in bounded batches, single-instance via
      # ShedLock. It is separate from processed_events (Kafka event dedup), which has its own
      # retention (AC-3).
      #
      # enabled=false (default) = scheduler bean NOT created (net-zero; AC-5 byte-identical
      # default). RATIONALE: net-zero default per the project convention (mirrors auto-collect)
      # — operators should enable it in any long-lived deploy to curb table growth. retention-days
      # (30) must stay safely longer than the aggregator's max webhook re-delivery delay so an
      # in-window re-delivery of the same delivery_id stays idempotent (AC-2 / F1). Each batch
      # delete commits in its own transaction and a single tick is bounded by max-batches-per-tick
      # (F2) so a huge backlog drains progressively across ticks, never one runaway tick.
      cleanup:
        enabled: ${SHIPPING_CARRIER_WEBHOOK_CLEANUP_ENABLED:false}
        fixed-delay-ms: ${SHIPPING_CARRIER_WEBHOOK_CLEANUP_FIXED_DELAY_MS:3600000}
        retention-days: ${SHIPPING_CARRIER_WEBHOOK_CLEANUP_RETENTION_DAYS:30}
        batch-size: ${SHIPPING_CARRIER_WEBHOOK_CLEANUP_BATCH_SIZE:500}
        max-batches-per-tick: ${SHIPPING_CARRIER_WEBHOOK_CLEANUP_MAX_BATCHES_PER_TICK:100}
    # Unattended auto-collect tracking sweep (TASK-BE-360 / ADR-007 D5-3). Periodically polls
    # in-flight shipments (SHIPPED / IN_TRANSIT with tracking) via the SAME CarrierTrackingPort
    # forward-advance as the admin pull, so a shipment converges to DELIVERED even when nobody
    # presses refresh and the aggregator webhook is lost/delayed. ShedLock guarantees a single
    # replica runs each tick.
    #
    # enabled=false (default) = scheduler bean NOT created (net-zero; existing admin-driven
    # behaviour is byte-identical). Switch on only once a real aggregator is wired; with
    # mode=mock + blank mock-status, even enabled it is a real no-op.
    auto-collect:
      enabled: ${SHIPPING_CARRIER_AUTO_COLLECT_ENABLED:false}
      fixed-delay-ms: ${SHIPPING_CARRIER_AUTO_COLLECT_FIXED_DELAY_MS:60000}
      batch-size: ${SHIPPING_CARRIER_AUTO_COLLECT_BATCH_SIZE:100}
    # Delivery Tracker (tracker.delivery) — the CONCRETE logistics aggregator (ADR-007 D2,
    # external-integrations.md § 1). Active only when mode=delivery-tracker: an OAuth2
    # client_credentials token (auth-url) + a GraphQL `track` query (graphql-url) over the same
    # provider-agnostic CarrierTrackingPort. The default mode=mock leaves this inert (net-zero),
    # so the existing mock/http adapters + HMAC webhook are byte-unchanged (TASK-BE-364 AC-6).
    #
    # client-id / client-secret are env-injected ONLY (no hardcoded secret); a BLANK either one
    # disables the adapter (every fetch returns empty without calling out = net-zero, AC-5),
    # identical to mode=mock (ADR-007 D4). Free sandbox keys: console.tracker.delivery.
    # Timeouts reuse shipping.carrier.connect-timeout-ms / read-timeout-ms (2s / 5s, § 1.5).
    delivery-tracker:
      auth-url: ${SHIPPING_CARRIER_DELIVERY_TRACKER_AUTH_URL:https://auth.tracker.delivery/oauth2/token}
      graphql-url: ${SHIPPING_CARRIER_DELIVERY_TRACKER_GRAPHQL_URL:https://apis.tracker.delivery/graphql}
      client-id: ${SHIPPING_CARRIER_DELIVERY_TRACKER_CLIENT_ID:}
      client-secret: ${SHIPPING_CARRIER_DELIVERY_TRACKER_CLIENT_SECRET:}

logging:
  level:
    com.example.shipping: INFO
