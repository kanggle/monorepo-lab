# =============================================================================
# Static account-service stub for the lean GAP logout e2e stack (TASK-MONO-318)
# =============================================================================
# The lean GAP stack (docker-compose.iam-e2e.yml) deliberately omits the real
# account-service. But TASK-BE-407 made GAP's form-login path depend on it:
# CredentialAuthenticationProvider resolves the authoritative `tenant_type` via
# AccountServicePort.getTenantType(tenantId) -> GET /internal/tenants/{tid}, and
# that call is NOT fail-soft — an account-service outage surfaces as an
# AuthenticationServiceException, which the login page renders as the generic
# "Invalid email or password." So a CONSUMER could never log in (the e2e was
# red at the credential step).
#
# This static stub answers ONLY the one non-fail-soft call:
#   GET /internal/tenants/{tid} -> 200 { ..., "tenantType": "B2C" }
# so the resolver gets a non-blank tenant_type and form-login completes.
#
# Every OTHER /internal/** account-service call made during token issuance
# (TenantClaimTokenCustomizer's listAccountRoles + listEntitledDomains) IS
# fail-soft: a 404 here makes the customizer fall back to the local
# RoleSeedPolicy seed (ecommerce -> ["CUSTOMER"]) and omit entitled_domains —
# exactly the claims web-store's role-based guard needs. So everything but the
# tenant lookup intentionally 404s.
server {
    listen 8080;

    # account-service returns { tenantId, displayName, tenantType, status, ... };
    # auth-service consumes only `tenantType` (AccountServiceClient.doGetTenantType).
    location ~ ^/internal/tenants/[^/]+$ {
        default_type application/json;
        return 200 '{"tenantId":"ecommerce","tenantType":"B2C","status":"ACTIVE"}';
    }

    # All other /internal/** calls are fail-soft on the caller side -> 404.
    location / {
        return 404;
    }
}
