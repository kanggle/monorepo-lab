spring:
  application:
    name: review-service

  jackson:
    serialization:
      write-dates-as-timestamps: false

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/review_db}
    username: ${DB_USERNAME:review_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 100
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# TASK-BE-445: outbox v2 (ReviewOutboxPublisher extends AbstractOutboxPublisher);
# the v2 publisher reads the `review.outbox.*` keys.
# TASK-MONO-406 corrected the note that used to sit here: these keys were never bound by
# the lib OutboxAutoConfiguration (that auto-config only imported a JPA config, and it no
# longer exists at all). Measured: `outbox.polling.enabled` IS live — it is the
# @ConditionalOnProperty gate on the v2 publisher — but `interval-ms` / `batch-size` bind
# to nothing. They are v1 leftovers, kept rather than removed under an unrelated task.
outbox:
  polling:
    interval-ms: 1000
    batch-size: 50

review:
  outbox:
    batch-size: ${REVIEW_OUTBOX_BATCH_SIZE:100}
    poll-ms: ${REVIEW_OUTBOX_POLL_MS:1000}
    initial-delay-ms: ${REVIEW_OUTBOX_INITIAL_DELAY_MS:5000}

server:
  port: ${SERVER_PORT:8091}
  forward-headers-strategy: native

order-service:
  base-url: ${ORDER_SERVICE_URL:http://localhost:8086}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      service: ${spring.application.name}

logging:
  level:
    com.example.review: INFO
    org.flywaydb: INFO
