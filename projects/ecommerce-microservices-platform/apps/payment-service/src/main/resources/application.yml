server:
  port: 8087

spring:
  application:
    name: payment-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/payment_db}
    username: ${DB_USERNAME:payment_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      service: ${spring.application.name}

outbox:
  polling:
    enabled: ${OUTBOX_POLLING_ENABLED:true}
    interval-ms: ${OUTBOX_POLLING_INTERVAL_MS:1000}
    batch-size: ${OUTBOX_POLLING_BATCH_SIZE:50}

toss:
  payments:
    secret-key: ${TOSS_PAYMENTS_SECRET_KEY:test_sk_placeholder}
    base-url: ${TOSS_PAYMENTS_BASE_URL:https://api.tosspayments.com}
    connect-timeout-ms: ${TOSS_PAYMENTS_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${TOSS_PAYMENTS_READ_TIMEOUT_MS:10000}

# Resilience4j — TossPaymentsAdapter (ADR-MONO-005 Category B, TASK-BE-139)
resilience4j:
  circuitbreaker:
    instances:
      toss-payments:
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 8s
        sliding-window-type: TIME_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  retry:
    instances:
      toss-payments:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        enable-randomized-wait: true
        randomized-wait-factor: 0.5
        retry-exceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
          - com.example.payment.application.exception.PgConfirmFailedException
  bulkhead:
    instances:
      toss-payments:
        max-concurrent-calls: 10
        max-wait-duration: 100ms

logging:
  level:
    com.example.payment: INFO
