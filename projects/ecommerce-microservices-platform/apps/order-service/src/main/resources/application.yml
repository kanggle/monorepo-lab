server:
  port: 8086

spring:
  application:
    name: order-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/order_db}
    username: ${DB_USERNAME:order_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      service: ${spring.application.name}

outbox:
  polling:
    interval-ms: ${OUTBOX_POLLING_INTERVAL_MS:1000}
    batch-size: ${OUTBOX_POLLING_BATCH_SIZE:50}

order:
  # TASK-BE-448: outbox v2 (OrderOutboxPublisher extends AbstractOutboxPublisher).
  # The legacy top-level `outbox.polling.*` keys are retained only because the lib
  # OutboxAutoConfiguration beans (unreferenced after the v2 swap) still bind them.
  outbox:
    batch-size: ${ORDER_OUTBOX_BATCH_SIZE:100}
    poll-ms: ${ORDER_OUTBOX_POLL_MS:1000}
    initial-delay-ms: ${ORDER_OUTBOX_INITIAL_DELAY_MS:5000}
  internal:
    # Resource-server validation for the gateway-excluded /api/internal/** route
    # (TASK-BE-412): validates the inbound client_credentials Bearer JWT. JWKS / issuer /
    # audience are env-overridable; audience is unset by default (pin per environment).
    oauth2:
      jwk-set-uri: ${ORDER_INTERNAL_OAUTH2_JWK_SET_URI:http://auth-service:8081/oauth2/jwks}
      issuer: ${ORDER_INTERNAL_OAUTH2_ISSUER:http://auth-service:8081}
      audience: ${ORDER_INTERNAL_OAUTH2_AUDIENCE:}
  saga:
    stuck-detector:
      enabled: ${ORDER_STUCK_DETECTOR_ENABLED:true}
      fixed-delay-ms: ${ORDER_STUCK_DETECTOR_FIXED_DELAY_MS:60000}
      initial-delay-ms: ${ORDER_STUCK_DETECTOR_INITIAL_DELAY_MS:30000}
      threshold-seconds: ${ORDER_STUCK_DETECTOR_THRESHOLD_SECONDS:1800}
      batch-size: ${ORDER_STUCK_DETECTOR_BATCH_SIZE:100}
      max-attempts: ${ORDER_STUCK_DETECTOR_MAX_ATTEMPTS:5}

logging:
  level:
    com.example.order: INFO
