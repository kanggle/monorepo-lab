spring:
  application:
    name: product-service

  jackson:
    serialization:
      write-dates-as-timestamps: false

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/product_db}
    username: ${DB_USERNAME:product_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 100
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 60s
      cache-null-values: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      # product-service's first inbound consumer — wms inventory reconciliation
      # (ADR-MONO-022 §D4 v2(b)). Raw-JSON String payloads parsed via ObjectMapper.
      group-id: product-service-wms
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# ADR-MONO-042 (TASK-BE-402) — seller-operator account provisioning via account-service
# internal EPs, authenticated with a GAP client_credentials Bearer JWT (mirrors
# admin-service IamClientCredentialsTokenProvider, ADR-005 단계 3b). All seller
# provisioning is FAIL-SOFT (D3): account-service unavailability never blocks onboarding.
iam:
  internal-client:
    token-uri: ${IAM_TOKEN_URI:http://localhost:8081/oauth2/token}
    client-id: ${IAM_CLIENT_ID:product-service-client}
    client-secret: ${IAM_CLIENT_SECRET:secret}
  account-service:
    base-url: ${ACCOUNT_SERVICE_BASE_URL:http://localhost:8081}
  downstream:
    connect-timeout-ms: ${IAM_DOWNSTREAM_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${IAM_DOWNSTREAM_READ_TIMEOUT_MS:10000}
  seller:
    # The seller-scoped operator role minted on the seller-operator account (D2/D6).
    # Yields the existing ADR-025 axis-2 X-Seller-Scope claim — authz net-zero.
    role: ${IAM_SELLER_ROLE:SELLER}

storage:
  s3:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    region: ${S3_REGION:us-east-1}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
    path-style-access: ${S3_PATH_STYLE_ACCESS:true}
    presigned-url-expiration-minutes: ${S3_PRESIGNED_URL_EXPIRATION_MINUTES:15}
  cdn:
    base-url: ${CDN_BASE_URL:http://localhost:9000}
  buckets:
    product-images: ${S3_BUCKET_PRODUCT_IMAGES:firstproject-local-product-images}

server:
  port: ${SERVER_PORT:8082}
  forward-headers-strategy: native

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      service: ${spring.application.name}

logging:
  level:
    com.example.product: INFO
    org.flywaydb: INFO
