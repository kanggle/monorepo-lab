# =============================================================================
# web-store GAP OIDC e2e stack (TASK-INT-023)
# =============================================================================
# A LEAN GAP (iam) auth stack — JUST enough to let the
# web-store Playwright suite log in / log out against a REAL OIDC provider, so
# the RP-initiated logout (end_session) AC-1 can be verified end-to-end.
#
# Why this is lean (vs the full federation-hardening-e2e stack):
#   - web-store login uses GAP's SAS form-login (CredentialAuthenticationProvider
#     reads auth_db.credentials only). It does NOT call account-service, so
#     account-service / admin-service / the 5 producers are all omitted.
#   - The issued OIDC token carries tenant_id (no account_type claim is emitted),
#     which web-store's NextAuth signIn callback accepts → a single seeded
#     credential row (fixtures/iam-consumer-seed.sql) is all that is needed.
#
# Services: mysql (auth_db) + redis + a DNS-only kafka placeholder (auth-service
# only needs the hostname to resolve at boot) + auth-service.
#
# Usage (local or CI):
#   1. ./gradlew :apps:auth-service:bootJar   (from projects/iam-platform)
#   2. docker compose -f docker-compose.iam-e2e.yml up -d --build
#   3. wait for auth-service healthy, then apply the consumer seed:
#      docker compose -f docker-compose.iam-e2e.yml exec -T mysql \
#        mysql -uroot -prootpass auth_db < apps/web-store/e2e/fixtures/iam-consumer-seed.sql
#   4. run web-store with OIDC_ISSUER_URL=http://auth-service:8081 + SKIP_GAP_E2E=0
#      and the Playwright `rp-initiated-logout.spec.ts` (needs /etc/hosts:
#      127.0.0.1 auth-service so the browser + Next.js server both resolve the
#      issuer host — same constraint as the platform-console e2e, PC-FE-028).
# =============================================================================

x-iam-service-env: &iam-service-env
  SPRING_PROFILES_ACTIVE: e2e
  DB_HOST: mysql
  DB_PORT: "3306"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ""
  KAFKA_BOOTSTRAP_SERVERS: 127.0.0.1:9999
  JAVA_TOOL_OPTIONS: "-Dnetworkaddress.cache.ttl=0 -Dnetworkaddress.cache.negative.ttl=0"
  OIDC_ISSUER_URL: http://auth-service:8081

services:
  mysql:
    image: mysql:8.0
    command: ["--log-bin-trust-function-creators=1", "--max_connections=500"]
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      AUTH_DB_PASSWORD: auth_pass
      ACCOUNT_DB_PASSWORD: account_pass
      SECURITY_DB_PASSWORD: security_pass
      ADMIN_DB_PASSWORD: admin_pass
    volumes:
      - ../iam-platform/docker/mysql/init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [iam-e2e]

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [iam-e2e]

  # DNS-only kafka placeholder — auth-service blocks at boot until the `kafka`
  # hostname resolves, but never produces/consumes in this lean stack.
  kafka:
    image: alpine:3.19
    command: ["sleep", "infinity"]
    networks: [iam-e2e]

  # Static account-service stub. TASK-BE-407 made GAP form-login resolve the
  # authoritative tenant_type from account-service (a NON-fail-soft call), so the
  # lean stack can no longer omit it outright — without a responder the login
  # fails closed as "Invalid email or password". This nginx stub answers only
  # GET /internal/tenants/{tid} with a tenant_type; every other /internal/** call
  # (roles, entitled-domains) is fail-soft and 404s back to the local seed.
  # See account-mock.nginx.conf for the full rationale.
  account-mock:
    image: nginx:1.27-alpine
    volumes:
      - ./apps/web-store/e2e/fixtures/account-mock.nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [iam-e2e]

  auth-service:
    build:
      context: ../iam-platform
      dockerfile: apps/auth-service/Dockerfile
    environment:
      <<: *iam-service-env
      DB_NAME: auth_db
      DB_USERNAME: auth_user
      DB_PASSWORD: auth_pass
      JWT_PRIVATE_KEY_PATH: file:/app/keys/private.pem
      JWT_PUBLIC_KEY_PATH: file:/app/keys/public.pem
      # TASK-BE-407: form-login resolves tenant_type from account-service. Point
      # at the static stub (see the account-mock service) so the lean stack's
      # CredentialAuthenticationProvider does not fail closed.
      ACCOUNT_SERVICE_URL: http://account-mock:8080
    volumes:
      - ../iam-platform/apps/auth-service/src/test/resources/keys:/app/keys:ro
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_started }
      account-mock: { condition: service_started }
    ports: ["8081:8081"]
    networks: [iam-e2e]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

networks:
  iam-e2e:
    driver: bridge
