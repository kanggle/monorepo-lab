# =============================================================================
# Global Account Platform — Local Development Infrastructure
# =============================================================================
# Hostname-based routing (per ADR-MONO-001 Option C, TASK-MONO-024):
#   When GAP services run as containers (e.g. via the docker-compose.e2e.yml
#   harness or full-stack runs), gateway-service is reached via http://gap.local/.
#   Backing services (mysql/redis/kafka/kafka-ui/observability) stay on the
#   internal `gap-net` network and do not publish host ports.
#
# Prerequisites (one-time setup):
#   1. Register *.local hostnames in your hosts file:
#        bash scripts/dev-setup.sh           # Linux/macOS
#        .\scripts\dev-setup.ps1              # Windows (Run as Administrator)
#   2. Start the shared Traefik stack:
#        pnpm traefik:up
#      (creates the external `traefik-net` network this compose file joins)
#
# Services in this file (infrastructure only — application services run via
# `./gradlew :apps:<service>:bootRun` from the host, or via the dedicated
# docker-compose.e2e.yml harness for full-stack scenarios):
#   mysql        — 6 databases: auth_db, account_db, security_db, admin_db,
#                  community_db, membership_db
#   redis        — single instance with password
#   kafka        — KRaft single broker
#   kafka-init   — creates 14 main + 14 DLQ topics idempotently
#   kafka-ui     — broker / topic inspection (Traefik-routed)
#   prometheus   — metrics scrape
#   alertmanager — alert routing
#   loki         — log aggregation
#   promtail     — docker log tailer
#   grafana      — dashboards (Traefik-routed)
#
# Local bootRun workflow
#   Application services running as host JVM processes need to reach the
#   backing containers via `localhost:<port>`. Use the optional overlay:
#     docker compose -f projects/global-account-platform/docker-compose.yml \
#                    -f projects/global-account-platform/docker-compose.bootrun.yml up -d
#   The overlay re-publishes MySQL/Kafka/Redis on host ports 33306/39093/36379.
#   See docs/guides/dev-tooling.md for ad-hoc access patterns.
#
# Usage:
#   pnpm gap:up           — start everything in this compose file
#   pnpm gap:bootrun      — start with bootRun overlay (host ports for JVM dev)
#   pnpm gap:down         — stop containers (volumes preserved)
#   pnpm gap:ps           — status
# =============================================================================

name: global-account-platform

services:
  # ---------------------------------------------------------------------------
  # MySQL 8 — 6 databases: auth_db, account_db, security_db, admin_db, community_db, membership_db
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: gap-mysql
    restart: unless-stopped
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD:-auth_pass}
      ACCOUNT_DB_PASSWORD: ${ACCOUNT_DB_PASSWORD:-account_pass}
      SECURITY_DB_PASSWORD: ${SECURITY_DB_PASSWORD:-security_pass}
      ADMIN_DB_PASSWORD: ${ADMIN_DB_PASSWORD:-admin_pass}
      COMMUNITY_DB_PASSWORD: ${COMMUNITY_DB_PASSWORD:-community_pass}
      MEMBERSHIP_DB_PASSWORD: ${MEMBERSHIP_DB_PASSWORD:-membership_pass}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - gap-net

  # ---------------------------------------------------------------------------
  # Redis 7 Alpine — single instance with password
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: gap-redis
    restart: unless-stopped
    expose:
      - "6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass} --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - gap-net

  # ---------------------------------------------------------------------------
  # Kafka (KRaft mode — no Zookeeper dependency)
  # The EXTERNAL listener used to advertise localhost:<host>:9093 for bootRun
  # access. With hostname routing the standard path is the docker-network
  # listener (kafka:9092). When bootRun on the host needs an external listener,
  # the docker-compose.bootrun.yml overlay re-publishes 9093 and overrides the
  # advertised listener to localhost:39093.
  # ---------------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.7.0
    container_name: gap-kafka
    restart: unless-stopped
    expose:
      - "9092"
      - "9093"
    environment:
      # KRaft settings
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      CLUSTER_ID: ${KAFKA_KRAFT_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qg}
      # Listeners
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Log retention — 1 day for local dev (Edge Case: disk space)
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_LOG_SEGMENT_BYTES: 104857600
      # Defaults
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - gap-net

  # ---------------------------------------------------------------------------
  # Kafka Topic Initializer — creates 14 main + 14 DLQ topics idempotently
  # ---------------------------------------------------------------------------
  kafka-init:
    image: apache/kafka:3.7.0
    container_name: gap-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "=== Waiting for Kafka broker ==="
        # Extra wait to ensure broker is fully ready for topic creation
        sleep 5

        KAFKA_BIN="/opt/kafka/bin"
        BOOTSTRAP="kafka:9092"

        MAIN_PARTITIONS=3
        DLQ_PARTITIONS=1
        REPLICATION_FACTOR=1
        MAIN_RETENTION_MS=604800000
        DLQ_RETENTION_MS=2592000000

        TOPICS=(
          "auth.login.attempted"
          "auth.login.failed"
          "auth.login.succeeded"
          "auth.token.refreshed"
          "auth.token.reuse.detected"
          "account.created"
          "account.status.changed"
          "account.locked"
          "account.unlocked"
          "account.deleted"
          "session.revoked"
          "security.suspicious.detected"
          "security.auto.lock.triggered"
          "admin.action.performed"
          "community.post.published"
          "community.comment.created"
          "community.reaction.added"
          "membership.subscription.activated"
          "membership.subscription.expired"
          "membership.subscription.cancelled"
        )

        create_topic() {
          local topic="$$1" partitions="$$2" retention="$$3"
          $$KAFKA_BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP \
            --create --if-not-exists \
            --topic "$$topic" \
            --partitions "$$partitions" \
            --replication-factor $$REPLICATION_FACTOR \
            --config retention.ms="$$retention" \
            --config cleanup.policy=delete \
            && echo "Created: $$topic" \
            || echo "Skipped: $$topic (already exists)"
        }

        echo "=== Creating main topics ==="
        for t in "$${TOPICS[@]}"; do
          create_topic "$$t" $$MAIN_PARTITIONS $$MAIN_RETENTION_MS
        done

        echo "=== Creating DLQ topics ==="
        for t in "$${TOPICS[@]}"; do
          create_topic "$$t.dlq" $$DLQ_PARTITIONS $$DLQ_RETENTION_MS
        done

        echo "=== Topic creation complete ==="
        $$KAFKA_BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP --list | sort
        echo "Done."
    restart: "no"
    networks:
      - gap-net

  # ---------------------------------------------------------------------------
  # Kafka UI (provectuslabs/kafka-ui) — Traefik-routed at http://kafka.gap.local/
  # ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: gap-kafka-ui
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: gap-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.gap-kafka-ui.rule=Host(`kafka.gap.local`)"
      - "traefik.http.routers.gap-kafka-ui.entrypoints=web"
      - "traefik.http.services.gap-kafka-ui.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - gap-net
      - traefik-net

  # ---------------------------------------------------------------------------
  # Prometheus — metrics scraping (retention 2 days for local dev)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: gap-prometheus
    restart: unless-stopped
    expose:
      - "9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=2d'
      - '--web.enable-lifecycle'
    volumes:
      - ./infra/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - gap-net

  # ---------------------------------------------------------------------------
  # AlertManager — routes Prometheus alerts
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: gap-alertmanager
    restart: unless-stopped
    expose:
      - "9093"
    volumes:
      - ./infra/alertmanager:/etc/alertmanager:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    networks:
      - gap-net

  # ---------------------------------------------------------------------------
  # Loki — log aggregation (retention ~1 day via compactor)
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.1.1
    container_name: gap-loki
    restart: unless-stopped
    expose:
      - "3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - gap-net

  # ---------------------------------------------------------------------------
  # Promtail — docker log tailer, ships to Loki
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.1.1
    container_name: gap-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - promtail-positions:/tmp
    depends_on:
      - loki
    networks:
      - gap-net

  # ---------------------------------------------------------------------------
  # Grafana — dashboards (Prometheus + Loki) — Traefik-routed at
  # http://grafana.gap.local/
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.2.0
    container_name: gap-grafana
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.gap-grafana.rule=Host(`grafana.gap.local`)"
      - "traefik.http.routers.gap-grafana.entrypoints=web"
      - "traefik.http.services.gap-grafana.loadbalancer.server.port=3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - gap-net
      - traefik-net

volumes:
  mysql-data:
  redis-data:
  kafka-data:
  prometheus-data:
  grafana-data:
  loki-data:
  promtail-positions:

networks:
  gap-net:
    driver: bridge
  traefik-net:
    external: true
    name: traefik-net
