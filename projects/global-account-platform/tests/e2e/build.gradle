plugins {
    id 'java'
}

description = 'End-to-end scenario tests driven by docker-compose.e2e.yml (TASK-BE-041c).'

dependencies {
    testImplementation platform("org.junit:junit-bom:5.10.3")
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation 'org.junit.jupiter:junit-jupiter-api'
    testImplementation 'org.junit.jupiter:junit-jupiter-engine'

    testImplementation 'io.rest-assured:rest-assured:5.5.0'
    testImplementation 'io.rest-assured:json-path:5.5.0'

    testImplementation platform("org.testcontainers:testcontainers-bom:1.20.4")
    testImplementation 'org.testcontainers:testcontainers'
    testImplementation 'org.testcontainers:junit-jupiter'

    testImplementation 'org.awaitility:awaitility:4.2.2'

    testImplementation 'com.fasterxml.jackson.core:jackson-databind:2.17.2'
    testImplementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.17.2'

    testImplementation 'org.apache.kafka:kafka-clients:3.7.0'

    testImplementation 'mysql:mysql-connector-java:8.0.33'

    testImplementation 'org.assertj:assertj-core:3.26.3'
    testImplementation 'org.slf4j:slf4j-simple:2.0.13'
}

test {
    useJUnitPlatform()
    // Long-running E2E; give each test ample time.
    systemProperty 'junit.jupiter.execution.timeout.default', '5m'
    testLogging {
        events 'passed', 'failed', 'skipped', 'standardOut', 'standardError'
        exceptionFormat 'full'
        showStandardStreams = true
    }
    // Surface compose project name so local reruns can clean up.
    environment 'COMPOSE_PROJECT_NAME', 'gap-e2e'
}
