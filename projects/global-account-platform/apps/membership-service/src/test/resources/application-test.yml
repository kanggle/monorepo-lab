spring:
  application:
    name: membership-service

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 0

internal:
  api:
    token: test-internal-token
    bypass-when-unconfigured: false

membership:
  account-service:
    base-url: http://localhost:0
    connect-timeout-ms: 2000
    read-timeout-ms: 3000
    internal-token: test-internal-token
  idempotency:
    ttl-seconds: 86400
  scheduler:
    expiry-fixed-delay-ms: 600000
    expiry-batch-size: 100
