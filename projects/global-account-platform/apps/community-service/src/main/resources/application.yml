spring:
  application:
    name: community-service
  config:
    import: optional:classpath:application-defaults.yml

  datasource:
    url: jdbc:mysql://localhost:3306/community_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:community_user}
    password: ${DB_PASSWORD:community_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1

  cache:
    type: caffeine
    cache-names: accountProfiles
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=5m

  # TASK-BE-253: Standard OAuth2 Resource Server + Client.
  security:
    oauth2:
      resourceserver:
        jwt:
          # OIDC issuer for SAS-issued tokens. Points at GAP's auth-service. The
          # Resource Server fetches /.well-known/openid-configuration to learn the
          # JWKS URI; both legacy and SAS tokens share that JWKS.
          issuer-uri: ${OIDC_ISSUER_URL:http://localhost:8081}
          # Explicit JWKS URI used by the custom JwtDecoder (OAuth2ResourceServerConfig).
          # Falls back to the well-known endpoint of the issuer.
          jwk-set-uri: ${OIDC_JWK_SET_URI:${OIDC_ISSUER_URL:http://localhost:8081}/oauth2/jwks}
      client:
        registration:
          # client_credentials grant for outbound calls to account-service.
          gap-account:
            provider: gap
            client-id: ${COMMUNITY_SERVICE_CLIENT_ID:community-service-client}
            client-secret: ${COMMUNITY_SERVICE_CLIENT_SECRET:community-service-secret}
            authorization-grant-type: client_credentials
            scope: account.read
            client-authentication-method: client_secret_basic
          gap-membership:
            provider: gap
            client-id: ${COMMUNITY_SERVICE_CLIENT_ID:community-service-client}
            client-secret: ${COMMUNITY_SERVICE_CLIENT_SECRET:community-service-secret}
            authorization-grant-type: client_credentials
            scope: membership.read
            client-authentication-method: client_secret_basic
        provider:
          # Only token-uri is set — Spring would otherwise call OIDC discovery on
          # the issuer-uri at application startup, which couples bootup to GAP
          # availability. issuer claim validation lives in OAuth2ResourceServerConfig.
          gap:
            token-uri: ${OIDC_TOKEN_URI:${OIDC_ISSUER_URL:http://localhost:8081}/oauth2/token}

outbox:
  polling:
    interval-ms: ${OUTBOX_POLLING_INTERVAL_MS:1000}
    batch-size: ${OUTBOX_POLLING_BATCH_SIZE:50}

server:
  port: 8086

community:
  # TASK-BE-253: OIDC Resource Server validators.
  oauth2:
    # Acceptable iss claim values during the D2-b deprecation window.
    # - The first entry is the SAS issuer URL.
    # - The legacy "global-account-platform" string is kept so existing tokens
    #   from POST /api/auth/login continue to validate. Drop after deprecation.
    allowed-issuers: ${OIDC_ALLOWED_ISSUERS:${OIDC_ISSUER_URL:http://localhost:8081},global-account-platform}
    required-tenant-id: ${OIDC_REQUIRED_TENANT_ID:fan-platform}
  membership-service:
    base-url: ${MEMBERSHIP_SERVICE_URL:http://localhost:8087}
    connect-timeout-ms: 2000
    read-timeout-ms: 3000
  account-service:
    base-url: ${ACCOUNT_SERVICE_URL:http://localhost:8082}
    connect-timeout-ms: 2000
    read-timeout-ms: 3000

resilience4j:
  circuitbreaker:
    instances:
      membershipService:
        failure-rate-threshold: 50
        sliding-window-type: TIME_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
