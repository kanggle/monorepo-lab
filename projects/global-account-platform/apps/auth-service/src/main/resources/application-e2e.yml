# E2E profile — docker-compose.e2e.yml driven overrides.
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:auth_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:auth_user}
    password: ${DB_PASSWORD:auth_pass}
    # TASK-BE-045: tolerate MySQL warmup under simultaneous cold-start connection
    # bursts (4 services). connection-timeout raised to 60s so HikariCP's first
    # checkFailFast probe waits through MySQL's post-healthy init window;
    # initialization-fail-timeout mirrors it so pool init retries the same window;
    # maximum-pool-size capped at 5 so 4 services' combined pool sits well under
    # MySQL's (now 500) connection cap.
    hikari:
      connection-timeout: 60000
      initialization-fail-timeout: 60000
      maximum-pool-size: 5
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

logging:
  level:
    root: INFO
    # DIAGNOSTIC (TASK-MONO-158 B-side) — surface the assume-tenant
    # entitled_domains injection + the account-service subscription lookup so
    # the globex re-scope (empty entitled_domains?) is observable. Remove once green.
    com.example.auth.infrastructure.oauth2.TenantClaimTokenCustomizer: DEBUG
    com.example.auth.infrastructure.client.AccountServiceClient: DEBUG
  file:
    name: ""
