# =============================================================================
# platform-console — Local Development Infrastructure
# =============================================================================
# Hostname-based routing (per ADR-MONO-001 Option C):
#   console-web is reached via http://console.local/ — Traefik routes on Host
#   header. No PORT_PREFIX, no host-port slot allocation.
#
# platform-console has NO backing services of its own (no DB / Redis / Kafka).
# It is Model B (ADR-MONO-013 D1): a single Next.js UI that calls GAP OIDC +
# the GAP product/tenant registry + per-domain gateway/admin APIs over the
# shared traefik-net network. Those domains run from their own compose files.
#
# Prerequisites:
#   1. Start the shared Traefik stack:  pnpm traefik:up
#   2. Add `127.0.0.1 console.local` to your hosts file (one-time)
#   3. The domains the console federates (gap/wms/scm) run from their own
#      compose files; the console only needs them reachable for live screens.
#
# Usage:
#   pnpm console:up     — start console-web
#   pnpm console:down   — stop
#   pnpm console:logs   — tail logs
# =============================================================================

services:
  console-web:
    image: platform-console/console-web:local
    container_name: platform-console-web
    build:
      context: ./apps/console-web
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      # Next.js standalone server
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: ${NODE_ENV:-production}
      # GAP OIDC PUBLIC client (Auth Code + PKCE, no client secret) —
      # registered by TASK-BE-296 (auth-service V0015 seed).
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-http://iam.local}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-platform-console-web}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://console.local/api/auth/callback}
      OIDC_SCOPE: ${OIDC_SCOPE:-openid profile email tenant.read}
      # GAP product/tenant registry — AUTHORITATIVE producer path
      # (TASK-BE-296 / console-registry-api.md): admin-service operator-auth
      # boundary GET /api/admin/console/registry (gateway public-path subtree
      # → admin-service OperatorAuthenticationFilter). Called server-side with
      # the EXCHANGED operator token (NOT the GAP OIDC token).
      CONSOLE_REGISTRY_URL: ${CONSOLE_REGISTRY_URL:-http://iam.local/api/admin/console/registry}
      REGISTRY_TIMEOUT_MS: ${REGISTRY_TIMEOUT_MS:-5000}
      # console-bff is reached on the DOCKER NETWORK, never through the Traefik
      # edge (TASK-MONO-362). Both containers sit on traefik-net, so Docker's
      # embedded DNS resolves the service name. The BFF holds no Traefik router:
      # being ON the network is not the same as being exposed BY it — exposure
      # comes from the router labels, and it has none.
      #
      # Same value the federation-hardening-e2e stack has always used; this
      # aligns the thin `pnpm console:up` stack with the one CI actually runs.
      CONSOLE_BFF_URL: ${CONSOLE_BFF_URL:-http://console-bff:8080}
      # GAP admin-service RFC 8693 operator-token exchange — AUTHORITATIVE
      # producer path (TASK-BE-298 / admin-api.md / ADR-MONO-014): POST
      # /api/admin/auth/token-exchange on the same /api/admin/** operator-auth
      # subtree. Console server-side exchanges the GAP OIDC access token
      # (subject_token) for a short-lived operator token (token_type=admin).
      # The GAP OIDC token is never an /api/admin/** credential.
      CONSOLE_TOKEN_EXCHANGE_URL: ${CONSOLE_TOKEN_EXCHANGE_URL:-http://iam.local/api/admin/auth/token-exchange}
      TOKEN_EXCHANGE_TIMEOUT_MS: ${TOKEN_EXCHANGE_TIMEOUT_MS:-5000}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.platform-console.rule=Host(`console.local`)"
      - "traefik.http.routers.platform-console.entrypoints=web"
      - "traefik.http.services.platform-console.loadbalancer.server.port=3000"
    networks:
      - traefik-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # console-bff — Spring Boot Hexagonal BFF (TASK-PC-BE-001).
  #
  # INTERNAL-ONLY, and now actually wired that way (TASK-MONO-362).
  #
  # It used to hold a Traefik router (`Host(console-bff.local)`) while the comment
  # right here said "internal-only — the browser never reaches this hostname".
  # Both cannot be true: a router on the shared edge means anyone who can send
  # `Host: console-bff.local` reaches the BFF. "Internal-only" was a comment, not a
  # constraint — and it made this the only BACKEND service in the monorepo holding
  # an edge router, which is precisely what api-gateway-policy.md L14 forbids
  # ("No backend service may be directly exposed to external traffic").
  #
  # The router is gone. console-web calls it on the docker network instead
  # (CONSOLE_BFF_URL=http://console-bff:8080) — the wiring the federation-hardening
  # e2e stack, the one CI actually runs, has always used.
  #
  # It STAYS on traefik-net: that is the network it shares with console-web, and
  # network membership is not exposure. Exposure comes from the router labels.
  # Traefik cannot route to a container it has no route for.
  #
  # expose: only — no host-port publish (Local Network Convention ADR-MONO-001).
  # Per-domain credential dispatch is request-scoped (stateless, no DB/Redis).
  # GAP issuer URL is passed via CONSOLE_BFF_IAM_ISSUER_URL (JWKS discovery).
  # ---------------------------------------------------------------------------
  console-bff:
    build:
      context: ./apps/console-bff
      dockerfile: Dockerfile
    container_name: platform-console-bff
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "8080"
      # GAP OIDC issuer for RS256 JWKS validation of inbound bearer tokens.
      CONSOLE_BFF_IAM_ISSUER_URL: ${CONSOLE_BFF_IAM_ISSUER_URL:-http://iam.local}
    # No Traefik labels — deliberately unroutable from the edge (TASK-MONO-362).
    # Do not re-add them: `scripts/check-gateway-drift.sh` (I2) will fail, which is
    # the point. A backend service reachable at the edge without a gateway has no
    # rate limiting, no identity-header strip→enrich, and no uniform error envelope.
    networks:
      - traefik-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  traefik-net:
    external: true
    name: traefik-net
