      ADMIN_TOTP_V1_KEY: REVWX09OTFlfVE9UUF9LRVlfMzJfQllURVNfISEhWFg=
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      auth-service: { condition: service_started }
      account-service: { condition: service_started }
      # TASK-PC-FE-024: see auth-service depends_on comment above.
      kafka: { condition: service_started }
    ports: ["18085:8085"]
    networks: [pc-e2e]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8085/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  # ---------------------------------------------------------------------------
  # finance-platform account-service — `/api/finance/accounts/{id}/balances`.
  # Consumed by console-bff FinanceBalanceReadAdapter when an operator's
  # finance_default_account_id is set (Phase 4 PC-FE-016 click sequence: after
  # Save, the overview's finance card flips from forbidden/MISSING_PREREQUISITE
  # to ok with balance data).
  # ---------------------------------------------------------------------------
  finance-account-service:
    build:
      context: ../finance-platform/apps/account-service
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: e2e
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      # finance_db / finance / finance — created by seed.sql preamble before
      # account-service first boot (CI workflow runs seed.sql AFTER MySQL
      # healthy + BEFORE finance-account-service is started — see the workflow
      # step ordering).
      MYSQL_DB: finance_db
      MYSQL_USER: finance
      MYSQL_PASSWORD: finance
      REDIS_HOST: redis
      OIDC_ISSUER_URL: http://auth-service:8081
      JWT_JWKS_URI: http://auth-service:8081/oauth2/jwks
      FINANCE_ACCOUNT_PII_KEY: finance-account-dev-pii-key-32bytes!!
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      auth-service: { condition: service_started }
    ports: ["18086:8080"]
    networks: [pc-e2e]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  # ---------------------------------------------------------------------------
  # console-bff — Spring Boot Hexagonal orchestrator
  # (TASK-PC-BE-001/002/003 + ADR-MONO-017 Phase 7).
  # ---------------------------------------------------------------------------
  console-bff:
    build:
      context: ./apps/console-bff
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: docker
      # GAP OIDC trust anchor — JWKS validation of inbound bearer tokens.
      CONSOLE_BFF_IAM_ISSUER_URL: http://auth-service:8081
      CONSOLE_BFF_JWK_SET_URI: http://auth-service:8081/oauth2/jwks
      # Per-domain outbound base URLs (ADR-MONO-017 D6 fan-out). Only the
      # finance leg is exercised by the 2 e2e specs (PC-FE-016 finance card
      # ok-after-save assertion); the other domain legs (gap registry / wms /
      # scm / erp) are wired to non-routable hostnames so their adapters
      # surface as `down`/`unreachable` on the overview rather than 502'ing
      # the entire response.
      CONSOLE_BFF_OUTBOUND_IAM_BASE_URL: http://admin-service:8085
      CONSOLE_BFF_OUTBOUND_FINANCE_BASE_URL: http://finance-account-service:8080
      CONSOLE_BFF_OUTBOUND_WMS_BASE_URL: http://127.0.0.1:9
      CONSOLE_BFF_OUTBOUND_SCM_BASE_URL: http://127.0.0.1:9
      CONSOLE_BFF_OUTBOUND_ERP_BASE_URL: http://127.0.0.1:9
    depends_on:
      auth-service: { condition: service_started }
      admin-service: { condition: service_started }
      finance-account-service: { condition: service_started }
    ports: ["18090:8080"]
    networks: [pc-e2e]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  # ---------------------------------------------------------------------------
  # console-web — Next.js Playwright target.
  # ---------------------------------------------------------------------------
  console-web:
    build:
      context: ./apps/console-web
      dockerfile: Dockerfile
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: production
      # GAP OIDC public client — the platform-console-web row is seeded by
      # auth-service/V0015 with PKCE-mandatory PUBLIC-client semantics
      # (no client secret, no client_credentials grant). The e2e Playwright
      # login fixture drives the production OIDC authorization_code + PKCE
      # path end-to-end via auth-service /login HTML form (TASK-BE-309 +
      # TASK-PC-FE-022) — see fixtures/login.ts. The Playwright route handler
      # uses `context.route` to bridge `auth-service:8081` (docker DNS) to
      # `localhost:18081` (host-published port) without altering the issuer
      # URL the JWT carries.
      OIDC_ISSUER_URL: http://auth-service:8081
      OIDC_CLIENT_ID: platform-console-web
      # The redirect URI must match the V0015 seed exactly. Inside the docker
      # network, the browser hits console-web at `http://localhost:3000`; the
      # V0015 seed lists `http://localhost:3000/api/auth/callback` so it works
      # without modification.
      OIDC_REDIRECT_URI: http://localhost:3000/api/auth/callback
      OIDC_SCOPE: "openid profile email tenant.read"
      # Registry + operator-token-exchange — server-side calls from the
      # console-web Next route handlers (NOT browser). Pointed at the admin-
      # service container DNS hostname.
      CONSOLE_REGISTRY_URL: http://admin-service:8085/api/admin/console/registry
      REGISTRY_TIMEOUT_MS: "5000"
      CONSOLE_TOKEN_EXCHANGE_URL: http://admin-service:8085/api/admin/auth/token-exchange
      TOKEN_EXCHANGE_TIMEOUT_MS: "5000"
      # TASK-PC-FE-029 iter 2 — GAP admin-service base for the 7 operator
      # endpoints (operators list/create/edit-roles/change-status/change-
      # password/update-profile/admin-set-profile) AND the audit + accounts
      # surfaces (TASK-PC-FE-002/003/004). console-web's `env.ts` defaults
      # this to `http://iam.local` (the dev Traefik path); the e2e overlay
      # has no Traefik, so the default would resolve nowhere → 5s timeout
      # on `/api/admin/operators?page=0&size=20` → server `operators-state`
      # falls into `degraded: true` branch → MyProfileForm never mounts →
      # spec `my-profile-default-account-id` testid 5s timeout.
      IAM_ADMIN_API_BASE: http://admin-service:8085
      # console-bff orchestrator — server-side same-origin proxy.
      CONSOLE_BFF_URL: http://console-bff:8080
      # The browser-visible Next.js public origin. Playwright `baseURL` matches.
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      auth-service: { condition: service_started }
      admin-service: { condition: service_started }
      console-bff: { condition: service_started }
    ports: ["3000:3000"]
    networks: [pc-e2e]
    healthcheck:
      # 127.0.0.1, NOT localhost — same defect as the base compose (TASK-MONO-358).
      # `HOSTNAME: "0.0.0.0"` binds Next to IPv4 only; alpine maps `localhost` to ::1 as
      # well, and busybox wget picks ::1 without falling back. The probe fails while the
      # app is healthy. Full reasoning in projects/platform-console/docker-compose.yml.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

networks:
  pc-e2e:
    driver: bridge
