# =============================================================================
# platform-console — E2E Compose (TASK-PC-FE-019)
# =============================================================================
# Minimal full-stack overlay for the nightly Playwright e2e harness. Boots:
#
#   - GAP auth-service     (OIDC AS — `/oauth2/token`, JWKS)
#   - GAP account-service  (account read; transitively reachable through
#                           admin-service AdminLoginService dependencies)
#   - GAP admin-service    (operator-token issuer; `/api/admin/console/registry`,
#                           `/api/admin/me/profile`, `/api/admin/operators/**`,
#                           `/api/admin/auth/token-exchange`)
#   - finance-platform account-service
#                           (`/api/finance/accounts/{id}/balances` consumed by
#                           console-bff `FinanceBalanceReadAdapter`)
#   - console-bff          (Spring Boot orchestrator — `GET /api/console/
#                           dashboards/operator-overview` composition)
#   - console-web          (Next.js — Playwright target)
#   - MySQL 8.0            (shared — `auth_db`, `account_db`, `admin_db`,
#                           `finance_db` schemas)
#   - Redis 7              (shared — rate-limit / SAS authorization cache)
#
# Excluded (deliberately — mirrors ecommerce CI overlay scope discipline):
#   - Kafka broker         (the 2 e2e specs do not exercise an event-publishing
#                           code path; admin-service writes `admin_actions`
#                           synchronously. Future spec needing event observation
#                           can promote the placeholder below to a real broker.
#                           NOTE: a minimal DNS-only `kafka` placeholder service
#                           IS provided below — required to satisfy the three
#                           GAP service Dockerfiles' BE-048 `getent hosts kafka`
#                           ENTRYPOINT pre-flight (no broker semantics; see the
#                           `kafka` service block + TASK-PC-FE-023 rationale).)
#   - Traefik              (CI overlay uses host-port publish + service-DNS
#                           hostnames; the dev path remains `pnpm traefik:up`
#                           + `http://console.local/`.)
#   - GAP security-service (cross-service bulk lock + account auto-lock — not
#                           reached by the 2 e2e click sequences.)
#     (GAP community / membership-service used to be listed here as "not
#      federated by the console v1." — both were RETIRED by TASK-MONO-394.)
#   - Observability stack  (Jaeger / Prometheus / Grafana / Loki / Promtail —
#                           kept out of the runner's memory budget; runner
#                           measured 4 CPU / 15 GiB, 2026-07-20, TASK-MONO-445.
#                           OTEL exporter errors are non-blocking.)
#
# Usage:
#   docker compose -f docker-compose.e2e.yml up -d --build
#   docker compose -f docker-compose.e2e.yml exec -T mysql \
#     mysql -uroot -prootpass < apps/console-web/tests/e2e/fixtures/seed.sql
#   pnpm --filter console-web exec playwright test
#   docker compose -f docker-compose.e2e.yml down -v
#
# Boot-jar prerequisite:
#   ./gradlew \
#     :projects:iam-platform:apps:auth-service:bootJar \
#     :projects:iam-platform:apps:account-service:bootJar \
#     :projects:iam-platform:apps:admin-service:bootJar \
#     :projects:finance-platform:apps:account-service:bootJar \
#     :projects:platform-console:apps:console-bff:bootJar
#
# Each Dockerfile expects the boot jar at `<service-dir>/build/libs/*.jar`.
# The CI nightly job below in .github/workflows/nightly-e2e.yml builds these
# in a dedicated artifact-upload job (mirrors ecommerce-boot-jars-nightly).
# =============================================================================

name: platform-console-e2e

x-iam-service-env: &iam-service-env
  SPRING_PROFILES_ACTIVE: e2e
  DB_HOST: mysql
  DB_PORT: "3306"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ""
  # No Kafka in this overlay — but GAP services still bind KAFKA_BOOTSTRAP_SERVERS
  # at boot. Point at a non-routable host; the consumer pollers log warnings but
  # do not crash the application context (the 2 e2e click sequences never
  # exercise an event-producing code path).
  KAFKA_BOOTSTRAP_SERVERS: 127.0.0.1:9999
  # JDK DNS TTL = 0 — Docker embedded DNS occasionally returns NXDOMAIN for
  # sibling services during partial restarts (TASK-BE-044 / GAP e2e overlay).
  JAVA_TOOL_OPTIONS: "-Dnetworkaddress.cache.ttl=0 -Dnetworkaddress.cache.negative.ttl=0"
  # The SAS issuer URL — every downstream validator (admin token-exchange,
  # console-bff resource server, finance resource server) is configured to
  # expect THIS URL as the `iss` claim. The auth-service itself derives its
  # discovery document from `oidc.issuer-url` env var (default in
  # apps/auth-service/src/main/resources/application.yml).
  OIDC_ISSUER_URL: http://auth-service:8081

services:
  # ---------------------------------------------------------------------------
  # MySQL — single instance shared by 4 schemas (auth_db, account_db, admin_db,
  # finance_db). The GAP init script creates 6 dbs by default; finance_db is
  # created by the seed.sql command-line invocation below at first boot
  # (cannot be wedged into GAP's init.sh — that's GAP-owned territory and
  # AC-3 forbids byte diff there).
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    command: ["--log-bin-trust-function-creators=1", "--max_connections=500"]
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      AUTH_DB_PASSWORD: auth_pass
      ACCOUNT_DB_PASSWORD: account_pass
      SECURITY_DB_PASSWORD: security_pass
      ADMIN_DB_PASSWORD: admin_pass
    volumes:
      # Reuse the GAP init script verbatim — it creates the 4 GAP databases +
      # service users. finance_db is created at seed time (seed.sql first
      # statement) since GAP's init.sh is GAP-owned (AC-3).
      - ../iam-platform/docker/mysql/init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports: ["13306:3306"]
    networks: [pc-e2e]

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports: ["16379:6379"]
    networks: [pc-e2e]

  # ---------------------------------------------------------------------------
  # kafka — DNS-only placeholder (TASK-PC-FE-023).
  #
  # NOT a Kafka broker. This service exists solely to occupy the `kafka` DNS
  # name in the `pc-e2e` Docker embedded-DNS namespace so that the BE-048
  # ENTRYPOINT pre-flight in the three GAP service Dockerfiles
  # (`apps/{auth,account,admin}-service/Dockerfile` — `until getent hosts mysql
  # >/dev/null && getent hosts kafka >/dev/null …`) returns success and the JVM
  # is allowed to start.
  #
  # At the application layer, every GAP service in this overlay carries
  # `KAFKA_BOOTSTRAP_SERVERS=127.0.0.1:9999` (see `x-iam-service-env` above) —
  # non-routable by design. The Kafka client logs the expected warnings but does
  # not crash the Spring application context, exactly as the overlay author
  # intended (the 2 e2e click sequences never exercise an event-producing path).
  # So *both* layers stay disciplined: DNS layer resolves to this placeholder
  # IP (BE-048 satisfied), application layer cannot reach a broker (no-Kafka
  # scope preserved).
  #
  # The cheap "fix" would have been to bring up a real Kafka KRaft broker
  # (mirroring the GAP project's own `docker-compose.e2e.yml`, which is the
  # canonical reference for image + env wiring).
  # We chose against that to honor the overlay's documented scope discipline
  # (the comment block at the top of this file: `Excluded (deliberately —
  # mirrors ecommerce CI overlay scope discipline)`) and the runner memory
  # budget (measured 4 CPU / 15 GiB, 2026-07-20, TASK-MONO-445). The argument
  # rests on the broker being *unused*, not on the box being small
  # — paying ~256 MB RAM + ~30–60 s boot for an unused broker on every
  # nightly is dead weight. The day an e2e spec needs event observation, swap
  # the `image:` + `command:` lines below for the GAP KRaft config and flip
  # `KAFKA_BOOTSTRAP_SERVERS` from `127.0.0.1:9999` to `kafka:9092`. One file,
  # ~30 lines.
  # ---------------------------------------------------------------------------
  kafka:
    image: alpine:3.19
    command: ["sleep", "infinity"]
    restart: unless-stopped
    networks: [pc-e2e]

  # ---------------------------------------------------------------------------
  # GAP auth-service — SAS OIDC AS. Issues access tokens consumed by
  # admin-service token-exchange + console-bff JWKS resource-server validation
  # + finance account-service JWKS resource-server validation.
  # ---------------------------------------------------------------------------
  auth-service:
    build:
      context: ../iam-platform
      dockerfile: apps/auth-service/Dockerfile
    environment:
      <<: *iam-service-env
      DB_NAME: auth_db
      DB_USERNAME: auth_user
      DB_PASSWORD: auth_pass
      ACCOUNT_SERVICE_URL: http://account-service:8082
      # SAS issuer claim — every JWT this service mints embeds this as `iss`.
      OIDC_ISSUER_URL: http://auth-service:8081
      # JWT signing keys — production application.yml defaults expect classpath
      # resources, but bootJar packages only `src/main/resources`. Mount the
      # dev test keys (same RSA keys used by IT slices) and point JWT_*_KEY_PATH
      # at the mount (TASK-MONO-082 cycle 3 pattern from GAP docker-compose.e2e).
      JWT_PRIVATE_KEY_PATH: file:/app/keys/private.pem
      JWT_PUBLIC_KEY_PATH: file:/app/keys/public.pem
    volumes:
      - ../iam-platform/apps/auth-service/src/test/resources/keys:/app/keys:ro
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      # TASK-PC-FE-024: pull the kafka DNS-only placeholder (TASK-PC-FE-023) into
      # any `docker compose up auth-service` graph. Without this, the workflow's
      # selective `up <names>` command skips the placeholder, and this service's
      # BE-048 Dockerfile ENTRYPOINT `getent hosts kafka` loops forever.
      kafka: { condition: service_started }
    # TASK-PC-FE-028 iter 4 — host-port 1:1 with the container's 8081. The
    # browser-side Playwright Chromium uses `--host-resolver-rules=MAP
    # auth-service 127.0.0.1` (DNS layer, port-agnostic), so the browser
    # resolves `auth-service:8081` → `127.0.0.1:8081`. Aligning host port
    # with container port is what makes the port-agnostic mapping land on
    # the right TCP listener. Replaces the earlier `["18081:8081"]` which
    # served the now-removed `context.route` bridge target.
    ports: ["8081:8081"]
    networks: [pc-e2e]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  # ---------------------------------------------------------------------------
  # GAP account-service — account read + ACTIVE-state lookup. Required by
  # admin-service AdminLoginService at boot context init (constructor deps);
  # the 2 e2e specs don't directly hit `/api/accounts/**`.
  # ---------------------------------------------------------------------------
  account-service:
    build:
      context: ../iam-platform
      dockerfile: apps/account-service/Dockerfile
    environment:
      <<: *iam-service-env
      DB_NAME: account_db
      DB_USERNAME: account_user
      DB_PASSWORD: account_pass
      AUTH_SERVICE_URL: http://auth-service:8081
      INTERNAL_API_TOKEN: e2e-internal-token
    depends_on:
      mysql: { condition: service_healthy }
      auth-service: { condition: service_started }
      # TASK-PC-FE-024: see auth-service depends_on comment above.
      kafka: { condition: service_started }
    ports: ["18082:8082"]
    networks: [pc-e2e]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  # ---------------------------------------------------------------------------
  # GAP admin-service — operator-token issuer. Console operator-token
  # cookie comes from this service via `/api/admin/auth/token-exchange`. The
  # me/profile + admin/{id}/profile + console/registry endpoints the 2 e2e
  # specs exercise also live here.
  # ---------------------------------------------------------------------------
  admin-service:
    build:
      context: ../iam-platform
      dockerfile: apps/admin-service/Dockerfile
    environment:
      <<: *iam-service-env
      DB_NAME: admin_db
      DB_USERNAME: admin_user
      DB_PASSWORD: admin_pass
      AUTH_SERVICE_URL: http://auth-service:8081
      ACCOUNT_SERVICE_URL: http://account-service:8082
      INTERNAL_API_TOKEN: e2e-internal-token
      # GAP OIDC subject-token validator config — see
      # admin-service/src/main/java/.../config/IamOidcProperties.java. The
      # issuer must match auth-service's `iss` claim; the JWKS URL targets the
      # auth-service container directly (no Traefik in this overlay).
      ADMIN_OIDC_ISSUER: http://auth-service:8081
      ADMIN_OIDC_JWKS_URI: http://auth-service:8081/oauth2/jwks
      ADMIN_OIDC_AUDIENCE: platform-console-web
      # Fixed test keys (parity with GAP docker-compose.e2e.yml — same PEM
      # admin-service unit tests use). DO NOT use in production.
      ADMIN_JWT_V1_PEM: |
        -----BEGIN PRIVATE KEY-----
        MIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQCwpwO4oW86ahUt
        7qzFCSMA0fdzc6ehRRJgwsNekNaf9lcBC0kFmShJQQzoaWZXW9g/Qfdq8rIGpO0Q
        +1I2s8U8xFlNunEdW/rzI0H1aKONIduiv/lN/u66+TZrRspeaH1vpuya7+YFEw1N
        DMpjtEmuOwMi10RY5hMK/o7PJjRTq9EVacMErQOdchvrZOztlLugt3Y8K1BNxQ8B
        ++fFSxGAstoI4QXWtnUpGpmaR0DUEj5wMAg9pr/doj22hR4WYjiC0Cixias/uLOu
        XXTLQPk4Z/oM6Y783hpX+KDE0inwMhxj3uKD1+o9ceveIt4EyA0OqiNBlvFmTc82
        xk5UmMQvAgMBAAECggEAG0y0NoQ8PDrIqyCHcqvGzQmlxCHLdhDGlk2DA8o+YNog
        9/hWgJb6stdqt0ASoM2AzcXUBqMbAAvc1xL/0ZRWlt2BL5HwiSj9zzVTrClPnS/u
        UWh5jqQnIJ4C2vFFtPFQ8UBKsGcClSYsmAux+1aRTGuyQGAkH9jueHR+fWTaEVPq
        Zhmahubd62eATcPR5b5nTTAiEwWAV5AgpSkaD3vrQZEwud/lrbW4376xyVc3cJRK
        inrjry4kBybeRIM9ElsOMI4EIfsyseLubG/bO5c/cSTnYeHLnPMyH8OA3CePx9a+
        Oyp2FkKnwf/EgdWLJNolsSO3MYUXjIcH6/AowVzTgQKBgQDcnnycIxQy9B9ypKxm
