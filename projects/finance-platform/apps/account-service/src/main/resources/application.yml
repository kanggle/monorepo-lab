spring:
  application:
    name: finance-platform-account-service

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DB:finance_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:finance}
    password: ${MYSQL_PASSWORD:finance}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      # Flyway owns the schema — Hibernate validates only.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc.time_zone: UTC
    open-in-view: false

  flyway:
    # V1__init.sql (MySQL) shipped by TASK-FIN-BE-001 — Flyway owns the
    # schema; Hibernate validates only (spring.jpa.hibernate.ddl-auto).
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s

  # Standard OAuth2 Resource Server backed by GAP's JWKS.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URL:http://iam.local}
          # V0017 SQL seeded the finance-platform OIDC client against GAP's
          # standard /oauth2/jwks endpoint (scm / wms / fan-platform alignment).
          jwk-set-uri: ${OIDC_JWK_SET_URI:${JWT_JWKS_URI:${OIDC_ISSUER_URL:http://iam.local}/oauth2/jwks}}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  level:
    root: INFO
    com.example.finance.account: INFO
    org.hibernate.SQL: WARN
  pattern:
    level: "%5p [traceId=%X{traceId:-} requestId=%X{requestId:-} tenantId=%X{tenantId:-} accountId=%X{accountId:-}]"

financeplatform:
  oauth2:
    # D2-b deprecation window: SAS issuer + legacy "iam"
    # string. Keep byte-identical to gateway-service's allowed-issuers when the
    # gateway-service is introduced (cross-service issuer drift guard — scm
    # precedent).
    allowed-issuers: ${OIDC_ALLOWED_ISSUERS:${OIDC_ISSUER_URL:http://iam.local},iam}
    required-tenant-id: ${OIDC_REQUIRED_TENANT_ID:finance}
  account:
    crypto:
      # AES-256-GCM key for regulated PII column encryption (F7). Dev default
      # below; production MUST supply a 32-byte FINANCE_ACCOUNT_PII_KEY env
      # var. Boot self-test fails fast on a missing/misconfigured key
      # (Failure Mode #15).
      pii-key: ${FINANCE_ACCOUNT_PII_KEY:finance-account-dev-pii-key-32bytes!!}
    idempotency:
      # F1 store TTL (≥ 24h). Redis primary + idempotency_keys DB fallback.
      ttl-seconds: ${FINANCE_IDEMPOTENCY_TTL_SECONDS:86400}
    compliance:
      # v1 StubComplianceAdapter sanction list (CSV of owner refs). Empty in
      # production-like runs; the IT suite seeds a known sanctioned ref.
      sanctioned-owner-refs: ${FINANCE_SANCTIONED_OWNER_REFS:}

# Transactional outbox relay v2 (libs/java-messaging AbstractOutboxPublisher,
# TASK-FIN-BE-045). Enabled by default; slice / unit runs disable it (no Kafka)
# via application-test.yml. Polls account_outbox on a fixed delay after an
# initial delay (lets the app + Kafka client warm up before the first drain).
account:
  outbox:
    polling:
      enabled: ${ACCOUNT_OUTBOX_POLLING_ENABLED:true}
    polling-interval-ms: 1000
    initial-delay-ms: 2000
    batch-size: 50
