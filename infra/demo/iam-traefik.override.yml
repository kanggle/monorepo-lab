# =============================================================================
# infra/demo/iam-traefik.override.yml — iam 을 통합 데모의 신원 엣지로 만든다
# =============================================================================
# TASK-MONO-358.
#
# 왜 이 파일이 필요한가 (실측으로 확인된 것들)
# -----------------------------------------------------------------------------
# iam 의 앱 컨테이너는 `docker-compose.e2e.yml` 이 정의하는데(데모가 앱을 얻으려고
# 함께 올리는 오버레이 — MONO-342), 그 파일은 **CI e2e 용**이다:
#
#   gateway-service:
#     ports: ["18080:8080"]
#     networks: [iam-e2e]          ← traefik-net 이 아니다
#
# 결과가 둘이다.
#
#   (1) **Traefik 이 iam 에 라우팅할 수 없다.** 전 저장소에 `Host(`iam.…`)` 라우터가
#       하나도 없다(iam 의 라우터는 kafka/grafana 관측 도구 둘뿐). 그런데
#       `OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-http://iam.local}` 이 **6개 compose 의
#       기본값**이다 — 아무도 서빙하지 않는 매달린 호스트명이었다.
#
#   (2) **다른 프로젝트가 iam 을 이름으로 찾을 수 없다.** wms/scm/… 는 traefik-net 에
#       있고 iam 앱은 iam-e2e 에 있다. `demo.env` 의
#       `WMS_OIDC_ISSUER_URL=http://iam-gateway-service:8080` 은 닿지 않는 이름이었다.
#
# ⇒ **통합 데모의 도메인 간 OIDC 배선은 한 번도 동작한 적이 없다.** 96 컨테이너가
#    전부 healthy 로 떠도 로그인은 불가능하다 — healthy 는 usable 을 뜻하지 않는다.
#
# 왜 e2e 파일을 직접 고치지 않는가
# -----------------------------------------------------------------------------
# `docker-compose.e2e.yml` 은 **CI 소유**다. 거기에 Traefik 라벨과 traefik-net 을
# 넣으면 CI 가 Traefik 을 띄우도록 강요받는다(띄우지 않는다). "프로젝트 compose 는
# 그대로 두고 데모 토폴로지는 데모 파일이 책임진다" — `demo.env` 와 같은 원칙이다.
# =============================================================================

# -----------------------------------------------------------------------------
# iam 이 발급하는 iss 를 소비자와 일치시킨다
# -----------------------------------------------------------------------------
# `docker-compose.e2e.yml` 은 `OIDC_ISSUER_URL: http://auth-service:8081` 을
# **리터럴로** 박아 둔다(`${...}` 가 아니다) → demo.env 의 셸 env 로는 바뀌지 않는다.
# 그대로 두면 iam 은 `iss=http://auth-service:8081` 을 발급하는데 소비자(scm/fan/
# finance/erp/wms/console)는 `http://iam.${DEMO_DOMAIN}` 을 기대한다 → **전 도메인 401**.
#
# issuer 는 문자열 비교이자 브라우저가 도달할 주소이고, token/jwks 는 실제 fetch 다.
# 그래서 issuer 만 공개 호스트명으로 올리고, fetch 대상은 컨테이너 DNS 로 못박는다
# (auth-service 의 self-call 이 굳이 Traefik 을 한 번 더 타지 않도록).
x-iam-oidc: &iam-oidc
  OIDC_ISSUER_URL: http://iam.${DEMO_DOMAIN:-local}
  OIDC_JWK_SET_URI: http://auth-service:8081/oauth2/jwks
  OIDC_TOKEN_URI: http://auth-service:8081/oauth2/token

services:
  # 신원 엣지. 브라우저가 OIDC 인가 엔드포인트로 리다이렉트되어 **도달해야 하는**
  # 유일한 iam 표면이다.
  gateway-service:
    environment: *iam-oidc
    networks:
      iam-e2e: null
      traefik-net:
        # demo.env 가 참조하는 이름. compose 프로젝트가 `-p iam` 이라 실제 컨테이너는
        # `iam-gateway-service-1` 이 되므로, 별칭 없이는 이 이름이 해소되지 않는다.
        aliases:
          - iam-gateway-service
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.iam.rule=Host(`iam.${DEMO_DOMAIN:-local}`)"
      - "traefik.http.routers.iam.entrypoints=web"
      - "traefik.http.services.iam.loadbalancer.server.port=8080"

  # auth-service 는 Traefik 에 노출하지 않는다 — 브라우저는 게이트웨이만 통한다.
  # 다만 **다른 도메인의 리소스 서버가 JWKS 를 직접 fetch** 하므로(demo.env 의
  # `*_JWK_SET_URI=http://iam-auth-service:8081/oauth2/jwks`) traefik-net 에서
  # 이름이 해소돼야 한다.
  #
  # issuer 와 jwk-set-uri 를 분리하는 것이 이 설계의 열쇠다:
  #   issuer      = 문자열 비교  → 브라우저가 갈 수 있는 http://iam.${DEMO_DOMAIN}
  #   jwk-set-uri = 실제 fetch  → 컨테이너 DNS http://iam-auth-service:8081/...
  # 뒤집으면 둘 다 깨진다. jwk-set-uri 를 공개 호스트명으로 두면 **AWS 가 인스턴스의
  # 자기 공인 IP 로 되돌아오는 트래픽을 라우팅하지 않아**(IGW hairpin 부재) fetch 가
  # 죽고, issuer 를 컨테이너 DNS 로 두면 브라우저가 인가 엔드포인트에 도달하지 못한다.
  auth-service:
    environment: *iam-oidc
    networks:
      iam-e2e: null
      traefik-net:
        aliases:
          - iam-auth-service

  # account/admin/security 도 콘솔 BFF 와 다른 도메인이 이름으로 찾는다.
  account-service:
    environment: *iam-oidc
    networks:
      iam-e2e: null
      traefik-net:
        aliases:
          - iam-account-service

  admin-service:
    environment: *iam-oidc
    networks:
      iam-e2e: null
      traefik-net:
        aliases:
          - iam-admin-service

  security-service:
    environment: *iam-oidc
    networks:
      iam-e2e: null
      traefik-net:
        aliases:
          - iam-security-service

networks:
  # base compose(`projects/iam-platform/docker-compose.yml`)가 이미 external 로
  # 선언하지만, 이 오버레이만 단독으로 렌더될 때를 위해 여기서도 선언한다.
  traefik-net:
    external: true
    name: traefik-net
