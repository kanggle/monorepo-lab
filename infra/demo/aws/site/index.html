<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portfolio — Live Demo</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 8vh auto; padding: 0 20px; line-height: 1.6; }
    h1 { font-size: 1.6rem; }
    .card { border: 1px solid #8883; border-radius: 14px; padding: 24px; margin-top: 24px; }
    button { font-size: 1rem; padding: 12px 22px; border-radius: 10px; border: 0; cursor: pointer; }
    #start { background: #2563eb; color: #fff; }
    #stop { background: #444; color: #fff; margin-left: 8px; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    #bar { height: 8px; background: #8883; border-radius: 999px; overflow: hidden; margin: 16px 0; display: none; }
    #bar > i { display: block; height: 100%; width: 30%; background: #2563eb; animation: slide 1.4s infinite; }
    @keyframes slide { 0% { margin-left: -30%; } 100% { margin-left: 100%; } }
    #msg { margin-top: 8px; font-size: .95rem; opacity: .85; }
    a.open { display: none; margin-top: 14px; font-weight: 600; }
    .hint { font-size: .82rem; opacity: .6; margin-top: 20px; }
    /* 도메인별 선택 (TASK-MONO-477) */
    .domains { display: none; }
    .domains h2 { font-size: 1.05rem; margin: 0 0 12px; }
    .dall { margin-bottom: 8px; }
    .dall button { font-size: .85rem; padding: 8px 14px; background: #8883; }
    .drow { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-top: 1px solid #8882; }
    .dname { flex: 1; font-weight: 600; }
    .badge { font-size: .78rem; padding: 2px 9px; border-radius: 999px; white-space: nowrap; }
    .b-up { background: #16a34a2e; color: #16a34a; }
    .b-partial { background: #d977062e; color: #d97706; }
    .b-down { background: #8883; }
    .b-unknown { background: #8882; opacity: .7; }
    .dbtn { font-size: .82rem; padding: 6px 14px; }
    .dbtn.up { background: #555; color: #fff; }
    .dbtn.down { background: #2563eb; color: #fff; }
  </style>
</head>
<body>
  <h1>🚀 라이브 데모 (온디맨드)</h1>
  <!--
    "약 10분" 은 **실측이다**(MONO-389, 데모 호스트 저널): iam 15:44:58 → `up complete`
    15:54:30 = 9분 32초, 인스턴스 부팅까지 합쳐 약 11분. 8개 프로젝트 96개 컨테이너를
    순서대로(iam 먼저, console 마지막) 올리고 각 단계가 healthcheck 를 기다린다.

    예전 문구는 "약 2~4분" 이었다. 잰 적 없는 숫자이고, 방문자를 **4분에 포기하게**
    만든다 — 그때 스택은 아직 ecommerce 를 올리는 중이고 console 은 시작도 안 했다.
  -->
  <p>이 데모 스택은 평소 꺼져 있어 비용이 들지 않습니다. 아래 버튼을 누르면 서버가 기동됩니다(<strong>약 10분</strong> — 8개 프로젝트를 순서대로 올립니다). 20분간 활동이 없으면 자동으로 종료됩니다.</p>

  <div class="card">
    <button id="start">▶ 데모 시작</button>
    <button id="stop" disabled>■ 데모 종료</button>
    <div id="bar"><i></i></div>
    <div id="msg">상태 확인 중…</div>
    <a class="open" id="open" target="_blank" rel="noopener">데모 사이트 열기 →</a>
  </div>

  <!--
    도메인 선택 (TASK-MONO-477). 인스턴스가 running 일 때만 보인다. 전체가 아니라
    필요한 도메인만 올리면 OOM 여유·웜업 시간을 벌 수 있다(비용은 VM 가동시간이 결정하므로
    도메인 수와 무관 — 월 예산 가드는 그대로다). 헬스는 /domains 폴링으로 갱신한다.
  -->
  <div class="card domains" id="domains">
    <h2>도메인 선택 기동 / 종료</h2>
    <div class="dall">
      <button id="dall-start">전체 시작</button>
      <button id="dall-stop">전체 종료</button>
    </div>
    <div id="dlist"></div>
    <div id="dmsg" class="hint" style="margin-top: 10px"></div>
  </div>

  <p class="hint">자동 종료: 20분 무활동 · 최대 3시간. 요금 안전장치가 이중으로 걸려 있습니다.</p>

  <!-- terraform 이 자기 상태에서 렌더한다 (aws_s3_object.config). 저장소에는 없다. -->
  <script src="config.js"></script>
  <script>
    // API_BASE 는 **이 저장소에 존재하지 않는다.** 예전에는 여기 리터럴이 박혀 있었고,
    // API Gateway id 는 재생성마다 바뀌므로 그 값은 썩었다 — 실제로 죽어 있었다.
    // 이제 terraform 이 config.js 를 자기 상태에서 렌더한다(TASK-MONO-389).
    const API_BASE = window.DEMO_API_BASE;

    // config.js 가 없으면 **크게 실패한다.** 조용히 undefined 로 두면 페이지는 200 을
    // 내고 버튼은 아무 일도 하지 않는다 — 정확히 이 task 가 고친 결함의 모양이다.
    if (!API_BASE) {
      document.getElementById("msg").textContent =
        "⚠️ config.js 가 로드되지 않았습니다 — terraform apply 로 사이트를 배포했는지 확인하세요.";
      document.getElementById("start").disabled = true;
      throw new Error("DEMO_API_BASE is not set: config.js missing or not deployed");
    }

    // 데모 진입 URL 은 /status 가 돌려주는 공인 IP 로 **동적 구성**한다.
    // 인스턴스에 EIP 가 없어 start 마다 IP 가 바뀌므로 상수로 박을 수 없다.
    //
    // ⚠️ **대시 표기다.** 데모 호스트는 부팅 시 IMDSv2 로 공인 IP 를 읽어
    //     printf '%s.sslip.io' "$(printf '%s' "$ip" | tr '.' '-')"     ← demo-boot.sh:64
    // 로 DEMO_DOMAIN 을 파생하고, **Traefik 라우터는 그 표기로만 존재한다.**
    //
    // sslip.io 는 점 표기(`console.1.2.3.4.sslip.io`)도 같은 IP 로 해석해 준다.
    // 그래서 DNS 는 멀쩡히 풀리고 TCP 도 붙는데 — **Traefik 이 매치되는 라우터를
    // 못 찾아 404 를 낸다.** 이 페이지는 실제로 점 표기로 링크하고 있었다:
    // 사이트 200, `/start` 200, 컨테이너 전부 healthy, 그런데 "데모 사이트 열기" 가 404.
    // 실측(MONO-389): 점 → **404** / 대시 → **307 → /dashboards/overview**.
    //
    // 가드 (t) 가 이 함수와 demo-boot.sh 의 파생을 **같은 IP 로 실행해 대조**한다.
    const demoHost = (ip) => `${ip.replace(/\./g, "-")}.sslip.io`; // GUARD-T-ANCHOR
    const demoUrl = (ip) => `http://console.${demoHost(ip)}/`;

    const $ = (id) => document.getElementById(id);
    let beatTimer = null, pollTimer = null;

    async function api(path, method = "GET", payload) {
      const opts = { method };
      if (payload !== undefined) {
        opts.headers = { "content-type": "application/json" };
        opts.body = JSON.stringify(payload);
      }
      const r = await fetch(API_BASE + path, opts);
      const body = await r.json().catch(() => ({}));
      // 상태코드를 버리면 429(월 예산 소진) 가 조용히 무시된다 — 사용자는 영원히
      // "기동 중" 을 보게 된다. ok 를 함께 돌려주고 호출부가 반드시 확인한다.
      return { ok: r.ok, status: r.status, body };
    }

    function running(state) { return state === "running"; }

    function render(state, ip, usage) {
      const isRun = running(state);
      $("start").disabled = isRun || state === "pending" || state === "starting";
      $("stop").disabled = !isRun;
      $("bar").style.display = (state === "pending" || state === "starting") ? "block" : "none";
      $("open").style.display = (isRun && ip) ? "inline-block" : "none";
      $("domains").style.display = isRun ? "block" : "none";
      if (ip) $("open").href = demoUrl(ip);
      const label = {
        stopped: "🟢 대기 중 — 시작을 누르세요",
        pending: "🟡 인스턴스 기동 중…",
        starting: "🟡 서비스 웜업 중… (약 10분 — iam → … → console 순서로 올라옵니다)",
        running: "✅ 준비 완료 — 데모 사이트를 여세요",
        stopping: "🔻 종료 중…",
      }[state] || state;
      $("msg").textContent = usage
        ? `${label}  ·  이번 달 ${usage.used}/${usage.budget}분 사용`
        : label;
    }

    function startHeartbeat() {
      stopHeartbeat();
      beatTimer = setInterval(() => api("/heartbeat", "POST").catch(() => {}), 30000);
    }
    function stopHeartbeat() { if (beatTimer) clearInterval(beatTimer); beatTimer = null; }

    async function poll() {
      try {
        const { ok, body } = await api("/status");
        if (!ok) { $("msg").textContent = "상태 확인 실패"; return; }
        const usage = (body.budget_minutes != null)
          ? { used: body.used_minutes, budget: body.budget_minutes } : null;
        render(body.state, body.ip, usage);
        if (running(body.state)) { startHeartbeat(); pollDomains(); } else stopHeartbeat();
      } catch (e) { $("msg").textContent = "상태 확인 실패"; }
    }

    // ---- 도메인별 선택 (TASK-MONO-477) ----------------------------------------
    const DOMAINS = ["iam", "wms", "scm", "finance", "erp", "ecommerce", "fan", "console"];
    const DLABEL = {
      up: ["🟢 실행 중", "b-up"], partial: ["🟡 일부", "b-partial"],
      down: ["⚪ 꺼짐", "b-down"], unknown: ["… 확인 중", "b-unknown"],
    };

    function buildDomainRows() {
      $("dlist").innerHTML = DOMAINS.map((d) => `
        <div class="drow" data-domain="${d}">
          <span class="dname">${d}</span>
          <span class="badge b-unknown" data-badge>… 확인 중</span>
          <button class="dbtn down" data-act data-mode="start">시작</button>
        </div>`).join("");
    }

    function renderDomains(snap) {
      for (const d of DOMAINS) {
        const row = document.querySelector(`.drow[data-domain="${d}"]`);
        if (!row) continue;
        const info = snap[d] || { state: "unknown" };
        const st = DLABEL[info.state] ? info.state : "unknown";
        const [text, cls] = DLABEL[st];
        const badge = row.querySelector("[data-badge]");
        badge.className = "badge " + cls;
        badge.textContent = (info.total != null && st !== "unknown")
          ? `${text} ${info.healthy}/${info.total}` : text;
        const btn = row.querySelector("[data-act]");
        const isUp = (st === "up" || st === "partial");
        btn.textContent = isUp ? "종료" : "시작";
        btn.className = "dbtn " + (isUp ? "up" : "down");
        btn.dataset.mode = isUp ? "stop" : "start";
      }
    }

    async function pollDomains() {
      try {
        const { ok, body } = await api("/domains");
        if (ok && body.domains) renderDomains(body.domains);
      } catch (e) { /* 다음 상태 폴링이 재시도한다 */ }
    }

    async function domainAction(name, mode) {
      const path = (mode === "stop") ? "/domain/stop" : "/domain/start";
      $("dmsg").textContent = `${name} 요청 중…`;
      const { ok, status, body } = await api(path, "POST", { name });
      $("dmsg").textContent = body.message || (ok ? `${name} ${mode} 요청됨` : `실패 (${status})`);
      setTimeout(pollDomains, 1500);   // 명령이 반영될 시간을 준 뒤 갱신
    }

    $("dlist").addEventListener("click", (e) => {
      const btn = e.target.closest("[data-act]");
      if (!btn) return;
      domainAction(btn.closest(".drow").dataset.domain, btn.dataset.mode || "start");
    });
    $("dall-start").onclick = () => domainAction("full", "start");
    $("dall-stop").onclick = () => domainAction("all", "stop");
    buildDomainRows();

    $("start").onclick = async () => {
      $("msg").textContent = "기동 요청 중…";
      const { ok, status, body } = await api("/start", "POST");
      if (!ok) {
        // 429 = 월 예산 소진, 409 = 이전 종료 진행 중, 503 = 인스턴스 없음
        $("msg").textContent = body.message || `기동 실패 (${status})`;
        $("start").disabled = (status === 429);
        $("bar").style.display = "none";
        return;
      }
      render("pending");
    };
    $("stop").onclick = async () => {
      await api("/stop", "POST");
      render("stopping");
      stopHeartbeat();
    };

    poll();
    pollTimer = setInterval(poll, 10000); // 10초마다 상태 폴링
  </script>
</body>
</html>
