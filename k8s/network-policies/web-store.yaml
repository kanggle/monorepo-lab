apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: web-store-netpol
  namespace: ecommerce
spec:
  podSelector:
    matchLabels:
      app: web-store
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # SSR: server components fetch data from gateway-service
    - to:
        - podSelector:
            matchLabels:
              app: gateway-service
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
