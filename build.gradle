plugins {
    id 'java'
    id 'org.springframework.boot' version "${springBootVersion}" apply false
    id 'io.spring.dependency-management' version '1.1.7' apply false
}

subprojects {
    apply plugin: 'java'

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(javaVersion.toInteger())
        }
    }

    repositories {
        mavenCentral()
    }

    configurations {
        compileOnly {
            extendsFrom annotationProcessor
        }
    }

    dependencies {
        compileOnly 'org.projectlombok:lombok:1.18.36'
        annotationProcessor 'org.projectlombok:lombok:1.18.36'
        testCompileOnly 'org.projectlombok:lombok:1.18.36'
        testAnnotationProcessor 'org.projectlombok:lombok:1.18.36'
    }

    test {
        useJUnitPlatform()
        jvmArgs '-XX:+EnableDynamicAgentLoading'

        // Forward Testcontainers-relevant env/system props into the forked test JVM.
        // On Windows + Docker Desktop, named-pipe auto-detection can fail; developers
        // set DOCKER_HOST=tcp://localhost:2375 (requires the "Expose daemon on tcp"
        // option). See docs/guides/local-integration-testing.md.
        def dockerHost = System.getenv('DOCKER_HOST') ?: System.getProperty('docker.host')
        if (dockerHost) {
            environment 'DOCKER_HOST', dockerHost
            systemProperty 'docker.host', dockerHost
        }
    }
}
